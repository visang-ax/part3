8", "contents": "8", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 Cursor AI 툴을 사용하여 게시판(WebBoard) 앱을 질문만으로 만들어보는 동영상 과정입니다.", "goal": "최신 AI 인공지능 툴을 사용하여 웹 프로그램을 개발합니다.", "target": "커서 AI 인공지능 툴을 사용하여 질문만으로 애플리케이션 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "실무비법전수! 한 방에 파이썬", "duration": "3:46:31", "contents": "10", "instructor": "박정은", "summary": "파이썬을 배우면 웹에서 머신러닝/딥러닝 개발까지 무엇이든 할 수 있는 시대, 파이썬 기초 문법을 통해 마음껏 아이디어를 실현해보자!", "goal": "- 프로그래밍 언어의 자료형, 기초 문법에 대해 설명할 수 있다.\n- 파이썬의 기초 문법 핵심 요소를 알고, 실습 코드에 적용할 수 있다.\n- 파이써닉한 코드 사용법을 습득할 수 있다.", "target": "- 프로그래밍이 처음인 비개발자\n- 프로그래밍 언어 입문으로 파이썬을 경험하고자 하는 직장인\n- 프로그래밍 개념과 트렌드에 대해 알고자 하는 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "일잘러가 알아야 할 AI 비즈니스 이야기", "duration": "3:46:32", "contents": "12", "instructor": "현경민", "summary": "더 이상 미룰 수 없는 AI, 내 업무에 대한 인사이트를 얻어갈 수 있는 다양한 비즈니스 이야기를 준비했습니다.", "goal": "1. AI와 IT 기술이 비즈니스에 접목되는 큰 흐름을 파악할 수 있다.\n2. 비즈니스에 AI 활용 시 실무에서 고려할 사항을 학습하고 적용할 수 있다.", "target": "1. AI/IT 트렌드에 관심 있는 직장인\n2. 미래 역량을 갖추고 싶은 직장인", "level": "Seed"}, {"cat1": "Biz. Skill", "cat2": "기획력", "title": "[마케팅 아카이브] 생성형 AI를 활용한 뉴미디어 마케팅", "duration": "3:49:03", "contents": "8", "instructor": "황정운", "summary": "마케팅의 판도를 바꾸다! AI(ChatGPT) 활용 마케팅 실무!", "goal": "- 생성형 AI의 주요개념과 기능을 이해할 수 있다. \n- 생성형 AI를 활용한 콘텐츠 마케팅을 기획할 수 있다. \n- 다양한 생성형 AI를 업무에 활용할 수 있다.", "target": "- 새로운 기술을 활용한 차세대 마케팅에 관심이 있는 마케팅 담당자\n- AI를 효과적으로 활용하는 방법을 학습하고 마케팅 실무에 적용하고 싶은 관련 실무자\n- 뉴미디어 콘텐츠 개발 담당자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "빅데이터 개발자를 위한 아파치 스파크 프로그래밍", "duration": "3:53:27", "contents": "10", "instructor": "노태상", "summary": "아파치 스파크 입문자를 위해서 개념, 구조에 대해서 알기 쉽게 설명한다.", "goal": "- 아파치 스파크의 콤포넌트, 동작 구조,  프로그래밍 모델, 설치 및 환경설정 등을 학습한다.\n- 스파크 머신러닝(Spark Machine Learning) 추천 시스템 실습을 통해서 현업에 활용한다.\n- 스파크 머신러닝(Spark Machine Learning)을 활용한 ELK 데이터 분석 실습을 통해서 현업에 활용한다.", "target": "- 소프트웨어개발자\n- 시스템 엔지니어등", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "두근두근 인공지능 - 개념편 -", "duration": "3:55:22", "contents": "11", "instructor": "유재명", "summary": "인공지능이 가져올 미래에 두근두근 하신가요?\nAI! AI! AI! 인공지능의 세상이 다가오고 있습니다.\n인공지능이 바꿀 우리의 미래가 기대되시나요? 두려우신가요?\n인공지능을 제대로 학습하고 인공지능을 맞이해 봅시다!", "goal": "인공지능과 머신러닝, 딥러닝의 개념을 이해할 수 있다\n인공지능이 분야별 적용 방법과 사례를 이해할 수 있다\n인공지능의 최근 동향 및 쟁점에 대한 이해할 수 있다", "target": "인공지능에 대한 관심이 있는 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "그림 못 그려도 OK! AI로 만드는 일러스트 (Illustrator AI)", "duration": "3:55:27", "contents": "8", "instructor": "김기민", "summary": "· 그림 실력이 없어도 누구나 시작할 수 있도록, AI 일러스트 제작의 기본 개념부터 실제 활용까지 단계적으로 학습합니다. · 텍스트 입력만으로 이미지를 생성하는 프롬프트 작성법을 익히고, 원하는 스타일과 분위기를 효과적으로 표현하는 방법을 이해합니다. · 다양한 AI 이미지 생성 도구를 활용해 캐릭터, 배경, 콘텐츠용 일러스트 등을 제작하며 창작 경험을 확장합니다. · 생성된 이미지를 수정·보완하는 방법을 함께 익혀, 개인 창작물, SNS 콘텐츠, 굿즈 제작 등 실생활에 바로 활용 가능한 결과물을 완성합니다.", "goal": "· AI 이미지 생성 도구의 기본 원리와 활용 방법을 이해하고, 스스로 원하는 이미지를 생성할 수 있습니다. · 목적에 맞는 프롬프트를 작성하여 스타일, 분위기, 구도 등을 구체적으로 제어할 수 있습니다. · 다양한 AI 도구를 활용해 캐릭터, 배경, 아이콘 등 여러 유형의 일러스트를 제작할 수 있습니다. · 생성된 이미지를 수정·보완하는 과정을 통해 완성도를 높이고, 실사용 가능한 결과물을 만들 수 있습니다. · AI 일러스트 제작 과정을 이해하고 개인 창작, 콘텐츠 제작, 간단한 디자인 작업에 능동적으로 활용할 수 있습니다.", "target": "· AI 기능이 탑재된 최신 Illustrator 2025를 체계적으로 배우고 싶은 초중급 학습자 · 아이콘, 그래픽 요소, 패턴, 포스터 등 실무에 활용 가능한 벡터 디자인을 직접 제작하고 싶은 예비 디자이너 · AI 기반 디자인 자동화와 효율적인 작업 방식으로 생산성을 높이고자 하는 크리에이터 및 마케터", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "처음 배우는 머신러닝(Machine Learning)", "duration": "3:55:45", "contents": "8", "instructor": "양진호", "summary": "머신러닝 초급자와 중급자를 위해서 자세한 개념과 실제 프로그램 코드를 통한 학습을 알아보자!", "goal": "1. AI, 머신러닝, 딥러닝 주요 개념과 구조를 이해하여 설명할 수 있다.\n2. 머신러닝의 활용 사례 학습을 통해서 현업에 활용할 수 있다.", "target": "- S/W 개발자\n- 시스템 엔지니어 등", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 노코드 RAG 끝판왕, 노트북LM으로 지식 관리 마스터하기", "duration": "3:56:35", "contents": "7", "instructor": "조은이", "summary": "LLM의 한계(최신성·정확성·신뢰성)를 극복하는  RAG(검색–증강–생성) 기술이 적용된 노트북LM으로,  신뢰도 높은 최신 지식을 관리하고 생성하자!", "goal": "1. 노코드 RAG 개념과 NotebookLM 핵심 기능을 이해하고 활용한다.\n2. 노트북LM을 활용하여 텍스트·영상·웹사이트 등 다양한 자료를 통합 분석하고, 이를 기반으로 신뢰성 있는 지식 관리를 수행한다.\n3. 단순 요약을 넘어 보고서·콘텐츠 제작 등 실제 업무에 적용 가능한 결과물을 AI로 생산한다.", "target": "1. 회의·프로젝트 자료가 쌓이지만 정리가 안 돼 매번 같은 정보를 다시 찾는 직장인\n2. 보고서·기획서 작성 시 출처 확보와 인용 검증에 시간을 허비하는 기획·분석 담당자\n3. AI 답변의 정확성을 믿지 못해 업무 전반에서 반복 검증과 재편집에 지친 마케터·기획자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT 실전 활용법, 사례로 배우는 정보 수집에서 문서작성까지", "duration": "3:56:39", "contents": "9", "instructor": "김진", "summary": "ChatGPT로 업무 시간을 줄이고 중요한 것에 집중하고 싶다면, 딱 이만큼만 알아두자!\n누구나 가능한 Chat GPT로 업무는 빠르고 쉽게, 내 워라벨은 높이 상승하는 마법!", "goal": "- 생성형AI의 기본 개념과 생성형AI 툴을 활용하여 구체적인 성과를 창출하는 프롬프트 엔지니어링 역량을 확보할 수 있다.\n- ChatGPT 사용법과 질문법을 확실하고 제대로 파악하고 사용할 수 있다.\n- 모든 업무에 ChatGPT 스킬을 활용하여 효율성을 높이고 업무시간을 단축시킬 수 있다. ", "target": "- 인공지능 시대에 꼭 필요한 생성형AI의 이론만 간단히 알고 싶은 직장인\n- 확실하고 제대로 된 ChatGPT 사용법과 질문법을 익혀 업무 효율을 높이고 싶은 직장인\n- ChatGPT를 내 업무에 활용하여 성과를 극대화하고 싶은 직장인", "level": "심화"}, {"cat1": "OA", "cat2": "포토샵", "title": "포토샵과 일러스트로 배우는 그래픽 디자인, 생성형 AI", "duration": "30:11:03", "contents": "50", "instructor": "신현숙", "summary": "* 2D 그래픽의 대표적인 비트맵 이미지 프로그램인 포토샵의 기본 기능을 이해하고, 이미지 편집과 합성, 다양한 그래픽 효과를 적용한 이미지 제작과 AI 기능을 활용한 시각 표현 확장으로 상상력과 재미를 더하는 시각이미지를 생성하여 디자인 분야에 다양하게 응용할 수 있도록 전문적인 이미지 제작 기술을 익히는데 그 목표를 둔다.\n* 2D 그래픽의 대표적인 벡터 드로잉 프로그램인 일러스트레이터의 기본적인 사용법을 이해하고 이를 활용한 이미지 제작과 AI 기능을 통한 이미지 표현를 극대화하여 창의적인 디자인 작업에 자유롭게 적용할 수 있는 전문적인 시각 표현 기술을 익히는데 그 목표를 둔다.", "goal": "1. 포토샵의 기본 기능을 이해하고 실습예제를 통해 사용법을 익힌다.\n2. 이미지 합성에 필요한 마스크 기능을 이해하고 여러 이미지에 적용할 수 있도록 한다.\n3. 이미지에 다양한 그래픽스타일을 적용하여 섬세하면서 감각적인 시각 효과를 높일 수 있도록 한다.\n4. AI 기능을 통한 새로운 이미지 생성과 불필요한 부분 제거,이미지 확장 등을 통해 새롭고 우연한 이미지 표현과 상상력을 채워주는 획기적인 이미지를 제작,창의적이며 전문적인 이미지 표현기술을 디자인에 활용할 수 있도록 한다.\n5. 일러스트레이터의 기본적인 도구 사용법을 익힌다.\n6. 다양한 벡터이미지를 제작할 수 있도록 여러 가지 형태를 실습한다.\n7. 일러스트레이터의 그래픽 효과를 이미지에 적용하여 표현력을 높이도록 한다.\n8. AI 기능을 활용하여 아이디어에 맞는 적합한 이미지를 빠르게 생성하고 퀄리티 높은 결과물을 제작하도록 한다.", "target": "- 포토샵, 일러스트 입문자 \n- 포토샵, 일러스트 기존버전 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "업무에 따라 골라 쓰는 생성형 AI 실전 매뉴얼", "duration": "4:00:03", "contents": "10", "instructor": "신성진", "summary": "업무에 따라 골라 쓰는 생성형 AI. 실전 활용법으로 업무 효율화 극대화하기!", "goal": "- 생성형 AI의 원리와 주요 도구의 특징을 설명할 수 있다.\n- 엑셀, 문서, 보고서 등 실무에 AI를 적용하는 방법을 알 수 있다.\n- 프롬프트 설계와 업무 자동화를 실천하고 AI 도입 시 유의점과 조직 내 활용 전략을 설명할 수 있다.", "target": "- 업무에 생성형 AI를 활용하고자 하는 모든 직장인\n- LLM, 생성형 AI의 실전 활용을 단기간에 이해하고 싶은 직장인\n- 조직의 업무 생산성 혁신을 고민하는 팀 리더와 관리자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "데이터는 답을 알고 있다! 데이터 기반 의사결정 DDDM", "duration": "4:05:18", "contents": "12", "instructor": "신경식", "summary": "데이터 기반 의사결정을 하려면 무엇을? 어떻게? 시작해야 하는가?\n\n데이터를 기반으로 의사결정을 내리면 주관적인 판단과 직관에 의한 결정으로 인한 오류를 최소화할 수 있으며, 다양한 리스크를 사전에 예측하고 빠르게 대처할 수 있습니다. 따라서 데이터 기반 의사결정은 기업이나 조직이 더 나은 의사결정을 내리고 경쟁 우위를 유지할 수 있도록 중요한 요소이기에 해당 과정을 통해 이러한 역량을 강화 시킨다면 데이터를 전략적 무기로 사용할 수 있을 것입니다. ", "goal": "1. 데이터 기반 의사결정의 필요성과 기초 개념을 알아본다.\n2. 데이터 기반 의사결정을 위한 데이터 및 시각화 분석 방법에 대한 이해도를 높인다.\n3. 데이터 기반 의사결정을 위한 데이터 모델링, 알고리즘에 대해 파악한다.", "target": "1. 데이터를 활용하는 방법을 알고 싶은 분\n2. 객관적이고 합리적인 의사결정을 하고 싶은 모든 직장인\n3. 데이터를 활용한 혁신과 경쟁력을 확보하고 싶은 모든 임직원", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[슬기로운 통계생활] R과 Python을 이용한 문서작성 자동화", "duration": "4:09:09", "contents": "11", "instructor": "이삭", "summary": "알고나면 절대 그 전으로는 못 돌아가는 문서자동화!\nR의 reticulate 패키지를 이용하여 R과 Python 코드를 문서에 삽입해 문서를 프로그래밍 하듯 작성해보자.", "goal": "- 마크다운을 사용하여 기본적인 문서 작성을 할 수 있다.\n- R과 Python 프로그래밍 코드를 사용한 문서 프로그래밍에 대해 이해할 수 있다.", "target": "- R을 활용해 어떤 다양한 분야의 업무를 수행할 수 있는지 궁금한 직장인\n- R마크다운에 대한 기본적인 지식을 쌓고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI Vibe(바이브) 코딩으로 게시판(WebBoard) 하루 만에 만들기 Part.1 Cursor AI 기초, 게시판디자인", "duration": "4:11:29", "contents": "10", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 Cursor AI 툴을 사용하여 게시판(WebBoard) 앱을 질문만으로 만들어보는 동영상 과정입니다.", "goal": "최신 AI 인공지능 툴을 사용하여 웹 프로그램을 개발합니다.", "target": "커서 AI 인공지능 툴을 사용하여 질문만으로 애플리케이션 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI Vibe(바이브) 코딩으로 TodoList App 하루 만에 만들기 Part.2 TodoList 앱 실습", "duration": "4:13:07", "contents": "8", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 Cursor AI 툴을 사용하여 TodoList 앱을 질문만으로 만들어보는 동영상 과정입니다.", "goal": "최신 AI 인공지능 툴을 사용하여 웹 프로그램을 개발합니다.", "target": "커서 AI 인공지능 툴을 사용하여 질문만으로 애플리케이션 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI-POT (AI 프롬프트활용능력) 1급 Part.2", "duration": "4:14:07", "contents": "7", "instructor": "강태안", "summary": "· 본 강좌를 통해 AI 플랫폼에 대한 이해와 개념을 학습할 수 있다. \n· 본 강좌를 통해 AI-POT 1급 자격증을 취득할 수 있다.", "goal": "· AI 프롬프트 활용능력에 대한 학습 및 여러가지 실습에 대한 이론 · 대화형 인공지능인 chatGPT에 대한 이해, 사용 방법에 대한 학습", "target": "· 남녀노소 누구나 학습 가능", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] AI 에이전트 스킬 업 - 초지능 에이전트 입문에서 실전까지", "duration": "4:19:14", "contents": "8", "instructor": "김진", "summary": "업무 비서를 넘어선 초지능 AI 에이전트 5가지 유형별 에이전트 사용 전략과 툴, 워크플로우 자동화까지!", "goal": "- AI 트렌드의 최전선에 있는 다양한 에이전트 기술을 이해할 수 있다.\n- 다양한 실제 업무에 AI 에이전트를 활용할 수 있다.\n- 코딩 에이전트를 활용하여 코딩 없이 AI 서비스를 개발할 수 있다.", "target": "- 반복적인 엑셀·보고서·자료 수집 업무로 하루가 빠르게 소모되는 실무자\n- 시장·경쟁사·고객 리서치를 더 깊이 있게 수행해야 하는 리서치 담당자\n- 코드 없이도 AI 서비스를 만들고 싶은 1인 기획자·PM/PO\n- 사내 AI 도입·자동화 프로젝트를 기획·리드해야 하는 팀장 및 실무 리더", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "빅데이터 분석 및 검색 시스템 구축을 위한 엘라스틱서치", "duration": "4:22:43", "contents": "10", "instructor": "노태상", "summary": "검색 분야에서 큰 주목을 받고 있고 많이 활용되고 있는 엘라스틱서치를 학습한다.", "goal": "- ELK(Elasticsearch+Logstash+Kibana)의 구조, 주요 개념 및 특징을 이해할 수 있다.\n- ELK의 구축 사례 학습을 통해서 현업에 활용할 수 있다.\n- Data Dashboard Workflow 사례, 빅데이터 모니터링 시스템 구축, 머신러닝 기반 ELK 시스템 구축 방법에 대해 이해할 수 있다.", "target": "- 소프트웨어개발자\n- 시스템 엔지니어 등", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 제미나이로 끝내는 구글 워크스페이스 업무 자동화 A to Z", "duration": "4:23:07", "contents": "7", "instructor": "서지연", "summary": "제미나이(Gemini)로 메일 관리부터 심층 보고서 작성까지, \n수많은 클릭 대신 프롬프트 한 줄로 끝내는 구글 워크스페이스 업무 자동화\n여러 앱을 오갈 필요 없이, 제미나이 하나로 끝내는 구글 워크스페이스 업무 자동화 A to Z\n- 제미나이와 구글 워크스페이스 앱을 연동하여 일정 관리, 보고서 작성, 데이터 분석, 영상 제작까지 AI로 업무 효율을 극대화하는 방법 제시\n- Gmail·Docs·Sheets·Drive 등에서 흩어져 반복적으로 하던 업무를 한 번의 명령으로 통합 처리하는 실무 자동화 방법 학습\n- 나만의 업무 챗봇 생성(Gem), 심층 보고서 작성(Deep Research), 노코드 워크플로우 시스템 구축(Opal) 등 고급 기능까지 다루는 실무 중심 과정\n- 강의에서 사용한 모든 핵심 프롬프트와 실습 자료를 그대로 업무에 적용할 수 있도록 제공", "goal": "- 메일 및 파일 관리, 보고서 작성, 영상 제작까지 Google AI 기능을 통합하여 활용할 수 있다.\n- Drive에서 바로 실행되어 Workspace 앱을 관통하는 AI 에이전트 체계를 활용할 수 있다.\n- Gems와 Opal을 활용한 코딩 없는 자동화 워크플로우를 설계할 수 있다.", "target": "- Gmail, Docs, Drive 등 구글 워크스페이스를 활용한 주요 업무를 효율화하고 싶은 직장인\n- 제미나이 하나로 워크스페이스 전체를 통합 제어하고 싶은 직장인\n- 디자인 기술 없이도 전문가 수준의 발표 자료와 영상을 만들고 싶은 직장인\n- 나만의 AI 시스템을 만들어 업무를 자동화하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Next Level 기획자_AI 서비스 기획의 기술", "duration": "4:25:07", "contents": "16", "instructor": "민규식", "summary": "AI 시대, 기획자의 역량은 다시 정의되고 있습니다. AI, 구경만 하는 기획자로 남으시겠습니까? \n기존 서비스에 AI를 입히고, 전혀 다른 혁신 서비스를 기획할 수 있는 역량이 필요한 모든 기획자에게 이 과정이 ‘실현 가능한 방법과 길’을 안내합니다. ", "goal": "- AI 적용 사례를 통해 현업에서 기획 가능 영역을 파악한다.\n- 직접 학습·API·오픈소스·상용 모델 등 상황별 적용 방법을 이해하고 적절한 모델을 선택할 수 있다.\n- AI 모델 최적화 및 최신 기술 동향, 비용 등 현실적 요소를 반영해 실무적 의사결정을 내릴 수 있다.\n- 윤리·보안 관점을 반영하여 기획을 수행할 수 있다.", "target": "- 서비스〮제품〮플랫폼 등 모든 비즈니스 영역에 AI를 도입하고자 하는 기획 실무자 및 관리자\n- 개발자, 개발자 모두 가능\n- 사전 지식 필요 없음", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "챗 GPT로 만드는 주식&암호화폐 자동매매 시스템", "duration": "4:30:31", "contents": "10", "instructor": "설근민", "summary": "코딩을 모르는 사람도 프로그램을 개발할 수 있습니다. 챗GPT에 질문하고, 챗GPT가 만든 코드를 복사해서 붙여넣기만 해도 프로그램이 뚝딱 만들어지는데 중요한 것은 프로그래밍 언어를 아는 것이 아니라, 문제 해결 방식을 떠올리는 것입니다. 어떤 데이터를 어떻게 수집하고, 어떤 모듈로 예측 모델을 만들고, 어떤 조건으로 종목 추천을 받을지 생각했다면, 챗GPT를 이용해 자동매매 시스템으로 조합하는 것은 더 이상 어렵지 않습니다. 증권사 트레이더에게 챗GPT를 활용하는 방식을 배우고, 초보자도 이해하기 쉬운 파이썬으로 직접 프로그램을 만들면서 자연스럽게 코딩 지식과 금융 지식을 익혀보시기 바랍니다. ", "goal": "- 챗GPT를 활용하여 주식과 암호화폐를 자동으로 매매하는 시스템을 만들 수 있다. \n- 시스템 구축 과정을 실습하면서 데이터 처리부터 프로그램 개발까지 \n전 과정을 간접 경험할 수 있다. ", "target": "- 코딩을 몰라도 프로그래밍을 해보고 싶은 사람\n- 주식과 암호화폐를 자동으로 매매하는 시스템을 직접 구축해 보고 싶은 사람", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 회사가 원하는 효율적인 AI활용 - AI 구조화 프롬프트로 엑셀 정복하기", "duration": "4:31:21", "contents": "7", "instructor": "최정아", "summary": "코딩 걱정 NO! 보안 걱정 NO! AI 구조화 프롬프트로 엑셀 정복!\n데이터 업로드 없이 엑셀 수식/함수/매크로VBA 만들기!", "goal": "1. 회사 데이터를 안전하게 묘사하여 정확한 엑셀 수식과 VBA 매크로를 생성할 수 있다.\n2. 복잡한 엑셀 업무에 맞춰 TCI 프레임워크를 적용할 수 있다.\n3. AI를 활용하여 복잡한 함수 업무를 대체하고 실무 테크닉을 구사할 수 있다.\n4. 코딩 지식 없이 AI가 생성한 VBA/매크로를 실행하여 엑셀 업무 자동화를 실현할 수 있다.", "target": "1. 보안 상 회사 데이터를 AI에 그대로 업로드하기 곤란한 직장인\n2. 함수는 어렵고 VBA는 더 어려워서 엑셀 자동화를 포기한 실무자\n3. 팀의 엑셀 업무 효율을 높여 성과를 끌어올리고 싶은 팀장/관리자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[DS Class] DNN, CNN, RNN을 활용한 딥러닝 실무", "duration": "4:35:00", "contents": "7", "instructor": "김진숙", "summary": "딥러닝의 전반적인 개발 과정을 살펴보고 다양한 알고리즘으로 딥러닝 모델을 개발해보는 학습 과정을 자세히 다루며, 각 모델별 장단점 및 적용 사례 실습을 알아보고, 실제 코드를 입력하며 각 모델간 차이를 확인하고 딥러닝 알고리즘을 활용해보세요!", "goal": "- 딥러닝의 알고리즘 종류인 DNN을 활용한 글씨 분류 프로젝트에 대해 알 수 있다.\n- CNN(합성곱 신경망)을 활용한 글씨 분류 프로젝트를 알고 활용할 수 있다.\n- RNN(순환 신경망)을 활용한 영화 리뷰 분석을 수행할 수 있다.", "target": "- 딥러닝의 기초 활용을 넘어 실제 IT기업들이 활용하고 있는 심화 인공지능 분석 역량을 갖추고 싶은 실무자\n- 리뷰 및 시장조사 등 방대한 인터넷 안의 데이터를 효과적으로 활용하고 싶은 마케터", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "텐서플로로 배우는 딥러닝", "duration": "4:36:28", "contents": "10", "instructor": "양진호", "summary": "딥러닝 초/중급자를 위해서 자세한 개념과 실제 프로그램 코드를 통한 학습이 가능하다.", "goal": "- AI, 머신러닝, 딥러닝 주요 개념과 구조를 이해하여 설명할 수 있다.\n- 실제 딥러닝 프로그램 코드를 작성할 수 있다.", "target": "- 소프트웨어개발자\n- 시스템 엔지니어 등", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI에게 좋은 답을 얻으려면, AI처럼 생각하라! 컴퓨팅 사고력", "duration": "4:36:49", "contents": "12", "instructor": "전수진, 박주연, 김수환", "summary": "인공지능이 사람의 영역을 대체해 가고 있는 시대, 복잡한 문제를 단순화하고 논리적으로 해결하는 컴퓨터 문제 해결 능력 이해가 필수! \n직장인 일잘러의 기본은 효율적인 일처리! 이를 위해서는 업무 내용을 빠르게 파악하고, 복잡한 업무를 알기 쉽게 쪼개고, 업무에 꼭 필요한 정보를 분석해서 단계적으로 처리하는 능력입니다. 이게 바로 컴퓨팅 사고력(Computational Thinking)으로 복잡하고 어려운 문제를 분해, 추상화, 패턴인식, 알고리즘 등 컴퓨터 과학의 기본 원리를 적용하여 창의적이고 논리적으로 문제를 해결하고자 하는 사고방식입니다.", "goal": "1. 컴퓨팅 사고력의 필요성과 개념을 이해할 수 있다.\n2. 컴퓨팅 사고력의 하위요소인 문제해결, 패턴인식, 추상화, 알고리즘, 자동화 기법을 활용하여 다양한 문제 상황에 적용해 볼 수 있다. ", "target": "컴퓨팅 사고력에 기반한 문제해결에 관심있는 구성원", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 분석 전처리 실무, 파워쿼리 Part.1", "duration": "4:37:55", "contents": "7", "instructor": "최정아", "summary": "데이터 분석의 시작, 데이터 전처리! 파워쿼리(PowerQuery)로 더욱 손쉽게 배워보자.", "goal": "1. 업무에 실질적인 성과를 가져다주는 데이터 전처리 방법을 습득할 수 있다.\n2. 다양한 데이터를 쉽고 빠르게 연결하고 가져오기 기능을 익힐 수 있다. \n3. 각종 자료의 수집, 편집 가공을 손쉽게 자동화할 수 있다.", "target": "- 데이터 전처리가 중요한 업무를 담당하는 직장인\n- 함수보다 쉽고 직관적인 엑셀 데이터 분석을 하고 싶은 직장인\n- 길어지는 컴퓨터 작업에 거북목이 된 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 사이언스 실무 고급 분석", "duration": "4:38:12", "contents": "8", "instructor": "김진", "summary": "업무 시간 줄여주는 효율적인 엑셀 100% 활용하기!", "goal": "1. 반복 작업을 파워쿼리로 자동화하여 업무 효율을 높일 수 있다. \n2. 파워피벗을 통해 데이터간 관계를 설정하고 데이터 모델링 역량을 기를 수 있다. \n3. 엑셀 데이터 분석 결과를 심화 시각화 도구인 파워BI로 더 다양하고 강력하게 시각화할 수 있다. ", "target": "- 방대한 양의 데이터를 엑셀로 분석, 처리, 관리하고 싶은 분\n- 데이터 전처리를 쉽게 오류 없이 해내고, 엑셀 업무를 자동화하여 업무 효율을 높이고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "시간 도둑 데이터 분석, 빠르게 끝내는 파이썬 활용법", "duration": "4:38:53", "contents": "12", "instructor": "정선경", "summary": "데이터 분석 완전정복, 아직 늦지 않았다!\n 본 과정을 통해 파이썬을 통한 데이터 분석의 기본 이론부터 심화 실습까지 한 번에 마스터 가능하며, 파이썬을 통한 데이터의 생성부터 데이터 추출까지 업무 효율을 높이는 파이썬 데이터 분석의 A to Z 제공한다.", "goal": "- 파이썬의 설치부터 가상 환경을 이용한 업무 환경 구축 방법을 배울 수 있다. \n- 파이썬 데이터 분석 프로세스의 기본 개념을 배울 수 있다. \n- 데이터 구조 파악부터 실전 분석 프로젝트까지의 파이썬 실무 실습을 할 수 있다.\n- 엑셀 데이터를 파이썬으로 손쉽게 처리하는 업무자동화 역량을 강화할 수 있다.", "target": "- 파이썬을 통한 데이터 분석에 관심있는 직장인\n- 파이썬 사용법을 익혀 높은 업무 효율을 경험하고 싶으신 분\n- 데이터 분석 역량을 키우고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 사이언스 입문 부트캠프 Part.1", "duration": "4:40:19", "contents": "9", "instructor": "김진", "summary": "어렵고 복잡한 통계는 그만, 데이터 분석에 핵심이 되는 통계 지식만 추려내어 실무에 바로 적용하자! 엑셀을 활용해 다양한 예제와 시뮬레이션, 실습을 통해 몸으로 느끼며 이해하는 통계를 학습한다. ", "goal": "1. 데이터 사이언스에 대한 기본적인 이해를 통해 데이터 중심적 사고와 일하는 역량을 강화할 수 있다.\n2. 목적에 맞게 데이터를 가공하고 데이터 처리 시 알아야 할 핵심 통계 방법에 대해 설명할 수 있다.", "target": "- 데이터 기반의 업무를 하고 있는 직장인\n- 데이터 분석에 대한 전반적인 이해가 필요한 직장인", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 비즈니스 애널리틱스, 데이터 기반 전략 수립 실무 마스터 클래스", "duration": "4:44:05", "contents": "7", "instructor": "최정아", "summary": "실습을 통해 데이터 기반의 전략 수립 실무 마스터하기!", "goal": "1. 비즈니스 설득력을 극대화하는 최적의 데이터 시각화를 진행할 수 있다. \n2. 데이터의 논리적 연결, 점 추정과 구간 추정의 필수 개념을 익힐 수 있다. \n3. 데이터 표를 활용한 상품 할인률과 판매수량의 민감도 분석, 시나리오 관리자를 활용한 다중 변수의 민감도 분석 방법을 실행할 수 있다. ", "target": "- 여러 비즈니스 문제를 데이터로 해결해보고 싶은 직장인\n- 엑셀을 활용한 비즈니스 데이터 분석을 진행하고 싶은 직장인\n- 실무 의사결정에 전략적 통찰력을 가지고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[ITⓔ코칭] 파이썬으로 시작하는 친절한 코딩클래스", "duration": "4:45:48", "contents": "10", "instructor": "김영아", "summary": "프로그래밍 언어 중 가장 많이 활용되고 있는 파이썬! 다양한 분야에 활용되고 있는 만능 언어 파이썬으로 프로그래밍을 시작해보자.", "goal": "1. 파이썬의 용어, 수행방법 등 파이썬의 기본기를 다질 수 있다.\n2. 파이썬을 수행하는 데 있어 핵심적인 지식과 함께 실무 능력을 쌓을 수 있다.\n3. 다양한 분야의 실무에서 파이썬을 활용할 수 있다.", "target": "- 파이썬에 관심 있거나 파이썬을 처음 접하는 직장인(개발자)\n- 파이썬의 용어, 수행방법 등에 대한 기본기를 탄탄히 다지고, 실무 능력을 향상시키고 싶은 현업 종사자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "왕초보를 위한 ChatGPT로 배우는 파이썬", "duration": "4:46:49", "contents": "10", "instructor": "윤근식", "summary": "디지털 시대, 왜 직장인에게 코딩 리터러시가 필요할까요?\n\nChatGPT와 같은 생성형 AI가 업무 방식을 혁신하고 있는 지금, 코딩 리터러시(Coding Literacy)는 더 이상 개발자만의 전유물이 아닙니다. \n모든 직장인에게 중요한 경쟁력으로 자리 잡고 있습니다. 코딩 리터러시는 단순히 프로그램을 개발하는 능력을 의미하지 않습니다. 데이터와 시스템이 어떻게 작동하는지 이해하고, 문제를 논리적으로 해결하며, 자동화된 솔루션을 활용하는 사고 방식을 포함합니다.", "goal": "- AI 시대, 컴퓨터와 사람의 상호작용을 이해하고, 컴퓨터와 직접 소통할 수 있는 도구인 코딩과 이를 읽는 능력을 향상시킬 수 있습니다.\n- ChatGPT에게 받는 맞춤형 가이드(단계별 프롬프트와 예제)를 통해 쉽게 따라할 수 있으며, 구체적인 질문과 내용 설명으로 파이썬을 학습할 수 있습니다.\n- 학습 내용을 바탕으로 간단한 프로그램을 만들어 볼 수 있도록 구성할 수 있습니다.", "target": "- 나이나 배경에 관계없이 프로그래밍을 처음 배우고 싶은 성인학습자\n- 챗GPT와 같은 AI 도구를 활용해 새로운 기술을 배우고자 하는 사람\n- 업무 자동화, 데이터 분석 등 실질적인 목적으로 파이썬을 배우고자 하는 일반인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 일잘러 장피엠과 ChatGPT 업무 300% 활용하기", "duration": "4:47:01", "contents": "16", "instructor": "장병준", "summary": "ChatGPT를 나만의 AI Agent로 만들기 위한 실습 마스터 클래스!", "goal": "- 체계적이고 구조화된 프롬프트를 작성할 수 있다.\n- ChatGPT로 전문적이고 완성도 높은 업무 문서를 작성할 수 있다.\n- 업무 프로세스를 자동화 및 고도화 하여 업무 효율성을 극대화할 수 있다.", "target": "- 체계적이고 구조화된 프롬프트를 작성하고자 하는 재직자\n- ChatGPT로 다양한 종류의 업무 관련 문서를 전문성 있게 작성하고자 하는 재직자\n- ChatGPT를 API 또는 외부 애플리케이션에 연동하여 업무 프로세스를 자동화 및 고도화 하고자 하는 재직자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 문서, 이미지, 영상 제작부터 바이브 코딩까지 한 번에! AI 통합 플랫폼, 구글 AI 스튜디오 완전정복", "duration": "4:48:36", "contents": "9", "instructor": "정옥선", "summary": "문서·이미지·영상·앱 제작까지 한 번에 끝내는\n실무형 구글 AI 스튜디오 완전정복 과정", "goal": "- 구글 AI 스튜디오의 핵심 기능과 사용 목적을 단계별로 설명할 수 있다.\n- 구글 AI 스튜디오를 활용하여 하나의 플랫폼에서 업무 환경을 구성할 수 있다.\n- Streaming Responses(실시간 응답 기능)을 활용하여 AI와의 상호작용 효율을 향상시킬 수 있다.\n- 전문 기술이 필요한 업무를 AI 기능(App Builder·자동화 기능 등)을 활용해 수행할 수 있다.", "target": "- 구독료는 늘어나는데 결과물은 여전히 불만족스러운 직장인\n- 코딩 없이 나만의 AI 앱을 만들어보고 싶은 기획자/PM\n- 마케팅 이미지와 영상 콘텐츠를 빠르게 만들어야 하는 마케터", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI와 플러그인으로 Figma에 날개 달기", "duration": "4:49:08", "contents": "11", "instructor": "김대일", "summary": "디자이너들에게 가장 각광받는 툴, Figma\nAI활용과 무료 플러그인으로 남들보다 쉽고, 빠르고, 퀄리티 있게 디자인하자! \n본 과정을 통해 Figma의 기초 개념부터 바로 사용할 수 있는  툴 사용법까지. 실제 실무에서 작업하는 방식을 따라하며, 원하는 결과물을 빠르게 뽑아낼 수 있는 피그마 A to Z를 배울 수 있다.", "goal": "- Figma의 기본 기능과 플러그인 활용 방법을 알 수 있다.\n- 인공지능 플러그인을 활용한 고효율 작업 방식을 경험할 수 있다.\n- 최종 프로젝트를 통한 실제 앱 화면을 디자인할 수 있다. ", "target": "- Figma를 배우고 싶은 직장인\n- UI/UX 디자인 기술을 향상시키고 싶은 디자이너\n- 인공지능을 활용하여 작업 효율을 높이고자 하는 프로덕트 디자이너 및 웹 디자이너\n- AI를 활용한 디자인 시스템과 컴포넌트 관리에 관심 있는 모든 디자인 관련 직군의 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 기반 디지털 트랜스포메이션(DT) 전략 마스터 클래스", "duration": "4:51:44", "contents": "9", "instructor": "김진", "summary": "현실적인 데이터로 전략적 의사결정 실무 마스터하기!", "goal": "1. 디지털 환경 속 전략적 의사결정 과정에 대해 이해할 수 있다. \n2. 데이터가 조직의 DT 전략 수립에 적용되는 실질적인 방향성에 대해 이해할 수 있다. \n3. 업무 방식에 DT를 적용하고 비즈니스 모델의 변화를 이끌어내는 능력 함양할 수 있다. ", "target": "- 디지털 환경의 경영진에게 필요한 전략적 의사결정 과정을 배우고 싶은 분들\n- 심화 분석을 쉽게 활용하여 성과를 창출하고 분들\n- 실제 데이터를 통해 적절한 상황 판단과 모델링에 대해 배우고 싶은 분들", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "일센스 터진다 - 진짜 실무에 먹히는 노코드 AI 데이터분석(개발 업무편)", "duration": "4:55:48", "contents": "12", "instructor": "이기복", "summary": "코딩 몰라도 데이터는 읽는다, 일센스 터지는 노코드 AI 분석의 모든 것! 엑셀, PPT, 구글시트만 쓸 줄 알아도 이젠 데이터 분석, AI가 대신해드립니다.\n복잡한 통계나 코딩 없이도, 실무에 바로 써먹을 수 있는 노코드 AI 분석의 스킬과 감각을 동시에 챙겨보세요. 당신의 일센스, AI로 터지게 해드립니다.", "goal": "코딩 없이 AI 도구를 활용해 데이터 수집부터 분석·시각화까지 실무에 적용할 수 있는 역량을  기를 수 있습니다.", "target": "데이터를 활용하여 개발 업무를 하고 있는 구성원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "일센스 터진다 - 진짜 실무에 먹히는 노코드 AI 데이터분석(비개발 업무편)", "duration": "4:56:49", "contents": "12", "instructor": "이기복", "summary": "코딩 몰라도 데이터는 읽는다, 일센스 터지는 노코드 AI 분석의 모든 것! 엑셀, PPT, 구글시트만 쓸 줄 알아도 이젠 데이터 분석, AI가 대신해드립니다.\n복잡한 통계나 코딩 없이도, 실무에 바로 써먹을 수 있는 노코드 AI 분석의 스킬과 감각을 동시에 챙겨보세요. 당신의 일센스, AI로 터지게 해드립니다.", "goal": "코딩 없이 AI 도구를 활용해 데이터 수집부터 분석·시각화까지 실무에 적용할 수 있는 역량을  기를 수 있습니다.", "target": "데이터를 활용하여 개발 업무를 하고 있는 구성원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Cursor AI (커서) 입문에서 실전 웹사이트 만들기까지 Part.2 실습 (웹사이트 만들기 1)", "duration": "4:57:49", "contents": "10", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 툴에 대한 기초 사용법과 이를 사용한 실전 웹사이트 만들기에 대해서 배우는 동영상 과정입니다.", "goal": "- 최신 AI 인공지능 툴을 사용하여 모던한 웹사이트 구축 과정을 학습합니다.", "target": "- 커서 AI 인공지능 툴을 사용하여 실전 웹사이트를 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "업무 효율을 높이는 AI Microsoft Copilot Part.2 오피스365 자동화 활용 1", "duration": "4:58:05", "contents": "9", "instructor": "강다빈", "summary": "전통적인 업무 방식에서 AI 협업으로의 패러다임 전환을 통해 오피스 365 전 영역에 걸친 AI 자동화 솔루션을 학습합니다. 효과적인 프롬프트 엔지니어링 기법과 프롬프트 사례 분석을 통해 단순한 도구 사용법을 넘어 AI의 한계점 이해와 비판적 검토 능력까지 함양합니다. 실무 현장에서 즉시 적용 가능한  단계별 실습 예제를 통해 업무 효율성을 높이고, AI를 통해 업무 자동화 기능을 사용할 수 있습니다.", "goal": "Copilot을 통하여 보고서, 제안서, 회의록 등 다양한 비즈니스 문서를 자동 생성하고 맞춤형 편집할 수 있다. Excel Copilot을 활용하여 복잡한 데이터셋을 자동 분석하고, 피벗테이블, 고급 함수, 예측 모델을 생성할 수 있다. PowerPoint Copilot을 통해 아이디어 구상부터 슬라이드 구성, 디자인, 스토리텔링까지 전 과정을 자동화할 수 있다.", "target": "Microsoft 365를 업무에 활용하는 모든 직장인 AI 기반 업무 자동화에 관심 있는 실무자 및 관리자 교육 현장에서 AI 도구 활용이 필요한 교육자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 마케터를 위한 Excel·Orange 실전: 고객 선택 분석부터 재구매 예측까지", "duration": "4:58:50", "contents": "12", "instructor": "최정아", "summary": "고객은 ‘무엇을’, ‘왜’ 선택할까? \n데이터를 통해 고객의 선택의 이유를 이해하고, 미래 행동까지 예측하는 과정!\n\n본 과정은 고객 분석을 단편적으로 배우는 것이 아니라, 고객 이해 → 추천 → 검증 → 선택 요인 분석 → 고객 가치 및 예측까지 하나의 흐름으로 구성되어 있다.\n연관상품 분석, 추천시스템, A/B 테스트, 회귀분석을 통해 고객의 선택 이유를 분석하고 검증하는 방법을 익히고, 이후 LTV, 이탈 리스크, 생존 확률 분석까지 확장하여 어떤 고객이 중요한 고객인지 판단하고 예측하는 방법까지 다룬다.", "goal": "1. 고객의 선택과 행동 패턴을 데이터 기반으로 이해하고 설명할 수 있다.\n2. 고객의 선택을 유도하는 요인을 분석하고 추천 및 전략으로 연결할 수 있다.\n3. 고객 가치와 이탈 가능성을 바탕으로 중요한 고객을 식별하고 미래 행동을 예측할 수 있다.", "target": "1. 다양한 직무에서 필수적인 고객 이해 역량이 필요한 직장인\n2. 단순 지표 분석을 넘어 의사결정에 쓰이는 데이터 분석을 하고 싶은 직장인\n3. 고객의 행동과 중요도를 데이터로 설명하고 싶은 직장인\n4. 통계나 분석 툴이 부담되지만, 개념과 해석 중심으로 분석 사고를 익히고 싶은 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI-POT (AI 프롬프트활용능력) 2급 Part.2 프롬프트", "duration": "4:59:04", "contents": "8", "instructor": "강태안", "summary": "· 본 강좌를 통해 AI 플랫폼에 대한 이해와 개념을 학습할 수 있다. \n· 본 강좌를 통해 AI-POT 2급 자격증을 취득할 수 있다.", "goal": "· AI 프롬프트 활용능력에 대한 학습 · 대화형 인공지능인 chatGPT에 대한 이해, 사용 방법에 대한 학습", "target": "· 남녀노소 누구나 학습 가능", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "업무 효율을 높이는 AI Microsoft Copilot Part.2 오피스365 자동화 활용 2 (完)", "duration": "5:00:49", "contents": "9", "instructor": "강다빈", "summary": "전통적인 업무 방식에서 AI 협업으로의 패러다임 전환을 통해 오피스 365 전 영역에 걸친 AI 자동화 솔루션을 학습합니다. 효과적인 프롬프트 엔지니어링 기법과 프롬프트 사례 분석을 통해 단순한 도구 사용법을 넘어 AI의 한계점 이해와 비판적 검토 능력까지 함양합니다. 실무 현장에서 즉시 적용 가능한  단계별 실습 예제를 통해 업무 효율성을 높이고, AI를 통해 업무 자동화 기능을 사용할 수 있습니다.", "goal": "Copilot을 통하여 보고서, 제안서, 회의록 등 다양한 비즈니스 문서를 자동 생성하고 맞춤형 편집할 수 있다. Excel Copilot을 활용하여 복잡한 데이터셋을 자동 분석하고, 피벗테이블, 고급 함수, 예측 모델을 생성할 수 있다. PowerPoint Copilot을 통해 아이디어 구상부터 슬라이드 구성, 디자인, 스토리텔링까지 전 과정을 자동화할 수 있다.", "target": "Microsoft 365를 업무에 활용하는 모든 직장인 AI 기반 업무 자동화에 관심 있는 실무자 및 관리자 교육 현장에서 AI 도구 활용이 필요한 교육자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 파이썬 데이터 분석 머신러닝, 머신러닝 본격 시작하기", "duration": "5:01:53", "contents": "9", "instructor": "김진숙", "summary": "머신러닝 학습을 통해 데이터 기반 의사결정 능력을 키워보자!", "goal": "- 파이썬 머신러닝 패키지 사이킷런을 이해하고 프레임 워크를 정리할 수 있다. \n- 실전 사례와 사이킷런 실습으로 실무에서 주요하게 쓰이는 알고리즘의 핵심을 이해하고 건강 진단 데이터 전처리, 주택가격예측, 와인데이터셋 분류를 직접 해낼 수 있다. ", "target": "- 데이터를 기반으로 다양하게 분석하고 미래를 예측하고 싶은 직장인\n- 빠르고 정확하게 분석된 예측과 결과로 의사결정을 효율적으로 하고 싶은 직장인", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "현직 AI 디자인 전문가가 알려주는 미드저니 클래스", "duration": "5:01:59", "contents": "10", "instructor": "양솔지", "summary": "이미지 생성형 인공지능의 대표 툴, Midjourney!\n기초 사용 방법부터 실제 디자인 프로젝트 실습을 통한 실무 적용까지 한번에!", "goal": "- 대표적인 이미지 생성 인공지능 도구인 미드저니에 대해 이해하고 입문할 수 있다.\n- 이미지 생성 방법과 미세 조정을 통해 원하는 이미지를 생성해내는 방법을 이해할 수 있다.\n- 다양한 대상에 맞게 여러 기능을 활용하여 적절한 이미지를 생성할 수 있다.\n- 실제 업무에서 활용 가능한 실무 디자인 이미지를 생성할 수 있다.", "target": "- 생성형 인공지능에 관심이 있는 누구나\n- 디자인 업무의 소요 시간과 비용을 획기적으로 단축하고 싶은 디자이너\n- 디자이너 채용으로 인한 비용과 외주 제작으로 인한 비용이 부담스러운 창업자\n- 높은 퀄리티의 이미지를 빠르게 생성하고 싶은 모든 실무자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[ICT 지식 큐브] 인공지능과 디지털보안", "duration": "5:03:53", "contents": "10", "instructor": "이정하/박수민/김준삼", "summary": "다양한 업무영역 크로스오버가 가능한 IT 전문 기술자를 양성하자.", "goal": "- ICT 기술 트렌드, 비즈니스 및 ICT 기술 융합 등 단순하고 명확한 개념설명과 사례를 기반으로 짧은 시간 내 내재화가 가능하도록 핵심 내용을 중심으로 학습한다. \n- 다양한 업무영역 크로스오버가 가능한 IT 전문 기술자 양성이 가능하며, 전문 자격 취득을 위한 에센스를 제공한다.", "target": "- 정보화에 관심이 있는 자\n- ICT 기술 관련 전문직 종사자, 시스템 및 소프트웨어 엔지니어 및 IT 전문 역량 강화 희망자\n- ICT 전문자격(정보관리/컴퓨터시스템응용기술사, 정보시스템감리사 등) 취득에 관심이 있는 분", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 다양한 실습 파일로 배우는 ChatGPT 실전 데이터 분석", "duration": "5:04:16", "contents": "9", "instructor": "이상미", "summary": "AI 기술 트렌드에서 엿볼 수 있는 비즈니스 기회 창출 인사이트", "goal": "- 데이터 분석 6단계 프로세스와 Zero-shot, Few-shot 프롬프트 작성법을 설명할 수 있다.\n- 데이터 크롤링부터 결측치, 이상치 자동 탐지까지 자연어로 데이터 정제 전반을 수행할 수 있다.\n- 빅데이터 분석 수행 결과를 활용하여 ChatGPT Canvas로 보고서 작성까지 완료할 수 있다.", "target": "- 짧은 시간에 효율적으로 데이터 기반의 분석과 보고를 수행해야 하는 실무자\n- 성과를 데이터로 관리하고 전략을 수립해야 하는 관리자\n- 데이터 분석 스킬로 업무 경쟁력을 높이고 싶은 모든 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[ICT 아카이브] 빅데이터 핵심과 비즈니스모델", "duration": "5:05:12", "contents": "8", "instructor": "장형석", "summary": "빅데이터 처리와 분석을 통한 Business Insight!", "goal": "- 빅데이터의 기본 개념과 필요성을 이해할 수 있다.\n- 빅데이터 분석을 위한 핵심 기술들을 이해할 수 있다.\n- 빅데이터 분석 기법과 머신러닝 알고리즘을 이해할 수 있다.  \n- 빅데이터를 실무에 적용하기 위한 전략과 준비 과정을 이해할 수 있다. ", "target": "- 빅데이터 분석을 통해 실무활용이 필요한 모든 임직원\n- IT 업종, 마케팅 및 통계, 정보처리, 전략 및 기획 담당자\n- 빅데이터 플랫폼 및 머신러닝 알고리즘에 관심있는 IT종사자\n- 빅데이터에 관심있는 모든 임직원", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 리터러시, 데이터 읽고 쓰기의 기술", "duration": "5:09:14", "contents": "10", "instructor": "김진", "summary": "초보자도 데이터 리터러시 역량을 얻을 수 있는 친절한 데이터 활용 가이드! ", "goal": "1. 데이터 자체의 상품성부터 비즈니스에서의 데이터 활용이라는 메가 트렌드를 이해하며 디지털 트랜스포메이션의 기반을 다질 수 있다.\n2. 비즈니스 문제를 데이터 분석 기반 인사이트로 해결하고 조직의 데이터 기반 전략 수립에 기여할 수 있다. \n3. 데이터 시각화 역량까지 습득하여 분석 결과를 효과적으로 커뮤니케이션할 수 있다.", "target": "- 데이터 분석 기반의 업무를 하고 있는 직장인\n- 데이터셋을 분석하며 실무에 바로 적용할 수 있는 역량을 높이고 싶은 직장인 ", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 디자인 자동화 끝판왕, Canva AI로 생성형 디자인 마스터하기", "duration": "5:17:07", "contents": "11", "instructor": "조은이", "summary": "디자인 비전문가도 OK! 압도적 세계 1위 디자인 플랫폼 Canva(캔바)로 완성하는 올인원 비주얼 업무\n기획부터 자동화까지 한 곳에서 해결하는 Canva의 핵심 기술과 실무 활용법\n- 세계 1위 디자인 플랫폼 Canva의 AI 매직 스튜디오 완전 정복\n- AI 트렌드와 실무 활용을 꿰뚫는 전문가, 조은이 강사의 명쾌한 최신 실무 스킬 강의\n- 따라만 하면 고퀄리티 결과물이 뚝딱, 실습용 데이터 및 프롬프트 템플릿 제공", "goal": "- Canva AI 3대 핵심 기능을 업무 상황별로 활용할 수 있다.\n- 로고·색상·폰트를 고정해 일관성 있는 스타일의 결과물을 산출할 수 있다.\n- 반복 제작을 자동화해 여러 결과물을 한번에 생성할 수 있다.", "target": "- PPT, 보고서, 홍보물 디자인이 어려운 비전공자 직장인\n- 작업 결과물 통일성 부족으로 고민인 마케터·기획자\n- 카드뉴스·배너·이벤트 홍보물처럼 반복 제작이 많은 업무를 담당하는 실무자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 사이언스 입문 부트캠프 Part.2", "duration": "5:17:42", "contents": "10", "instructor": "김진", "summary": "현실에서 마주하는 다양한 비즈니스 문제를 데이터 분석 프레임워크에 따라 해결하며 직무에 바로 응용하자! 데이터 수집부터 전처리, 가설 도출부터 비즈니스 의사결정까지 데이터 분석 역량을 함양하고 머신러닝까지 입문해보자.", "goal": "1. 데이터 분석의 핵심인 데이터 전처리에 대해 알고 데이터 분석 도구를 활용할 수 있다.\n2. 분석 모델 기반의 실습을 통해 데이터를 효율적으로 관리하고 분석할 수 있다.", "target": "- 업무에서 데이터를 활용하고 싶은 직장인\n- 비즈니스 데이터 분석 능력을 키우고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 비즈니스 애널리틱스, 데이터 기반 마케팅 영업 전략 실무 마스터 클래스", "duration": "5:19:16", "contents": "8", "instructor": "최정아", "summary": "콘텐츠 기반 추천과 유사한 사용자 기반 추천 알고리즘의 차이를 이해하고, 간단한 통계 함수를 통해 마케팅/세일즈에서 두루 활용되는 개념을 실제 데이터로, 가장 실용적인 도구로 원본 데이터에서 결론까지 도출해내자.", "goal": "1. 데이터 기반 프로젝트를 운영할 수 있는 역량을 확보할 수 있다. \n2. 고객 이탈을 방지하기 위한 코호트 분석 등 고객 세그먼트 분류 및 집중할 고객을 선별할 수 있다.\n3. 매출액을 기준으로 RFM 분석을 실시하고, RFM 세그먼트를 활용할 수 있다. ", "target": "- 여러 비즈니스 문제를 데이터로 해결해보고 싶은 직장인\n- 엑셀을 활용한 비즈니스 데이터 분석을 진행하고 싶은 직장인\n- 실제 데이터로 마케팅 영업 전략을 세우고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 파이썬 NumPy와 Pandas 이해하기", "duration": "5:22:34", "contents": "10", "instructor": "김진숙", "summary": "NumPy, Pandas를 활용한 데이터 분석 실무를 직접 경험하자!", "goal": "1. Numpy를 활용하여 데이터 프레임을 분석 목표에 맞게 구성하고 조정할 수 있다. \n2. Pandas를 활용하여 삼성전자 주가를 시계열 분석으로 예측하고 서울시 인구 현황과 외국인 관광객 현황, 은행 고객을 직접 분석해볼 수 있다.", "target": "- 파이썬을 실무 업무에 바로 적용하고 싶은 직장인\n- 파이썬 데이터 분석 패키지로 손쉽게 코딩에 입문하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 코파일럿으로 MS365 핵심 기능 200% 활용하기", "duration": "5:24:48", "contents": "12", "instructor": "김종오", "summary": "코파일럿으로 업데이트하는 MS365 6개 툴별 실무 핵심 기능\n엑셀, 워드, 파워포인트, 아웃룩, 원노트, 팀즈까지,\n회사에서 매일 쓰는 툴의 활용능력이 코파일럿을 만나면 갑자기 레벨업 된다?\n많은 시간을 들여 기능을 하나하나 외워야 하는 OA 클래스가 없이도\n나만의 업무 비서 코파일럿의 도움을 받아 필요한 결과물을 쉽게 얻을 수 있다.\n본 과정은 코파일럿의 개념과 기본 사용법부터 시작하여, 업무 흐름에 따라 회의부터 자료 작성, 분석, 발표까지 업무 흐름에 따라 코파일럿을 활용해 업무 효율을 극대화할 수 있는 기능들을 안내한다. MS365 MVP 출신 전문가가 알려주는 툴별 맞춤형 프롬프트를 바로 실무에 적용할 수 있다.", "goal": "- Microsoft 365 코파일럿의 역할과 주요 기능을 이해할 수 있다.\n- 원노트, 아웃룩, 팀즈, 워드, 엑셀, 파워포인트에서 코파일럿을 활용하여 생산성을 증대시킬 수 있다.\n- 상황별 맞춤형 프롬프트를 작성하여 코파일럿의 효율을 극대화할 수 있다.", "target": "- Microsoft 365 코파일럿을 활용해 생산성을 높이는 방법을 알고 싶은 직장인\n- AI와 데이터를 업무에 적용하여 비즈니스 인사이트를 도출하고자 하는 실무자\n- 코파일럿 도입을 고려하고 있는 경영자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 쉽고 빠르게 터득하는 SQL", "duration": "5:24:58", "contents": "8", "instructor": "최정아", "summary": "SQL 초보자들을 위해 SQL의 기본 개념부터 실제 SQL 사용법을 실습을 통해 소개!", "goal": "- 데이터베이스와 스키마의 기본 개념을 익힐 수 있다.\n- SQL에서 다양한 함수를 활용하여 원하는 데이터를 추출할 수 있다.\n- 깔끔한 데이터 추출을 위한 팁을 배우고 활용할 수 있다.", "target": "- SQL을 처음 배우는 모든 직장인\n- 필요한 데이터 추출을 스스로 하고 싶은 마케터, 기획자, 운영자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 스킬링] 코딩 몰라도 ChatGPT+VBA+코랩으로 만드는 데이터 분석 자동화 루틴", "duration": "5:28:11", "contents": "20", "instructor": "안현수", "summary": "아직도 매번 AI에 파일을 직접 업로드하고 있다면, 당신의 업무 시간은 낭비되고 있다! 코드를 몰라도 간단하게 완성하는 나만의 데이터 분석 자동화 루틴 설계", "goal": "1. AI를 활용하여 비정형 데이터를 전처리하고 분석 결과를 도출할 수 있다.\n2. 데이터 분석 전 단계에 AI와 Python을 연계하여 적용할 수 있다.\n3. VBA와 구글 코랩을 활용하여 반복 분석 업무를 자동화할 수 있다.", "target": "1. 마케팅·영업·CS 등 비정형 데이터를 다루는 기획자\n2. 업무에 AI를 처음 도입하려는 데이터 담당자\n3. 반복되는 분석 업무를 자동화하고자 하는 비개발자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 회사가 원하는 효율적인 AI 활용 - 구조화 프롬프트로 정복하는 실무 데이터 처리 비법", "duration": "5:29:59", "contents": "7", "instructor": "최정아", "summary": "AI가 데이터를 ‘이해’하게 만들고, 실무자는 프롬프트만으로 전처리·시각화를 끝낸다!", "goal": "- 인공지능 도구를 엑셀과 같은 기존 도구와 융합하여 활용할 수 있다.\n- TCI(Task-Context-Instruction) 프롬프트 설계 방식을 적용하여 프롬프트를 작성할 수 있다.\n- 데이터 분석, 정리, 시각화 전 과정을 AI의 도움을 받아 수행할 수 있다.\n코딩 지식이 필요한 자동화 업무를 AI의 도움을 받아 수행할 수 있다.", "target": "- 데이터 형태마다 달라지는 업무 방식에 AI 활용이 막막했던 실무자\n- 복잡한 함수식과 어려운 VBA 코드 공부에 지친 직장인\n- 더 빠르고, 더 쉬운 데이터 정리로 팀의 업무 효율을 극대화하고 싶은 관리자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[DS Class] 코딩 없이 유용하게 써먹는 엑셀 매크로", "duration": "5:31:17", "contents": "9", "instructor": "최정아", "summary": "마우스 클릭만으로 간단한 프로그램 생성, 코딩 없이 활용하기 좋은 엑셀 매크로!\n기본 설정부터 다양한 활용법까지, 초보자도 쉽게 따라할 수 있도록 실제 엑셀 사용 화면과 함께 학습!", "goal": "- 엑셀 매크로 개발도구의 정의와 기록 방법을 익힐 수 있다.\n- 실제 엑셀 매크로가 등장하고 수행하는 범위에 대해 살펴볼 수 있다.\n- VBA없이 양식 컨트롤로 간단하게 실무에서 활용할 수 있다.", "target": "- 엑셀 매크로를 처음 사용하는 모든 직장인\n- 엑셀 매크로를 활용하여 업무 속도를 높이고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "파이썬을 활용한 데이터 분석 및 시각화", "duration": "5:36:07", "contents": "10", "instructor": "서진수", "summary": "파이썬을 활용하여 다양한 정형/비정형 데이터를 분석하는 통계 기법, 분석된 결과를 시각화하는 방법, 메일 보내기 자동화 방법을 학습합니다 다양한 예제를 통해 배우고 실습함으로써 실무적용 능력을 습득할 수 있습니다", "goal": "- Jupyter Notebook 프로그램을 사용할 수 있다.\n- 파이썬에서 사용되는 다양한 시각화 방법을 실행할 수 있다.\n- 다양한 텍스트 분석기법과 통계분석 기법 및 업무 자동화 기술을 기억하고 활용할 수 있다.", "target": "- 기획, 마케팅, MD, 영업 담당자\n- 데이터 분석이 필요한 전임직원", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "나만 알고 싶은 비법, 업무자동화(Feat. No코드)", "duration": "5:37:16", "contents": "12", "instructor": "이경록", "summary": "‘Power Automate’를 통해 코드 없이 업무를 자동화시켜보자!\n업무시간을 순삭하게 하는 단순/반복 업무, 물론 중요한 업무이지만, 좀더 효과적이고 생산적인 업무를 할 수 없을까 고민이 되는 직장인들에게 필수적인 과정입니다. 더군다나 업무 자동화라고 꼭 코딩을 활용해야 할까요? \n노코딩으로 실무에 바로 적용 가능한 업무자동화 프로그램을 함께 만들어봅시다.", "goal": "- Power Automate를 통해 단순 반복 업무를 자동화할 수 있다.", "target": "- 업무 중 단순 반복 업무가 있어 일과 시간의 할애를 많이 하는 직장인\n- 코딩에 대한 장벽이 있는 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT 활용 생성형 AI 프롬프트 엔지니어링 실무", "duration": "5:38:29", "contents": "11", "instructor": "황정운", "summary": "생성형 AI 활용을 위한 핵심! 프롬프트 엔지니어링으로 일하라!", "goal": "- 프롬프트 엔지니어링의 의미를 이해하고, 업무에 활용하는 기초 방법을 파악할 수 있다.\n- 정확한 답변을 얻어낼 수 있는 다양한 프롬프트 엔지니어링 기술을 익힐 수 있다.\n- 할루시네이션(Hallucination) 수치를 낮추는 프롬프트 작성방법을 익힐 수 있다. ", "target": "- 생성형 AI를 활용하여 업무를 진행하는 모든 부서의 임직원\n- ChatGPT 활용도가 높은 마케팅, 기획, 엔지니어링 등에 종사하는 모든 임직원 ", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 파이썬 데이터 분석 머신러닝, 파이썬 복습과 머신러닝 맛보기", "duration": "5:43:44", "contents": "10", "instructor": "김진숙", "summary": "머신러닝 개념부터 다양한 사례 학습을 통해 쉽게 입문하자!", "goal": "- 반복 작업을 파워쿼리로 자동화하여 업무 효율을 높일 수 있다. \n- 파워피벗을 통해 데이터간 관계를 설정하고 데이터 모델링 역량을 기를 수 있다. \n- 엑셀 데이터 분석 결과를 심화 시각화 도구인 파워BI로 더 다양하고 강력하게 시각화할 수 있다. ", "target": "- 데이터를 기반으로 다양하게 분석하고 미래를 예측하고 싶은 직장인\n- 빠르고 정확하게 분석된 예측과 결과로 의사결정을 효율적으로 하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(7) 시계열 분석과 연관 규칙", "duration": "5:45:54", "contents": "9", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 사이언스, Orange3! 노코드 AI 프로그램으로 시계열 및 연관성 분석을 쉽고 빠르게!\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 시계열 및 연관성 분석, \n아직도 엑셀이나 파이썬 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정을 통해 복잡한 프로그래밍의 벽을 허물고, 데이터 분석을 \n자신 있게 수행할 수 있는 심화 데이터 사이언티스트로 거듭나 보자.", "goal": "- Orange3를 활용한 시계열 및 연관성 분석 방법을 설명할 수 있다.\n- 시계열 및 연관성 분석으로 데이터 속 패턴과 연관 관계를 파악할 수 있다.\n- 다양한 실습을 통해 실무적 데이터 분석 기술을 강화할 수 있다.", "target": "- 노코드 프로그램으로 시계열 및 연관성 분석을 간단히 수행하고 싶은 직장인\n- 파이썬보다 더 간단한 심화 분석 도구 사용을 원하는 직장인\n- 데이터 분석 역량을 향상하여 업무 효율성을 향상하고자 하는 직장인", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "업무시간을 단축하는 스마트한 문서작성 - 한컴AI X 어시스턴트 (한컴오피스 한글 2024편)", "duration": "5:45:59", "contents": "10", "instructor": "강다빈", "summary": "복잡한 텍스트 교정과 반복적인 서식 지정 작업을 AI로 자동화함으로써, 단순 업무의 피로도를 낮추고 업무 생산성을 극대화할 수 있습니다. 방대한 자료를 빠르게 분석하는 AI 탐색 기능을 통해 정보 수집의 한계를 극복하고, 텍스트 편집 및 서식 제작 자동화로 문서의 완성도를 높이는 방법을 다룹니다. 표준화된 경영 문서와 전문적인 서식 제작 노하우를 AI로 구현하는 법을 습득함으로써, 급변하는 디지털 환경에서 경쟁력을 갖춘 스마트 행정 전문가로 거듭날 수 있습니다.", "goal": "한컴오피스 2024 AI 어시스턴트의 핵심 기능을 마스터하여, 기획부터 완고까지 이어지는 문서 작성 공정을 획기적으로 단축할 수 있습니다. AI가 생성한 문장을 실무 목적에 맞게 교정하고 고도화하는 편집 자동화 기법을 익혀, 문서 제작의 효율성을 극대화할 수 있습니다. 경영 문서 및 공문서 특유의 규격화된 서식을 AI로 자동 생성하고 관리하여, 대외 신뢰도가 높은 표준화된 문서를 제작할 수 있습니다.", "target": "한컴오피스 한글 2024의 AI 기능을 실무에 즉시 도입하여 반복적인 문서 행정 업무를 획기적으로 단축하고자 하는 직장인 텍스트 교정, 요약, 탐색 등 AI 기반의 문서 고도화 기술을 익혀 대외 문서의 완성도를 극대화하고 싶은 누구나 기획서, 보고서, 보도자료 등 비즈니스 문서 제작 비중이 높아 AI를 통한 원고 생성 및 편집 기술이 필요한 담당자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 스킬링] AI로 세팅하는 제2의 뇌 - 옵시디언으로 설계하는 무한 확장 지식 엔지니어링", "duration": "5:47:45", "contents": "12", "instructor": "정우석", "summary": "데이터는 많은데 결과물이 없다면?!\n옵시디언(Obsidian)을 활용해 데이터를 연결하고 자동화해 실제 결과로 이어지는 지식 관리 시스템 구축", "goal": "1. 옵시디언의 작성 기준과 구조를 설계해 업무 기록이 누적되어도 쉽게 검색하고 활용할 수 있다.\n2. 다양한 업무 데이터를 연결하여 정보가 단절되지 않는 지식 네트워크를 구축할 수 있다.\n3. 대시보드와 AI 도구를 활용하여 업무 현황을 한눈에 파악할 수 있는 관리 구조를 만들 수 있다.\n4. 템플릿과 자동화 도구를 활용하여 반복 업무를 줄이고 효율적인 업무 환경을 구축할 수 있다. ", "target": "1. 회의·리서치·기획 기록을 남기지만, 다음 업무에서 다시 찾는 직장인\n2. 업무 히스토리가 길어질수록 “왜 이렇게 결정했지?”를 반복 확인하는 직장인\n3. 프로젝트 자료가 여기저기 흩어져 있어, 진행 상황을 한 눈에 파악하기 힘든 직장인\n4. 회의록·기획안·체크리스트를 매번 반복 작성하는 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "업무가 쉬워지는 순간, 엑셀로 데이터 분석하기", "duration": "5:52:12", "contents": "16", "instructor": "오경선", "summary": "엑셀의 함수 기능을 활용하여 데이터 분석을 방법을 알려준다.\n데이터 분석의 기본 개념을 다지고, 예제를 통해 차근차근 기능을 직접 따라 하면서 익힐 수 있는 과정으로 구성되어 있다.\n본 학습과정을 통해 엑셀을 이용하여 데이터를 수집하고, 엑셀을 활용하여 분석하는 도구로 자유롭게 활용할 수 있다.", "goal": "1. 데이터의 개념을 알고, 원하는 데이터를 수집하여 다듬는 방법을 알 수 있다.\n2. 가상분석을 설정하고, 다양한 검증 방법을 통해 주장의 참과 거짓을 파악할 수 있다.\n3. 데이터 간의 상관관계를 파악하고, 분석하여 미래를 예측할 수 있다.", "target": "엑셀로 데이터 분석하는 방법에 관심이 있는 구성원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "처음 시작하는 MS Copilot, 나만의 업무 파트너 만들기", "duration": "5:52:26", "contents": "12", "instructor": "김진", "summary": "365일 쓰는 MS 오피스에 인공지능 비서가 온다! 생산성을 극대화할 새로운 도우미 Copilot\n\nChatGPT 등 생성형 AI 도구의 보급으로 개인의 편의성은 높아졌지만 아직 조직 전체의 생산성 향상이라는 결과로 이어지지는 못한 상황, 진정한 업무 변화의 두 번째 물결은 MS Copilot으로부터 시작된다!\n\n본 과정에서는 문서 작성, 디자인, 메일 자동 답변, 회의 자동 요약과 데이터 분석까지 다양한 업무 상황에서 MS Copilot을 활용하는 방법을 안내한다.", "goal": "- MS Copilot 서비스의 개념과 범위에 대해 설명할 수 있다.\n- Copilot의 효과적 활용을 위한 기초 역량을 키울 수 있다.\n- 다양한 비즈니스 상황에서 적절한 Copilot 도구를 효과적으로 활용할 수 있다.", "target": "- MS Copilot을 활용해 생산성을 높이고자 하는 직장인 및 경영인\n- MS Copilot의 최신 AI 기능을 업무를 활용하고자 하는 IT 전문가\n- AI와 데이터를 업무에 적용하여 비즈니스 인사이트를 도출하고자 하는 실무자\n- Copilot의 도입을 고려하고 있는 Microsoft MS 일반 사용자 및 조직", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 분석 전처리 실무, 파워쿼리 Part.2", "duration": "5:53:23", "contents": "9", "instructor": "최정아", "summary": "데이터 분석의 시작, 데이터 전처리! 파워쿼리(PowerQuery)로 더욱 손쉽게 배워보자.", "goal": "1. 데이터의 변경이 자동으로 반영되어 업무 효율을 증진시킬 수 있다.\n2. 방대한 양의 데이터를 손쉽게 다룰 수 있다. \n3. 파워쿼리 비정형 데이터를 통합하고 관리할 수 있다.", "target": "- 엑셀 작업으로 퇴근이 늦어지는 직장인\n- 상사에게 사랑받는 엑셀 스킬을 갖추고 싶은 직장인\n- 코딩없이 몇번의 클릭만으로 쉽고 빠르게 데이터 전처리를 하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(6) 텍스트와 이미지 분석", "duration": "5:55:05", "contents": "10", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 사이언스, Orange3! 노코드 AI 프로그램으로 텍스트와 이미지 분석을 쉽고 빠르게!\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 텍스트 분석과 이미지 분석, 아직도 파이썬 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정을 통해 복잡한 프로그래밍의 벽을 허물고, 텍스트/이미지와 같은 비정형 데이터 분석을 자신 있게 수행할 수 있는 심화 데이터 사이언티스트로 거듭나 보자.", "goal": "- Orange3를 활용하여 텍스트 및 이미지를 분석하는 방법을 설명할 수 있다.\n- 텍스트 마이닝과 이미지 분석으로 데이터 속 패턴 및 관계를 파악할 수 있다.\n- 다양한 실습을 통해 실무적 데이터 분석 기술을 강화할 수 있다.", "target": "- 노코드 프로그램으로 텍스트와 이미지 분석을 간단히 수행하고 싶은 직장인\n- 파이썬보다 더 간단한 심화 분석 도구 사용을 원하는 직장인\n- 데이터 분석 역량을 향상하여 업무 효율성을 향상하고자 하는 직장인", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 비즈니스 애널리틱스, 전략적 의사결정 실무 마스터 클래스", "duration": "6:02:29", "contents": "9", "instructor": "최정아", "summary": "고객들의 선호도를 결정할 가장 중요한 요인이 무엇인지 알아보기 위한 다양한 비즈니스 분석법을 손 쉬운 도구인 엑셀로 실행하는 방법을 배워보자.", "goal": "1. 직감이 아닌 데이터 분석 기반 의사결정으로 비즈니스 성공률을 업그레이드할 수 있다.  \n2. 환률분포를 활용한 비즈니스 성과 향상 전략을 세울 수 있다. \n3. 컨조인트분석, 손익분기점 비율 분석, 시나리오 분석 등 다양한 전략적 의사결정을 위한 비즈니스 분석법을 실행할 수 있다. ", "target": "- 여러 비즈니스 문제를 데이터로 해결해보고 싶은 직장인\n- 엑셀을 활용한 비즈니스 데이터 분석을 진행하고 싶은 직장인\n- 확률 기반 비즈니스 의사결정을 내리고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 파이썬 데이터 분석과 시각화", "duration": "6:02:49", "contents": "10", "instructor": "김진숙", "summary": "파이썬을 활용해 회사 업무에 대한 활용력을 높여보자!", "goal": "1. Matpolib과 Seaborn, Folium을 활용하여 데이터 특성, 분석 목표에 따라 다양한 방법으로 데이터를 시각화하고 인사이트를 발굴할 수 있다.\n2. 멀게만 느껴지는 머신러닝의 개념을 쉽게 이해하고 입문할 수 있다.", "target": "- 파이썬을 활용하여 유연하게 데이터를 분석하고 머신러닝까지 입문하고 싶은 직장인\n- Numpy와 Pandas를 활용하여 데이터 분석을 학습하고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[ITⓔ코칭] 파이썬으로 배우는 실전 프로그래밍_2020 개정판", "duration": "6:03:26", "contents": "12", "instructor": "김영아", "summary": "해외는 물론 국내까지 사용 영역이 넓어지고 있는 파이썬! 만능 언어 파이썬(Python)을 활용한 프로그래밍을 알아보자", "goal": "- 파이썬을 수행하는 데 있어 핵심적인 지식과 함께 실무 능력을 쌓을 수 있다.\n- 다양한 분야의 실무에서 파이썬을 활용할 수 있다.", "target": "- 파이썬에 관심 있거나 파이썬을 처음 접하는 직장인\n- 파이썬의 용어, 수행방법 등에 대한 기본기를 탄탄히 다지고 싶은 분 \n- 실무 능력을 향상시키고 싶은 현업 종사자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 마케터를 위한 Excel 실전: 고객 분석부터 자동화 프레임워크까지", "duration": "6:07:36", "contents": "13", "instructor": "최정아", "summary": "마케터라면 누구나 겪는 고민, 데이터는 넘쳐나는데 성과는 안 보인다면?\n엑셀 하나로 고객을 꿰뚫는 상위 1%의 분석 프레임워크\n데이터 분석을 통해 핵심 고객을 찾고, 최적의 타겟팅 로직을 직접 설계하자!", "goal": "- 데이터 관리 기준을 정립하여, 데이터가 늘어나도 즉시 분석할 수 있는 환경을 조성할 수 있다.\n- RFM 모델과 파레토 분석으로 수익 기여도가 높은 핵심 타겟을 오차 없이 식별할 수 있다.\n- 고객 등급별 행동 변화와 마케팅 성과 지표를 시각화하여 의사결정 근거를 확인하고 설명할 수 있다.", "target": "- 방대한 고객 데이터를 쌓아만 두고 활용하지 못하는 마케팅 관련 직무 종사자\n- 어떤 타겟이 핵심 VIP인지 객관적 근거를 찾고 싶은 마케팅 실무자\n- 광고 효율은 떨어지는데, 고객을 어떻게 나누어 접근해야 할지 막막한 실무 담당자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[DS Class] 파이썬 시작하기, 파이썬 기본 개념", "duration": "6:13:43", "contents": "10", "instructor": "김진숙", "summary": "복잡해 보이는 파이썬 설치부터 기본개념, 자료구조를 파악하여 본격적으로 파이썬 시작해보자.", "goal": "1. 파이썬의 기본 분기문과 반복문을 이해할 수 있다.\n2. 자료구조와 딕셔너리 개념을 파악할 수 있다. ", "target": "- 파이썬의 기초부터 차근차근 학습하고 싶은 분\n- 파이썬의 기초 문법과 구조를 이해하여 객체 지향 프로그래밍에 대한 이해를 높이고 싶은 분\n- 데이터를 쉽고 빠르게 수집하여(크롤링) 업무 자동화를 실현하고 싶은 분", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "실무비법전수! 한 방에 파이토치(실전)", "duration": "6:18:51", "contents": "26", "instructor": "박정은", "summary": "실무에 바로 활용 가능한 딥러닝 프로젝트 중심으로 구성된 실전 트레이닝 과정!", "goal": "- 다양한 딥러닝 태스크를 다루며  데이터셋 유형(이미지, 영상, 텍스트)에 맞춘 모델을 학습한다.\n- 파이토치 기반 프로젝트의 설계부터 훈련,평가,배포까지 전 과정을 이해하고 직접 수행할 수 있다.\n-최신 딥러닝 기술을 현업 수준으로 구현하며, 실무 프로젝트 기반의 응용력과 문제 해결 능력을 강화한다.", "target": "-파이토치 기초를 이수한 중급 이상의 데이터 분석가 및 AI 엔지니어\n-파이토치를 활용하여 실무에 가까운 딥러닝 모델 설계를 학습하고 싶은 중급 개발자\n-딥러닝을 활용한 이미지/비디오/NLP 모델을 배우고 싶은 실무자", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "3D 공간정보 데이터 취득과 빅데이터 시각화", "duration": "6:19:50", "contents": "15", "instructor": "김용돈", "summary": "모든 공간을 한 번에 볼 수 있는 3D 공간정보의 데이터 활용과 시각화 방법 제시!", "goal": "- 드론, 라이다 등을 활용한 3D 공간정보 데이터 취득 및 매핑방법을 이해할 수 있다. \n- 공간정보 및 빅데이터 시각화를 위한 3차원 데이터 수집 시스템의 개념, 기술 및 방법론을 파악할 수 있다.\n- 3D 공간정보 데이터의 활용분야에 따른 데이터 시각화 도구와 방법을 파악할 수 있다.\n- 3D 데이터 수집 시스템 및 빅데이터 처리를 통한 공간정보 습득 방법을 파악할 수 ts": "32", "instructor": "신동욱", "summary": "데이터 왕초보라면? 가장 핫한 언어/ 가장 쉬운 언어, 파이썬부터 직무가 무엇이든 데이터 분석이 필수인 시대! 하지만 막상 배워보려고 하면, 어/렵/다!\n그렇다면, 입문자에게 가장 사랑받는 언어, 파이썬부터 시작하면 어떨까요?  파이썬의 기초개념과 문법을 익히고, 데이터 분석의 자신감을 가져보세요.", "goal": "- 파이썬 기초 문법과 코딩을 이해하여 나만의 프로그램을 제작할 수 있다. \n- 파이썬 언어를 활용하여 실무에서의 업무효율성을 높일 수 있다. ", "target": "- 코딩을 처음 접하는 구성원\n- 파이썬을 업무에 활용하고 싶은 구성원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 마케터가 원하는 효율적인 AI 활용 - 이미지, 영상, 음악까지 감각적인 비주얼 콘텐츠 생성하기", "duration": "7:19:20", "contents": "10", "instructor": "최정아", "summary": "프롬프트 몇 줄로 이미지·영상·음악까지! AI로 마케터가 원하는 비주얼 콘텐츠 완성하기", "goal": "- 이미지, 영상, 음악까지 완성하는 AI 콘텐츠 업무 방식을 습득할 수 있다.\n- 브랜드 감성을 담아내는 크리에이티브 프롬프트 설계법을 익힐 수 있다.\n- 누구나 복잡한 툴 사용 없이 전문적인 수준의 제작 환경을 구성할 수 있다.\n- AI 콘텐츠 사용자 윤리를 체득하여 올바른 개념을 확립할 수 있다.", "target": "- 머릿속에 구상은 있지만, 비주얼로 표현하는 방법이 막막한 직장인\n- 디자인 툴 숙련 없이 감각적인 이미지, 영상, 음악을 제작하고 싶은 직장인\n- 브랜드 톤앤매너를 유지하며 일관된 콘텐츠를 만들고 싶은 직장인\n- 팀 내 콘텐츠 퀄리티를 높이고, 크리에이티브 방향을 주도하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "인공지능을 위한 텐서플로2 + 케라스 라이브러리 실전 적용", "duration": "7:21:09", "contents": "27", "instructor": "김일한", "summary": "텐서플로우 라이브러리는 가장 많은 커뮤니티와 방대한 논문이 존재 하며 가장 많이 사용하는인공지능 라이브러리이다. 개발환경 설치와 텐서플로우 2의 문법 케라스 라이브러리를 실습중심으로 쉽게 익혀보자.", "goal": "- 파이썬 언어의 인공지능 라이브러리인 텐서플로우 케라스를 활용해 각종 데이터를 예측 및 분류 개발할 수 있는 방법에 대해 학습한다.", "target": "- 현업에서 데이터에 대해 인공지능을 개발하고자 하는 분", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 회사가 원하는 효율적인 AI 활용 - 고품질 데이터 분석 기법과 엑셀 업무 자동화", "duration": "7:21:27", "contents": "12", "instructor": "최정아", "summary": "브랜드 콘텐츠는 이제 ‘감’이 아니라 ‘AI 기반 설계 능력’에서 완성된다.", "goal": "- 전문가 수준의 데이터 분석을 AI 구조화 프롬프트 활용으로 쉽게 수행할 수 있다.\n- 사례별 적절한 분석 기법을 선택하여 알맞은 분석 결과를 도출할 수 있다.\n- 숨겨진 데이터 인사이트 발굴과 전략 보고서 작성을 AI를 활용하여 수행할 수 있다.", "target": "- 파이썬 활용 없이 쉽게 데이터 기반 의사결정을 하고 싶은 기획자\n- 고객 세분화, 판매 예측 등 전략 수립에 데이터 활용이 필요한 영업 담당자\n- 데이터 기반 보고서 작성을 효율화하고 싶은 전략 담당자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "200% 활용하는 챗 GPT 질문법", "duration": "7:24:57", "contents": "16", "instructor": "김대중", "summary": "<200% 활용하는 챗 GPT 질문법>은 ‘챗 GPT에게 어떻게 질문해야 원하는 답을 얻을 수 있는가?’에 초점을 맞춘 실습형 콘텐츠입니다. \n본 과정에서는 챗 GPT의 무료 버전을 기본으로 활용하고 있으며, 내용에 따라 일부 유료 버전도 함께 실습함으로써 학습자의 활용 환경에 맞춘 실습을 진행하고 있습니다.\n본 과정을 통해 학습자는 챗 GPT에 좋은 질문을 하는 방법을 터득하고, 다양한 확장 프로그램을 실제로 사용하여 업무 활용성을 높일 수 있습니다.\n", "goal": "- 챗 GPT에게 어떻게 질문하는 것이 효과적인지를 이해하고, 다양한 질문법을 활용할 수 있다.\n- 챗 GPT의 다양한 확장 프로그램을 설치하고 사용할 수 있다.\n- 모바일에 챗 GPT 앱을 설치하고 사용할 수 있다.", "target": "- 챗 GPT를 효과적으로 사용하고자 하는 자 \n- 챗 GPT에 관심이 있는 자", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[슬기로운 통계생활] R로 배우는 기초통계학 part1", "duration": "7:28:34", "contents": "10", "instructor": "이삭", "summary": "R을 사용한 기초 통계 과정! \n통계의 기초지식을 학습하고, 데이터가 주어졌을때 통계적으로 시각화하는 방법을 학습합니다.\n또한 데이터의 특성을 나타내는 통계 지표들을 학습하면서 R의 기능을 자연스럽게 익힐 수 있는 강의 입니다.", "goal": "- 주어진 자료의 특성을 잘 반영하는 통계적 시각화 과정을 R에서 구현 할 수 있다.\n- 통계 지표들의 특성을 이해하고, 분포의 특성에 따른 통계 지표 값의 행동 패턴을 이해할 수 있다.", "target": "- 통계를 처음 배우는 분들\n- 데이터 분석을 처음 공부하는 분들\n- R을 처음 배우는 분들", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "딥러닝과 데이터분석을 위한 기초수학 (w.파이썬)", "duration": "7:44:03", "contents": "16", "instructor": "이병준", "summary": "데이터 과학의 기본이 되는 과학적 모델링을 이해하기 위한 기초적인 수학적 지식을 학습합니다. 수학적 지식의 정확한 이해와 코딩능력 함양을 위한 다양한 예제 및 연습문제를 파이썬으로 실습해봅니다. ", "goal": "데이터 과학의 기본이 되는 과학적 모델링을 이해하기 위한 기초적인 수학적 지식 학습을 학습하고, 수학적 지식의 정확한 이해 및 코딩 능력 함양을 위한 다양한 예제 및 연습문제를 파이썬을 통해 실습해 볼 수 있다.", "target": "데이터 분석을 위한 기초적인 수학 개념 함양을 원하는 학습자\n(프로그래밍 경험 유무 관련X)", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "구글 애널리틱스 GA4 실무 마스터 클래스", "duration": "7:44:49", "contents": "9", "instructor": "김진", "summary": "본 과정에서는 GA4의 기본적인 계정 생성 방법, 추적코드 삽입, GA4의 User Interface와 같은 기초 내용부터 심화분석을 가능하게 하는 목표 설정 방법까지 학습할 수 있습니다.\n\n구글 애널리틱스 GA4 실무 마스터 클래스는 지금 바로 실무에 적용할 수 있도록 핵심 내용만 담은 실습형 콘텐츠로 구성하였습니다.", "goal": "-  최신 버전 GA4 기반의 기본 기능과 세팅 방법을 익힐 수 있다.\n- GA4의 다양한 이벤트 추적 방식에 대해 살펴볼 수 있다.\n- 다양한 탐색적 데이터 분석으로 고객에 대한 이해를 높일 수 있다.  ", "target": "- 고객 데이터 기반 성과 분석이 필요한 마케터/기획자\n- 고객 데이터 수집 및 분석 툴, GA4를 처음 도입하는 리더", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] R로 배우는 데이터 분석 첫 걸음, 통계부터 데이터 마이닝 실습까지", "duration": "7:44:57", "contents": "12", "instructor": "김진숙", "summary": "R로 방대한 양의 데이터분석은 물론 데이터 시각화까지 한번에!", "goal": "1. 대량의 데이터셋을 처리할 수 있는 R의 여러 패키지를 실습하며 데이터를 분석, 시각화할 수 있다. \n2. 거대한 데이터도 이해하기 쉽게 시각화할 수 있다. \n3. 방대한 데이터 베이스에서 의미있는 정보를 추출하는 데이터 마이닝 기법을 익힐 수 있다. ", "target": "- 방대한 양의 데이터를 전문적이고 심층적으로 분석하고 싶은 직장인 \n- R을 활용하여 데이터를 분석하고 R 시각화를 통해 인사이트를 발견하고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 커서 AI로 시작하는 바이브 코딩과 MCP", "duration": "7:48:23", "contents": "12", "instructor": "김진", "summary": "이제는 코딩 알못 기획자도 AI 비서 활용해서 리듬 타고 코딩한다?\n자연어로 명령하면 AI가 실행하는 바이브 코딩 시대, 요즘 가장 핫한 바이브 코딩 핵심 툴인 ‘커서(Cursor) AI’를 활용한 서비스 개발과 MCP 구축에 대해 알아본다. \n본 과정에서는  개발 입문자, 현업 개발자, 코딩 지식이 없는 서비스 기획자, 데이터 마케팅 담당자 등을 대상으로 바이브 코딩의 근간을 이해할 수 있도록 하며 MCP 연동을 통해 다양한 작업을 하는 방법을 안내한다.", "goal": "- 생성형 인공지능의 작동 원리와 프롬프트 기초를 다지며 바이브 코딩의 근간을 이해할 수 있다.\n- MCP 연동을 통해 기존 인공지능의 한계를 넘어 다양한 작업을 할 수 있다.\n- 유저 롤스와 프로젝트 롤스를 활용해서 요구 사항과 팀 규칙을 프롬프트에 녹여 인공지능 출력을 일관되게 관리할 수 있다.", "target": "- 웹 서비스 완주 경험이 필요한 개발 입문자\n- 최신 래그 MCP 프롬프트 기반 개발 룰 적용 감각이 필요한 현업 개발자\n- 코딩 지식 없이 아이디어를 즉시 MVP로 끌어올리고 싶은 서비스 기획자 \n- 자연어 기반 마케팅 자동화 서비스 구축이 필요한 데이터 마케팅 담당자", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "업무에 바로 써먹는 데이터 마인드(데이터 리터러시) 향상 방법", "duration": "7:48:43", "contents": "13", "instructor": "구자룡", "summary": "기획자, 마케터가 데이터 분석가보다 더 나은 의사결정을 하는 법!", "goal": "1. 문제해결을 위한 데이터 수집, 분석 방법을 파악할 수 있다.\n2. 트렌드, 텍스트 데이터, A/B테스트, 시각화 데이터 분석방법을 파악할 수 있다.\n3. 데이터를 분석하여 문제를 해결하고, 전략을 수립할 수 있다.", "target": "1. 데이터 기반 의사결정이 필요한 실무자 및 관리자\n2. 시장조사, 트렌드 조사가 필요한 실무자 및 관리자\n3. 사업전략 수립을 위해 데이터 활용이 필요한 기획자, 마케터", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "Chat GPT, DALL-E로 배우는 생성형 AI의 핵심원리", "duration": "7:48:52", "contents": "16", "instructor": "유재명", "summary": "바야흐로 인공지능의 시대, 나만의 인공지능을 만들 수 있을까? 2007년 아이폰의 등장 이후 4차 산업혁명을 또다시 뒤흔든 OpenAI사의 Chat GPT와  DALL=E. 국내외 굴지의 기업들이 이 기술에 주목해 너도 나도 뛰어들고 있습니다. ", "goal": "- 자연어 처리/컴퓨터 비전의 개념과 다양한 응용 분야를 이해할 수 있다,\n- GPT모델을 통한 텍스트 생성/CLIP모델, 콜랩, 허깅페이스 등을 통해 이미지 생성을 할 수 있다.", "target": "- 생성형 인공지능(Chat GPT, Dall-E)의 원리에 대해 관심있는 구성원", "level": "심화"}, {"cat1": "경영일반", "cat2": "경영혁신", "title": "AI가 말했다 그건 네가 안 해도 돼 - 반복 업무 대신 AI가 일하는 업무 자동화 입문", "duration": "7:49:22", "contents": "16", "instructor": "이대성/장재현", "summary": "그냥 시켜. 일은 n8n이 하니까 - 자동화 툴로 하루 1시간 아끼는 실전 워크플로우\n엑셀, PPT, 구글시트만 쓸 줄 알아도, AI가 여러분 대신 데이터 분석도, 문서 작성도, 자동화도 해드립니다.\n3시간 회의를 30초로 요약하고, 메일 답장도 AI가 자동으로 대신 보내고, 회사 전 문서를 자동 정리하는 보고서 로봇까지! 16차시 동안 실제 업무에 바로 쓸 수 있는 자동화 프로젝트를 직접 기획·설계·구현합니다. AI 도구 활용법 + 프롬프트 엔지니어링 + 실무 자동화 감각을 한 번에 챙겨보세요.", "goal": "코딩 없이 AI 도구를 활용해 데이터 수집부터 분석·시각화·자동화까지 실무에 적용할 수 있는 역량을 기릅니다.", "target": "AX시대에 일하는 모든 구성원", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 엑셀을 활용한 데이터 시각화 실무", "duration": "7:49:45", "contents": "11", "instructor": "최정아", "summary": "쉽게 접근할 수 있는 엑셀을 활용한 데이터 시각화", "goal": "1. 셀과 표의 기본 서식을 익히고, 조건부 서식을 활용한 다양한 서식 시각화할 수 있다.\n2. 활용도 높은 비즈니스 데이터 시각화 차트(중첩 막대 그래프, 덤벨 차트, 이격 차트, 간트 차트)를 만들 수 있다.\n3. 다중 시각적 개체를 포함하는 인터랙티브 대시보드를 구성해 봄으로써 엑셀의 심화 시각화 기술을 터득할 수 있다. ", "target": "- 엑셀 기본 서식을 배우고 싶은 분들\n- 정확한 수치를 바탕으로 데이터의 핵심을 전달하고 싶은 분들\n- 데이터를 일목요연하게 정리하고 싶은 분들", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 미드저니로 생성하고 포토샵으로 완성하는 디자인 마스터 클래스", "duration": "8:02:26", "contents": "30", "instructor": "양솔지", "summary": "AI 디자이너 필수 도구 Midjourney와 Photoshop을 한번에 끝내는 과정!\n다양한 미드저니 스타일 활용부터 포토샵 보정까지, 디자이너에게 배우는 실무 AI 디자인의 모든 것!", "goal": "- AI 도구를 활용하여 작업 속도와 완성도를 한 번에 잡는 독보적인 디자인을 수행할 수 있다.\n- 이커머스, 1인 사이트, SNS에서 마음을 사로잡는 상품 이미지를 제작할 수 있다.\n- 어디에 사용할 어떤 이미지라도 미드저니를 활용하여 자유자재로 만들고 포토샵으로 간단히 편집할 수 있다.\n- 햄버거 광고, 패션 룩북 등의 사례를 통해 AI 디자이너의 일하는 방법을 이해할 수 있다.", "target": "- 더 나은 디자인을 더 쉽게 작업하는 방법에 관심 있는 디자이너 및 크리에이터\n- 미드저니로 생성한 이미지가 실제 업무에 사용하기에 약간 아쉬웠던 분\n- 여러 가지 이유로 포기했던 디자인의 꿈을 AI 도구를 통해 이루고 싶은 모든 분\n- 외주 디자이너보다 저렴한 가격으로 더 나은 결과물을 만들고 싶은 창업자/경영자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 회사가 원하는 효율적인 AI 활용 - 회의 준비부터 기록까지", "duration": "8:05:13", "contents": "14", "instructor": "최정아", "summary": "반복되는 문서 작업과 비효율적인 회의 준비는 이제 그만! ChatGPT로 회의 준비부터 회의록 작성까지 쉽고 빠르게!\n\n회의로 시작해서 회의로 끝나는 하루 일과. 일잘러는 이미 회의 준비도 회의록 작성과 공유도 ChatGPT로 하고 있다는 사실!\n\n본 과정을 통해 생성형AI와 관련하여 꼭! 알아야 할 기본 개념을 이해하고, 실전 사례를 바탕으로 한 실습으로 보다 효율적이고 건설적인 회의를 위한 ChatGPT 활용법을 습득할 수 있다.", "goal": "- ChatGPT를 활용하여 회의 준비부터 회의록 작성까지의 전 과정의 효율성을 높일 수 있다.\n- ChatGPT를 활용하여 데이터 분석 및 시각화를 수행할 수 있다.\n- 단순 반복적인 업무를 줄이는 워크플로우를 구축할 수 있다.\n- 구글 워크스페이스와 VBA 등 AI를 보조하는 도구를 활용하여 업무 생산성을 극대화할 수 있다.", "target": "- 회의 준비부터 회의록 작성까지의 효율성을 높이고 싶은 직장인\n- 데이터 분석과 시각화를 효율적으로 수행하고 싶은 직장인\n- 반복된 업무의 자동화가 필요한 직장인\n- AI 활용을 통해 업무 생산성을 극대화하고자 하는 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 비즈니스 애널리틱스, 데이터 기반 실적 개선 프로젝트 마스터 클래스", "duration": "8:14:59", "contents": "11", "instructor": "최정아", "summary": "실습을 통해 데이터 기반의 실적 개선 프로젝트 마스터하기!", "goal": "1. 데이터의 전체적인 흐름을 파악하기 위한 분석적 사고를 함양할 수 있다. \n2. 확률분포를 활용한 비즈니스 성과 향상 전략을 세울 수 있다. \n3. 마소 전자마트의 비즈니스 상황을 통한 비즈니스 의사결정 속 데이터 분석의 역할을 탐구할 수 있다. ", "target": "- 여러 비즈니스 문제를 데이터로 해결해보고 싶은 직장인\n- 엑셀을 활용한 비즈니스 데이터 분석을 진행하고 싶은 직장인\n- 최적의 데이터 표현으로 설득력을 강화하고 싶은 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "디지털 Skill-up 과정(파이썬 프로젝트)", "duration": "8:15:08", "contents": "10", "instructor": "권오성", "summary": "Jupiter Notebook프로그램을 활용하여 Python의 빠른 개발 속도, 높은 생산성의 특징을 이해하여, 장점을 살린 업무에 적용할 만한 프로그램을 개발할 수 있도록 구성했다.", "goal": "1. Jupiter Notebook을 설치하여 Python 언어 소스를 입력할 수 있다.\n2. Python의 풍부한 라이브러리를 활용하여 업무에 적용할 수 있다.\n3. Python을 통해 데이터 구조와 알고리즘을 분석하고 다룰 수 있다.\n4. 계산기(DTI계산기, DSR계산기 등)와 고객관리 프로그램을 만들 수 있다.", "target": "- 코딩의 고급을 익히고 싶은 전 임직원\n- 파이썬을 통해 프로젝트를 진행하고 싶은 전 임직원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(4) 분류 머신러닝 분석", "duration": "8:29:18", "contents": "16", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 사이언스, Orange3! 분류 머신러닝 분석 모델 구축부터 적용까지 쉽고 빠르게\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기 function uniq(arr) { return [...new Set(arr)].filter(v => v && v.length); }

function buildChips() {
  // Build cat1 chips (with item counts)
  const cat1Counts = new Map();
  DATA.forEach(d => {
    if (!d.cat1) return;
    cat1Counts.set(d.cat1, (cat1Counts.get(d.cat1) || 0) + 1);
  });
  const cat1Vals = [...cat1Counts.entries()]
    .map(([v, n]) => ({ value: v, count: n }))
    .sort((a, b) => a.value.localeCompare(b.value, 'ko'));

  // Build cat2 chips (with item counts)
  const cat2Counts = new Map();
  DATA.forEach(d => {
    if (!d.cat2) return;
    cat2Counts.set(d.cat2, (cat2Counts.get(d.cat2) || 0) + 1);
  });
  const cat2Vals = [...cat2Counts.entries()]
    .map(([v, n]) => ({ value: v, count: n }))
    .sort((a, b) => a.value.localeCompare(b.value, 'ko'));

  renderCatChips('filter-cat1', cat1Vals, state.cat1, 'cat1');
  renderCatChips('filter-cat2', cat2Vals, state.cat2, 'cat2');
  renderLevelChips('filter-level', LEVEL_ORDER);
}

function renderCatChips(containerId, values, stateSet, kind) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  values.forEach(p => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.dataset.value = p.value;
    chip.dataset.kind = kind;
    chip.innerHTML = escapeHtml(p.value) + ' <span class="chip-count">' + p.count + '</span>';
    chip.addEventListener('click', () => {
      if (chip.classList.contains('disabled')) return;
      if (stateSet.has(p.value)) stateSet.delete(p.value);
      else stateSet.add(p.value);
      chip.classList.toggle('active');
      updateCat2Dimming();
      render();
    });
    c.appendChild(chip);
  });
}

    const v = chip.dataset.value;
    if (state.cat1.size === 0) {
      chip.classList.remove('disabled');
      return;
    }
    const hasMatch = DATA.some(d => state.cat1.has(d.cat1) && d.cat2 === v);
    if (hasMatch) chip.classList.remove('disabled');
    else {
      chip.classList.add('disabled');
      // Also unselect it if it was selected
      if (state.cat2.has(v)) {
        state.cat2.delete(v);
        chip.classList.remove('active');
      }
    }
  });
  document.querySelectorAll('#filter-cat1 .chip').forEach(chip => {
    const v = chip.dataset.value;
    if (state.cat2.size === 0) {
      chip.classList.remove('disabled');
      return;
    }
    const hasMatch = DATA.some(d => state.cat2.has(d.cat2) && d.cat1 === v);
    if (hasMatch) chip.classList.remove('disabled');
    else {
      chip.classList.add('disabled');
      if (state.cat1.has(v)) {
        state.cat1.delete(v);
        chip.classList.remove('active');
      }
    }
  });
}

function renderLevelChips(containerId, values) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  values.forEach(v => {
    const chip = document.createElement('span');
    chip.className = 'chip ' + (LEVEL_CLASS[v] || '');
    chip.dataset.value = v;

    const text = document.createElement('span');
    text.textContent = v;
    chip.appendChild(text);

    const info = document.createElement('span');
    info.className = 'info-icon';
    info.textContent = 'i';
    info.title = v + ' 설명 보기';
    chip.appendChild(info);

    // Click anywhere on chip toggles filter; ⓘ icon shows the level guide instead
    chip.addEventListener('click', e => {
      if (e.target === info || info.contains(e.target)) {
        e.stopPropagation();
        togglePopover(chip, v);
        return;
      }
      e.stopPropagation();
      closePopover();
      if (state.level.has(v)) state.level.delete(v);
      else state.level.add(v);
      chip.classList.toggle('active');
      render();
    });

    c.appendChild(chip);
  });
}

let currentPopover = null;
function closePopover() {
  if (currentPopover) {
    currentPopover.remove();
    currentPopover = null;
  }
}
function togglePopover(anchor, level) {
  if (currentPopover && currentPopover.dataset.level === level) {
    closePopover();
    return;
  }
  closePopover();
  const info = LEVEL_INFO[level];
  if (!info) return;
  const pop = document.createElement('div');
  pop.className = 'popover';
  pop.dataset.level = level;
  pop.innerHTML =
    '<div class="pop-head">' +
      '<span class="pop-title ' + info.cls + '">' + level + ' 레벨(Level)</span>' +
      '<span class="pop-close" aria-label="닫기">×</span>' +
    '</div>' +
    '<h5>정의</h5><p>' + escapeHtml(info.def) + '</p>' +
    '<h5>주요 판단 기준</h5><p>' + escapeHtml(info.crit) + '</p>';
  anchor.appendChild(pop);
  currentPopover = pop;
  // Flip horizontally if it overflows the viewport
  const rect = pop.getBoundingClientRect();
  if (rect.right > window.innerWidth - 16) {
    pop.classList.add('flip-right');
  }
  pop.querySelector('.pop-close').addEventListener('click', e => {
    e.stopPropagation();
    closePopover();
  });
}
document.addEventListener('click', e => {
  if (!currentPopover) return;
  if (!currentPopover.contains(e.target) && !e.target.classList.contains('info-icon')) {
    closePopover();
  }
});

function applyFilters() {
  const q = state.search.trim().toLowerCase();
  let rows = DATA.filter(d => {
    if (state.cat1.size && !state.cat1.has(d.cat1)) return false;
    if (state.cat2.size && !state.cat2.has(d.cat2)) return false;
    if (state.level.size && !state.level.has(d.level)) return false;
    if (q) {
      const hay = (d.title + ' ' + d.instructor + ' ' + d.summary + ' ' + d.goal + ' ' + d.target).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  if (state.sortKey) {
    const k = state.sortKey, dir = state.sortDir === 'asc' ? 1 : -1;
    rows = [...rows].sort((a, b) => {
      let va = a[k] || '', vb = b[k] || '';
      if (k === 'contents') { va = parseInt(va) || 0; vb = parseInt(vb) || 0; }
      else if (k === 'duration') { va = durToSec(va); vb = durToSec(vb); }
      else if (k === 'level') { va = LEVEL_ORDER.indexOf(va); vb = LEVEL_ORDER.indexOf(vb); }
      else { va = String(va); vb = String(vb); }
      if (va < vb) return -1 * dir;
      if (va > vb) return 1 * dir;
      return 0;
    });
  }
  return rows;
}

function durToSec(s) {
  if (!s) return 0;
  const p = s.split(':').map(n => parseInt(n) || 0);
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  if (p.length === 2) return p[0]*60 + p[1];
  return 0;
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function highlightSearch(text) {
  const escaped = escapeHtml(text);
  const q = (state.search || '').trim();
  if (!q) return escaped;
  const reSrc = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (!reSrc) return escaped;
  try {
    const re = new RegExp(reSrc, 'gi');
    return escaped.replace(re, m => '<mark class="hl">' + m + '</mark>');
  } catch (e) {
    return escaped;
  }
}

function render() {
  const rows = applyFilters();
  document.getElementById('total-count').textContent = DATA.length;
  document.getElementById('filtered-count').textContent = rows.length;
  const tbody = document.getElementById('data-tbody');
  tbody.innerHTML = '';
  if (!rows.length) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="8" class="empty">조건에 맞는 과정이 없습니다.</td>';
    tbody.appendChild(tr);
    return;
  }
  rows.forEach((d, i) => {
    const tr = document.createElement('tr');
    const isExp = state.expanded.has(d.title);
    if (isExp) tr.classList.add('expanded');
    tr.innerHTML =
      '<td class="col-seq">' + (i + 1) + '</td>' +
      '<td class="col-cat">' + escapeHtml(d.cat1) + '</td>' +
      '<td class="col-cat">' + escapeHtml(d.cat2) + '</td>' +
      '<td class="col-title">' + highlightSearch(d.title) + '</td>' +
      '<td class="col-num">' + escapeHtml(d.duration) + '</td>' +
      '<td class="col-num">' + escapeHtml(d.contents) + '</td>' +
      '<td class="col-inst">' + highlightSearch(d.instructor) + '</td>' +
      '<td><span class="badge ' + (BADGE_CLASS[d.level] || '') + '">' + escapeHtml(d.level) + '</span></td>';
    tbody.appendChild(tr);

    const detail = document.createElement('tr');
    detail.className = 'detail-row' + (isExp ? ' show' : '');
    detail.innerHTML =
      '<td colspan="8"><div class="detail-grid">' +
        '<div class="detail-block"><h4>요약</h4><p>' + highlightSearch(d.summary) + '</p></div>' +
        '<div class="detail-block"><h4>학습 목표</h4><p>' + highlightSearch(d.goal) + '</p></div>' +
        '<div class="detail-block"><h4>학습 대상</h4><p>' + highlightSearch(d.target) + '</p></div>' +
      '</div></td>';
    tbody.appendChild(detail);

    tr.querySelector('.col-title').addEventListener('click', () => {
      if (state.expanded.has(d.title)) state.expanded.delete(d.title);
      else state.expanded.add(d.title);
      tr.classList.toggle('expanded');
      detail.classList.toggle('show');
    });
  });
}

document.getElementById('search-input').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state.cat1.clear(); state.cat2.clear(); state.level.clear();
  state.search = ''; state.sortKey = null; state.expanded.clear();
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.chip.disabled').forEach(c => c.classList.remove('disabled'));
  document.querySelectorAll('th.sort-asc, th.sort-desc').forEach(t => {
    t.classList.remove('sort-asc', 'sort-desc');
    const ind = t.querySelector('.sort-ind');
    if (ind) ind.textContent = '▼';
  });
  closePopover();
  render();
});

document.getElementById('select-all-btn').addEventListener('click', () => {
  // Select every cat1 and cat2 chip
  state.cat1.clear();
  state.cat2.clear();
  document.querySelectorAll('#filter-cat1 .chip').forEach(chip => {
    state.cat1.add(chip.dataset.value);
    chip.classList.add('active');
    chip.classList.remove('disabled');
  });
  document.querySelectorAll('#filter-cat2 .chip').forEach(chip => {
    state.cat2.add(chip.dataset.value);
    chip.classList.add('active');
    chip.classList.remove('disabled');
  });
  // Include items with empty cat1/cat2 so "전체 선택" really means all 214
  state.cat1.add('');
  state.cat2.add('');
  closePopover();
  render();
});

document.getElementById('print-btn').addEventListener('click', () => window.print());

document.getElementById('export-btn').addEventListener('click', () => {
  const rows = applyFilters();
  if (!rows.length) { alert('내려받을 데이터가 없습니다.'); return; }
  const header = ['순번','카테고리1','카테고리2','과정명','학습시간','콘텐츠수','강사','요약','학습목표','학습대상','레벨(Level)'];
  const aoa = [header, ...rows.map((d, i) => [i+1, d.cat1, d.cat2, d.title, d.duration, d.contents, d.instructor, d.summary, d.goal, d.target, d.level])];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:6},{wch:12},{wch:14},{wch:50},{wch:11},{wch:9},{wch:18},{wch:60},{wch:50},{wch:40},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'AX Academy 과정');
  XLSX.writeFile(wb, '스마트러닝_AX_Academy 인증 과정 목록.xlsx');
});

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    else { state.sortKey = key; state.sortDir = 'asc'; }
    document.querySelectorAll('th[data-sort]').forEach(t => {
      t.classList.remove('sort-asc', 'sort-desc');
      const ind = t.querySelector('.sort-ind');
      if (ind) ind.textContent = '▼';
    });
    th.classList.add(state.sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    const ind = th.querySelector('.sort-ind');
    if (ind) ind.textContent = state.sortDir === 'asc' ? '▲' : '▼';
    render();
  });
});

buildChips();
render();
</script>
</body>
</html>

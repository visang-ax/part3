링 음악 제작 (Gemini Ai, Suno AI)", "duration": "1:16:47", "contents": "8", "instructor": "윤재영", "summary": "· 이 과정은 Google Gemini와 Suno AI를 활용하여 힐링 음악을 제작하는 실습 중심 강의입니다. \n· 아이디어 도출부터 프롬프트 작성, 음악 생성, 저작권·윤리적 고려까지 창의적 제작 흐름을 체험합니다.", "goal": "· 생성형 AI의 특징과 활용법을 이해하고 Gemini와 Suno AI를 연계하여 맞춤형 음악을 제작합니다. · 저작권과 윤리적 책임을 고려하며 AI 시대의 올바른 창작 태도를 습득합니다.", "target": "AI를 활용해 힐링 음악 제작 과정을 체험하며 창의적 활용 능력을 기르는 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "직무별 맞춤 ChatGPT 활용법: AI로 업무 혁신하기", "duration": "1:18:28", "contents": "7", "instructor": "박기삼", "summary": "\"AI로 일의 혁신을 시작하다!\" 반복 업무 자동화, 콘텐츠 제작, 데이터 정리 등 다양한 직무에서 바로 적용 가능한 AI 스킬을 배우세요!\n", "goal": "- 직무에 적합한 ChatGPT 활용 방법을 이해하고 실무에 바로 적용할 수 있다.  \n- 반복적인 업무를 자동화하여 효율성을 높이고 시간 관리를 최적화할 수 있다.  \n- ChatGPT를 활용해 마케팅, 인사, 고객 서비스 등 다양한 분야에서 성과를 향상시킬 수 있다.  \n- ChatGPT를 활용한 커리어 개발과 자기소개서 작성법으로 취업 경쟁력을 강화할 수 있다.  ", "target": "- AI를 활용해 업무 효율성을 높이고 싶은 직장인\n- 마케팅, 인사, CS, R&D, 경영지원 등의 실무에 ChatGPT를 적용하고 싶은 전문가\n- AI를 활용한 취업 및 커리어 개발에 관심 있는 취준생 및 경력 개발자 \n- 업무 자동화와 데이터 관리로 시간을 절약하고 싶은 모든 직무 담당자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "프롬프트에 대한 이해와 ChatGPT 주요 기능 활용법", "duration": "1:23:12", "contents": "7", "instructor": "박기삼/임재훈", "summary": "프롬프트 엔지니어링부터 문서 작성 및 분석까지, AI 도구를 이용한 실무 능력을 극대화할 수 있습니다.", "goal": "- 프롬프트 엔지니어링을 익혀 ChatGPT와 효과적으로 소통할 수 있다.", "target": "- ChatGPT를 업무에 적용하고 싶은 직장인\n- 프롬프트 엔지니어링을 배우고 이를 다양한 업무에 적용하고자 하는 관리자 및 실무자", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "말해봐, ChatGPT가 다 해줄게. 창의적 질문력", "duration": "1:25:01", "contents": "7", "instructor": "오수정", "summary": "본 과정은 ChatGPT를 활용해 실무에서 필요한 질문을 직접 설계하고, 이를 기반으로 아이디어 생성, 보고서 작성, 문제 해결까지 확장하는 질문력 중심의 교육이다. 좋은 질문을 만드는 법부터 팀 단위 워크숍, Why 기반 사고, 질문 템플릿 자동화까지 실습 중심으로 구성되어 있어, 직장인이 현장에서 바로 활용할 수 있는 질문 설계 및 사고력 향상 교육을 제공한다.", "goal": "다양한 실무 문서에 맞는 GPT 프롬프트 질문을 구조화할 수 있다.\n창의적 사고를 유도하는 질문을 통해 아이디어를 생성하고 확장할 수 있다.\n반복 업무에 질문 템플릿을 적용하여 업무 자동화 기반을 마련할 수 있다.", "target": "회의, 보고, 정책 제안 등 실무 문서에서 GPT를 적극 활용하고 싶은 직장인\n아이디어 회의, 브레인스토밍, 기획 업무 등 창의력을 요구받는 실무자\n질문력을 바탕으로 팀 커뮤니케이션과 문제 해결 능력을 향상시키고자 하는 관리자", "level": "심화"}, {"cat1": "자기계발", "cat2": "자기혁신", "title": "AI 퍼스트 시대에 필요한 질문 전략", "duration": "1:28:22", "contents": "11", "instructor": "고영리", "summary": "보고서는 물론 일반 글쓰기까지! AI 활용법으로 질문 능력을 키워보자.", "goal": "- AI 도구를 제대로 이용하는 방법에 대해 이해할 수 있다.\n- AI를 활용한 질문법에 대해 집중적으로 다루고 있어 다양한 직무에 이를 활용할 수 있다.\n- 글쓰기와 보고서 작성 등 다양한 영역에서 요구되는 질문 능력과 사고력을 다질 수 있다.", "target": "- AI를 활용해 질문 방법을 배우고 질문력과 사고력을 확장하고 싶은 모든 임직원\n- 일상생활이나 업무에서 필요한 글쓰기 능력을 기르고 싶은 학생 및 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT와 함께하는 엑셀, PPT, 그리고 AI 도구 활용법", "duration": "1:30:38", "contents": "8", "instructor": "박기삼", "summary": "AI 기술의 진보로 업무 생산성이 혁신적으로 향상됩니다! ", "goal": "- ChatGPT를 활용하여 엑셀 함수, 데이터 분석, 그리고 시각화를 능숙하게 수행할 수 있다.\n- 엑셀 VBA를 활용한 업무 자동화 스킬을 습득하여 반복 작업을 효율적으로 처리할 수 있다.\n- ChatGPT와 감마AI를 활용해 PPT 기획과 제작을 빠르고 효과적으로 수행할 수 있다.\n- Perplexity, Claude, Gemini 등 최신 AI 도구를 활용하여 검색, 분석, 요약 등의 업무를 효과적으로 처리할 수 있다.\n- AI 시대의 변화와 기회를 이해하고, 실무에 적용 가능한 AI 활용 능력을 갖출 수 있다.", "target": "- AI를 활용한 업무 생산성 향상을 원하는 직장인.\n- 엑셀, PPT 등 실무 도구를 효과적으로 다루고자 하는 초보자 및 숙련자.\n- 최신 AI 도구를 활용해 업무에 적용하고자 하는 모든 직장인.", "level": "심화"}, {"cat1": "리더십", "cat2": "변화관리", "title": "AI 시대, 관점이 곧 경쟁력이다", "duration": "1:32:48", "contents": "10", "instructor": "은종성", "summary": "AI는 기술이 아니라 선택입니다. 그 선택을 가르는 건 바로 ‘관점’입니다.", "goal": "1. AI 기술을 전략적 관점에서 해석하고 선택하는 기준을 갖출 수 있다.\n2. 산업과 비즈니스 흐름을 이해하고, 그에 따른 조직·업무 전략 방향을 파악할 수 있다.\n3. 실제 AI 적용 사례를 통해 업무 혁신과 가치 창출 방식을 도출할 수 있다.", "target": "1. AI를 기술이 아닌 전략적 자산으로 이해하고 싶은 실무자·관리자\n2. 업무에 AI를 적용해야 하지만, 어디서부터 시작할지 막막한 기획자·PM·교육담당자·운영담당자\n3. 산업 변화 흐름과 AI 활용 전략을 폭넓게 이해하고 싶은 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI로 10배 빨라지는 Photoshop (포토샵)", "duration": "1:34:46", "contents": "3", "instructor": "김기민", "summary": "· 생성형 AI 기반 포토샵 기능을 활용해 이미지 제작의 새로운 가능성을 탐색하며, 인터페이스 이해부터 핵심 도구 활용까지 체계적으로 학습합니다. · AI 이미지 생성, 사진 보정, 합성, 디자인 레이아웃 구성 등 전통적인 포토샵 기술과 최신 AI 기능을 결합해 효율적인 워크플로우를 익힙니다. · 실전 포스터 제작, SNS 콘텐츠 디자인, 브랜드 비주얼 개발 등 다양한 실습 프로젝트를 통해 즉시 활용 가능한 실무 능력을 강화합니다.", "goal": "· 생성형 AI 기능과 포토샵의 핵심 도구를 연계해 이미지 제작 및 편집 작업을 효율적으로 수행할 수 있습니다. · 레이어, 마스크, 스마트 오브젝트를 활용하여 복잡한 구성을 체계적으로 설계하고 수정할 수 있습니다.", "target": "· AI 기능이 탑재된 최신 포토샵을 체계적으로 배우고 싶은 초중급 학습자 · 이미지 생성부터 편집까지 AI와 디자인 기술을 함께 익히고자 하는 디자이너 및 콘텐츠 제작자 · AI 기반 그래픽 편집 기술로 작업 효율을 높이고자 하는 크리에이터 및 마케터", "level": "심화"}, {"cat1": "IT", "cat2": "IT 기획", "title": "파이썬 데이터 시각화 마스터", "duration": "1:35:19", "contents": "6", "instructor": "김계철", "summary": "데이터 시각화의 중요성과 기본적인 개념을 이해하고, 다양한 데이터 시각화 기법을 활용하여 데이터를 효과적으로 표현할 수 있는 능력을 배양합니다.", "goal": "- 복잡한 데이터를 명확하고 직관적으로 전달할 수 있는 시각화 방법을 습득하고, 이를 통해 데이터 기반 의사결정과 커뮤니케이션 능력을 향상시킬 수 있다.\n- 시간, 분포, 관계, 비교, 공간 등 다양한 정보 시각화 기법을 익혀, 데이터를 시각적으로 분석하고 중요한 패턴과 인사이트를 도출할 수 있다.", "target": "- 공공기관 근무자\n- 데이터를 기반으로 의사결정하고 행정서비스을 제공하고자 하는 자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] Kling AI로 영상 기획부터 SNS 배포까지 90분 만에 완성하기", "duration": "1:35:24", "contents": "7", "instructor": "장세인", "summary": "영상도 텍스트로 만드는 시대, 클릭 몇 번만으로 텍스트를 고화질 영상 콘텐츠로 제작해 주는\n‘Kling AI’ 마스터하기!", "goal": "- 텍스트 한 줄로 이미지·영상을 제작하는 AI 기술을 활용하여 영상 콘텐츠를 제작할 수 있다.\n- 모핑, Motion Brush, Lip Sync 등 다양한 연출 효과를 AI로 구현할 수 있다.\n- Kling AI, ClipChamp, Wrtn, Buffer 등의 도구들을 유기적으로 연결하여 활용할 수 있다.", "target": "- 다양한 AI 도구에 대해 학습하고 활용법을 익히고 싶은 직장인\n- AI를 활용하여 영상 콘텐츠를 만들고 싶은 마케팅·기획·HR 담당자\n- 복잡한 툴 없이도 감각적인 비주얼을 구현하고 싶은 모든 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[AI 스킬링] 사회과학 연구 프로젝트를 위한 AI 활용 실전 가이드", "duration": "1:35:59", "contents": "5", "instructor": "신민수", "summary": "막막한 논문 작성, 수많은 AI 중 무엇을 써야 할지 모르겠다면? 사회과학 연구자를 위한 논문 작성 AI 활용법!\n\n본 과정은 사회과학 연구 분야에 맞춰, 연구 주제 선정부터 선행연구 분석, 연구 설계, 데이터 분석까지 논문 작성 전 과정에 AI를 활용하는 실전 과정이다.\nChatGPT, Gemini, Claude, Consensus, SciSpace 등 다양한 AI 도구를 활용해 실제 연구 과제를 진행하며, 각 단계에서 목적에 맞는 AI를 선택하고 활용하는 역량을 기를 수 있다.", "goal": "- 논문 작성 과정에 맞춰 생성형 AI를 효과적으로 활용할 수 있다.\n- 연구 주제 선정부터 데이터 분석까지 AI를 활용해 논문을 체계적으로 작성할 수 있다.\n- 다양한 AI 도구를 목적에 맞게 선택하고 실제 연구에 적용할 수 있다.", "target": "- 논문 또는 연구 프로젝트 수행이 필요한 직장인\n- 연구·분석 기반 업무를 수행하는 직장인\n- 생성형 AI를 활용하고 있지만 실무에 제대로 적용하지 못하는 직장인", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "기획력", "title": "AI 에이전트 시대, 인공지능으로 확장하는 기획력", "duration": "1:39:44", "contents": "10", "instructor": "이정훈", "summary": "AI를 통한 업무 수행, 정확한 지시가 답이다.", "goal": "1. AI를 통해 기획서의 구조를 설계하고, 핵심 내용을 시작적으로 표현할 수 있다. \n2. AI를 활용하여 다양한 아이디어와 실행안을 창의적으로 생성할 수 있다.\n3. AI 기반 기획서를 효과적으로 보고하고, 업무에 실질적으로 적용할 수 있다. ", "target": "1. 기획업무를 담당하는 임직원\n2. AI 시대에 필요한 기획력을 학습하고자 하는 임직원\n3. AI를 기획 실무에 적용할 수 있는 구체적 방법을 알고 싶은 모든 임직원", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[AI 스킬링] 자연과학 연구 프로젝트를 위한 AI 활용 실전 가이드", "duration": "1:41:22", "contents": "5", "instructor": "신민수", "summary": "막막한 논문 작성, 수많은 AI 중 무엇을 써야 할지 모르겠다면? 자연과학 연구자를 위한 논문 작성 AI 활용법!\n\n본 과정은 자연과학 연구 분야에 맞춰, 연구 주제 선정부터 선행연구 분석, 연구 설계, 데이터 분석까지 논문 작성 전 과정에 AI를 활용하는 실전 과정이다.\nChatGPT, Gemini, Claude, Consensus, SciSpace 등 다양한 AI 도구를 활용해 실제 연구 과제를 진행하며, 각 단계에서 목적에 맞는 AI를 선택하고 활용하는 역량을 기를 수 있다.", "goal": "- 논문 작성 과정에 맞춰 생성형 AI를 효과적으로 활용할 수 있다.\n- 연구 주제 선정부터 데이터 분석까지 AI를 활용해 논문을 체계적으로 작성할 수 있다.\n- 다양한 AI 도구를 목적에 맞게 선택하고 실제 연구에 적용할 수 있다.", "target": "- 논문 또는 연구 프로젝트 수행이 필요한 직장인\n- 연구·분석 기반 업무를 수행하는 직장인\n- 생성형 AI를 활용하고 있지만 실무에 제대로 적용하지 못하는 직장인", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "말해봐, ChatGPT가 다 해줄게. 실전 업무 활용", "duration": "1:43:04", "contents": "7", "instructor": "김금란", "summary": "본 과정은 ChatGPT를 기반으로 Napkin AI, Gamma AI, Felo AI, Imagen 3, Suno AI 등 다양한 생성형 AI 도구를 활용하여 실제 사무환경에서 필요한 콘텐츠를 자동 생성·활용하는 실전형 강의이다. 보고서 요약, 발표자료 구성, 이미지 생성, 음악 제작 등 멀티모달 콘텐츠 제작 역량을 중심으로 구성되어 있으며, 각 도구의 특성을 살린 업무별 적용사례 실습이 포함된다.", "goal": "다양한 생성형 AI 도구를 활용해 시각 콘텐츠 및 발표자료를 자동으로 제작할 수 있다.\n하나의 정보나 주제를 카드뉴스, PPT, 마인드맵 등 다양한 형식으로 변환할 수 있다.\n업무 목적에 맞는 이미지 및 음악 콘텐츠를 생성하고 실무에 적용할 수 있다.", "target": "보고서, 발표자료 등 콘텐츠 제작을 반복적으로 수행하는 실무자\n사내 커뮤니케이션, 홍보, 교육 콘텐츠 제작을 담당하는 기획·홍보 담당자\n생성형 AI를 실제 업무에 적용하고자 하는 전 직무의 사무직 종사자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI Vibe(바이브) 코딩으로 TodoList App 하루 만에 만들기 Part.1 바이브 코딩이란, Cursor AI", "duration": "1:43:14", "contents": "4", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 Cursor AI 툴을 사용하여 TodoList 앱을 질문만으로 만들어보는 동영상 과정입니다.", "goal": "최신 AI 인공지능 툴을 사용하여 웹 프로그램을 개발합니다.", "target": "커서 AI 인공지능 툴을 사용하여 질문만으로 애플리케이션 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "말해봐, ChatGPT가 다 해줄게. 스마트 업무 자동화", "duration": "1:45:17", "contents": "6", "instructor": "김애란", "summary": "이 과정은 ChatGPT 및 생성형 AI 도구를 활용하여 반복 문서 자동화, 보고서 요약, PPT 및 발표대본 생성, 회의록 정리, 스마트 리서치 등 다양한 실무 문서 작성 업무를 자동화하는 실전 중심의 교육으로 문서 유형별 자동화 전략부터 AI 기반 정보 수집 및 활용법까지, 실습과 사례 중심으로 구성되어 있어 학습자가 실제 업무에 바로 적용할 수 있도록 설계되어 있다.", "goal": "반복 문서 작성 및 정리에 필요한 프롬프트 작성 능력을 기른다.\n다양한 문서 유형(기획안, 회의록, 발표자료 등)에 생성형 AI를 적용할 수 있다.\n정보 수집부터 시각화까지 문서 작성 전 과정을 자동화할 수 있다.", "target": "반복적인 문서 업무를 효율적으로 자동화하고자 하는 일반 직장인\n팀 리더 및 관리자급으로 문서 보고와 회의가 잦은 실무자\n공공기관, 지자체, 기업의 문서 작성 및 보고 업무 담당자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "직장인을 위한 ChatGPT 실무 활용법", "duration": "1:50:31", "contents": "15", "instructor": "박기삼/임재훈", "summary": "이 과정은 ChatGPT의 다양한 실무 활용 방법을 통해 직장인들이 ChatGPT를 통해 업무 효율성을 높일 수 있으며, ChatGPT를 통해 보고서 작성, 이메일 처리, 번역 및 데이터 분석 등 다양한 업무에서 ChatGPT를 활용할 수 있도록 돕습니다. ", "goal": "- ChatGPT의 주요 기능과 개념을 이해하고 이를 실무에 적용할 수 있다.\n- 보고서, 이메일, 번역 등 다양한 업무에서 ChatGPT를 활용해 효율성을 높인다.\n- 데이터 분석 및 자동화 작업에 ChatGPT를 적용하여 업무 생산성을 극대화한다.", "target": "- ChatGPT를 업무에 적용하고 싶은 직장인\n- 인공지능 도구를 활용해 문서 작성, 데이터 처리 등의 업무 시간을 절감하고자 하는 실무자", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "AI 시대, 저작권을 지키고 인간의 감각을 더하는 글쓰기", "duration": "1:50:53", "contents": "10", "instructor": "정지우", "summary": "모두가 AI로 글을 쓰는 시대, 이제 우리는 무엇을 어떻게 써야 할까?\n저작권법 변호사이자 작가가 전하는 '저작권 걱정 없는 AI 글쓰기 전략’", "goal": "1. AI 글쓰기의 원리와 활용 전략을 이해하고 실무에 적용할 수 있다.\n2. AI의 한계를 인식하고 인간 고유의 감각과 창의성을 결합한 글쓰기를 실천할 수 있다.\n3. AI 글쓰기와 관련된 저작권 이슈를 설명하고 법적 리스크를 예방할 수 있다.", "target": "- AI 도구를 활용해 글쓰기·창작·업무 생산성을 높이고 싶은 직장인\n- 콘텐츠 기획, 마케팅, 브랜딩 등 차별화된 콘텐츠 제작 업무를 담당하는 직장인\n- AI 관련 저작권·법적 리스크에 대비해야 하는 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 데이터 리터러시 Overview", "duration": "1:52:44", "contents": "6", "instructor": "김진", "summary": "데이터 기반으로 사고하고 비즈니스 문제를 데이터로 해결해내는 능력을 키워보자.", "goal": "1. 전반적인 데이터의 개념과 종류를 이해하고 데이터 활용을 위한 계획을 수립할 수 있다. \n2. 데이터를 분석이 가능한 형태로 구조화, 정제화할 수 있다.\n3. 데이터에 분석모델을 적용해 인사이트를 도출할 수 있다.", "target": "- 비즈니스 문제를 데이터 기반 인사이트로 해결하고 싶은 직장인\n- 쉬운 분석도구인 엑셀을 활용하여 데이터를 분석하고 시각화하고 싶은 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "누구나 쉽게! AI로 시작하는 Photoshop (포토샵) 디자인", "duration": "1:52:48", "contents": "4", "instructor": "김기민", "summary": "· 생성형 AI 기반 포토샵 기능을 활용해 이미지 제작의 새로운 가능성을 탐색하며, 인터페이스 이해부터 핵심 도구 활용까지 체계적으로 학습합니다. \n· AI 이미지 생성, 사진 보정, 합성, 디자인 레이아웃 구성 등 전통적인 포토샵 기술과 최신 AI 기능을 결합해 효율적인 워크플로우를 익힙니다. \n· 실전 포스터 제작, SNS 콘텐츠 디자인, 브랜드 비주얼 개발 등 다양한 실습 프로젝트를 통해 즉시 활용 가능한 실무 능력을 강화합니다.", "goal": "· 생성형 AI 기능과 포토샵의 핵심 도구를 연계해 이미지 제작 및 편집 작업을 효율적으로 수행할 수 있습니다. · 레이어, 마스크, 스마트 오브젝트를 활용하여 복잡한 구성을 체계적으로 설계하고 수정할 수 있습니다.", "target": "· AI 기능이 탑재된 최신 포토샵을 체계적으로 배우고 싶은 초중급 학습자 · 이미지 생성부터 편집까지 AI와 디자인 기술을 함께 익히고자 하는 디자이너 및 콘텐츠 제작자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI 시대의 올바른 판단을 위한 AI 윤리와 리터러시", "duration": "1:54:30", "contents": "8", "instructor": "이상욱", "summary": "AI에게 결정을 위탁한 시대,\n‘AI에게 지배당할 것인가, 지배할 것인가’를 결정하는 것은 AI 활용 스킬이 아닌 인간 고유의 ‘윤리적 감각’!\n\n\n지금 가장 핫한 AI 윤리 이슈와 리스크를 사례, 법규, 업무 적용을 통해 알려주는 강의\n\n- AI를 맹신하지 않고, 제대로 질문하고 판단하는 힘을 기르기 위한 윤리적 분별력을 기르는 법 제시\n- AI 윤리 분야 특강 섭외 1순위, 한양대 철학/인공지능학과 이상욱 교수 직강\n- OECD, EU, UNESCO, 인공지능 기본법 등 국내외 AI 규제의 방향을 짚어주는 강의", "goal": "- AI 사용과 관련된 주요 윤리적 쟁점을 식별할 수 있다.\n- 국제 규범 트렌드를 통해 AI를 활용한 업무 상황에서 발생할 수 있는 리스크를 분석할 수 있다.\n- AI를 책임 있게 활용하기 위한 AI 리터러시 기반의 실천 전략을 제시할 수 있다.", "target": "- 생성형 AI를 실무에서 활용하는 모든 직장인\n- AI 활용 가이드라인과 법적 책임이 궁금한 직장인\n- 생성형 AI 도입 전략을 가지고 있는 조직 리더", "level": "Seed"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "AI 업무 실전 활용 - 나는 인공지능 동료와 일한다", "duration": "1:56:22", "contents": "10", "instructor": "김태은", "summary": "ChatGPT가 쏘아올린 업무의 미래, 확장된 협업의 내일을 만나다 ", "goal": "- 인공지능을 어떤 업무에 활용할 수 있는지 그 기능과 활용 범위를 이해할 수 있다.\n- 인공지능 프로그램을 실제 업무에 어떻게 활용하면 되는지 상황별 프롬프트 작성법을 이해하고 직접 적용해볼 수 있다.", "target": "- 신기술을 활용한 업무혁신과 성과증진이 필요한 리더\n- AI 기술을 실무에 활용할 방법을 찾는 임직원\n- 기술 혁신 트렌드에 뒤쳐지지 않고자 하는 임직원 \n- 업무 효율 증진을 고민하는 모든 임직원", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI 스킬링] 다양한 AI와 실전 프롬프트로 30분 만에 끝내는 보고서 작성", "duration": "1:56:28", "contents": "8", "instructor": "박경수", "summary": "보고서 작성 고민 끝! 퇴근 전 보고 끝!\n지금 당장 업무에 써먹어야 할 20개 성생형 AI와 만능 프롬프트 33개", "goal": "1. 보고서 작성 단계에 맞는 최적의 생성형 AI를 선별하고 단계별로 활용할 수 있다.\n2. 보고서 작성의 전 단계를 AI로 처리하고, 단계별 프롬프트 작성법을 익혀 원하는 결과물을 정확하게 도출할 수 있다.\n3. 반복적인 문서 작업을 자동화해 업무 효율을 높이고 핵심 업무에 집중하는 업무 루틴을 만들고 실행할 수 있다.   ", "target": "1. AI를 활용하여 자료 조사부터 분석·시각화·문서 작성까지 보고서 작성의 전 과정을 체계적으로 익히고 싶은 직장인\n2. 생성형 AI를 활용해 보고서·기획서 작성 시간을 획기적으로 줄이고 싶은 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT로 업그레이드하는 비즈니스 엑셀 2", "duration": "1:59:35", "contents": "12", "instructor": "권현욱", "summary": "이 과정은 ChatGPT를 활용해 엑셀의 기본 역량을 업그레이드할 수 있도록 해줍니다.\n \n■ 엑셀, 워드, 파워포인트에서의 단순 작업이 힘들다면?\n  매크로와 VBA 코딩 등 엑셀뿐만 아니라 워드와 파워포인트에도 ChatGPT를 활용하여 쉽고 빠르게 ‘업무 자동화’ 하여 업무 역량을 업그레이드할 수 있습니다.\n \n■   다양한 예제 실습\n  다양한 예제를 통해 학습 내용을 응용해 볼 수 있어요!\n \n■   국내 최초 발간 [챗GPT+엑셀 업무자동화 정석] 저자의 강의\n   Microsoft Excel MVP(최고기술전문가)이자 국내 최초로 발간된 ChatGPT 엑셀 본격 활용서 [챗GPT+엑셀 업무자동화 정석] 저자의 강의로 누구나 쉽게 이해할 수 있습니다.", "goal": "ChatGPT를 활용하여 엑셀뿐만 아니라 워드, 파워포인트에서까지 업무 자동화할 수 있는 다양한 아이디어에 대해 학습할 수 있다.", "target": "엑셀을 더 잘 활용하고 싶고, 워드와 파워포인트에도 ChatGPT를 활용하여 업무 역량을 업그레이드하고 싶은 모든 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(1) 데이터마이닝 입문", "duration": "10:08:16", "contents": "20", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 분석, Orange3! 데이터 분석 입문자도 쉽고 빠르게 할 수 있는 데이터 마이닝\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 다양한 업무 수행을 위해 꼭 필요한 데이터 분석, 아직도 엑셀 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정은 실무에 가장 많이 쓰이는 대표적인 분석 방법을 활용한 실전 사례 분석을 제공한다. 데이터 분석의 기본 개념부터 Orange3를 활용한 데이터 분석을 습득하여 데이터 분석 능력을 향상해 보자.", "goal": "- 노코딩 인공지능 데이터분석 도구인 Orange3 활용 방법을 설명할 수 있다.\n- 데이터 분석의 기본 개념을 익히고, 대표적인 분석 기법들을 활용할 수 있다.\n- 데이터 분석 업무를 자동화하여 업무 효율성을 향상할 수 있다.", "target": "- 데이터 분석을 처음 시작하는 직장인\n- 코딩 없이 데이터를 분석하고 싶은 직장인\n- 데이터 분석 역량을 향상하여 업무 효율성을 향상하고자 하는 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(5) 군집화와 차원 축소", "duration": "10:31:46", "contents": "18", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 사이언스, Orange3! 노코드 AI 프로그램으로 군집화와 차원 축소를 쉽고 빠르게!\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 클러스터링과 차원 축소, 아직도 파이썬 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정을 통해 복잡한 프로그래밍의 벽을 허물고, 데이터 분석을 자신 있게 수행할 수 있는 심화 데이터 사이언티스트로 거듭나 보자.", "goal": "- Orange3에서 군집화 알고리즘을 활용하는 방법을 설명할 수 있다.\n- Orange3의 선형, 비선형 차원 축소 기법을 활용하여 복잡한 데이터의 차원을 줄일 수 있다.\n- 다양한 실습을 통해 실무적 데이터 분석 기술을 강화할 수 있다.", "target": "- 노코드 프로그램으로 군집화와 데이터 차원 축소를 간단히 수행하고 싶은 직장인\n- 파이썬보다 더 간단한 심화 분석 도구 사용을 원하는 직장인\n- 데이터 분석 역량을 향상하여 업무 효율성을 향상하고자 하는 직장인", "level": "고급"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "머신러닝의 이해와 실습", "duration": "10:36:35", "contents": "20", "instructor": "양지헌", "summary": "머신러닝 핵심주제를 전반적으로 다루며, 머신러닝의 다양한 주제를 이론과 함께 파이썬 코딩으로 직접 실습해보는 과정으로서, 실제 비즈니스에서 필요로 하는 거의 모든 주제를 경험해볼 수 있습니다  ", "goal": "머신러닝의 여러 가지 알고리즘을 이해하고 이를 활용하여 파이썬 코딩으로 구현할 수 있다.", "target": "- 머신러닝 초보자\n- 파이썬 기초 가능자\n- 머신러닝 관련 전공자로서 근래의 발전된 내용을 공부하고자 하는 직장인", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 통계 분석 마스터 클래스 Part.2", "duration": "10:43:46", "contents": "13", "instructor": "김진/최정아", "summary": "통계에 장벽을 느끼는 직장인을 위한 통계 입문 강의!", "goal": "1. 통계에 대한 기본적인 이해를 학습하고 데이터 분석의 결과에 대해 통계적 시각을 가지고 바라볼 수 있다.\n2. 통계 지식을 기반으로 각종 통계 자료에 대한 데이터 분석과 데이터 신뢰 여부에 대해 판단할 수 있다.", "target": "- 분석 기반의 업무를 하고 있는 직장인\n- 통계 분석에 대한 전반적인 이해가 필요한 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "실무에 바로 쓰는 파이썬 웹크롤러 제작", "duration": "11:27:15", "contents": "19", "instructor": "서진수", "summary": "파이썬 기초문법과 웹(HTML) 기본문법부터 시작하여 공공기관 운영 웹사이트와 일반 기업의 웹사이트 정보 수집용 웹크롤러를 제작하는 방법을 배우는 과정입니다 다양한 예제를 통해 배우고 실습함으로써 실무적용 능력을 습득할 수 있습니다", "goal": "- 파이썬 언어의 기본 문법을 이해하고 활용할 수 있다.\n- 웹 페이지의 작동원리를 이해하고 원하는 태그를 찾아낼 수 있다.\n- 다양한 실제 웹사이트들의 정보를 수집할 수 있는 웹 크롤러를 직접 만들 수 있다.", "target": "- 인터넷의 다양한 데이터를 수집해야 하는 기획자나 분석가\n- 고객들의 반응이나 니즈를 찾아야 하는 상품 담당\n- 웹 크롤러를 만들어야 하는 개발자\n- 파이썬 언어의 기초부터 활용까지 배우기 원하는 모든 임직원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT 마스터 클래스 : 남들보다 100배 더 잘 쓰기 위한 활용법 A to Z", "duration": "11:40:02", "contents": "19", "instructor": "최정아", "summary": "어떻게하면 남들보다 ChatGPT를 효과적으로 활용할 수 있을까? \n원하는 비즈니스 환경에서 ChatGPT를 호출하여 편리하고, 효과적으로 활용할 수 있는 방법을 알려드립니다!", "goal": "- ChatGPT의 활용법을 파악하여 목적에 따라 ChatGPT를 효과적으로 사용할 수 있다. \n- 구글 스프레드 시트 등 다양한 연동 서비스를 활용해 생산성을 극대화 할 수 있다. \n- 원하는 비즈니스 환경에서 ChatGPT를 호출하여 편리하고, 효과적으로 작업할 수 있다. \n- ChatGPT의 심화스킬 및 응용법을 학습하여 프롬프트 엔지니어링으로 구체적인 명령을 수행할 수 있다.", "target": "- ChatGPT를 마스터하여 업무의 생산성을 극대화시키고자 하는 직장인 \n- ChatGPT 심화 활용법, 프롬프트 엔지니어링 기술을 마스터하고자 하는 개발자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "코딩이 필요한 당신에게 CURSOR AI 입문기 with Claude Code", "duration": "11:48:05", "contents": "24", "instructor": "이대성/장재현", "summary": "AI가 도와주는 웹 개발, 누구나 만드는 실용 웹서비스 입문\n혼자서는 어려운 프로젝트도 AI와 함께라면 가능합니다.\n코드 작성부터 UI 디자인까지, Cursor AI와 GPT API를 활용해 웹사이트와 웹서비스를 빠르게 제작하는 방법을 익힙니다. 단순 기능 구현을 넘어, 나만의 서비스와 프로젝트를 직접 완성합니다.", "goal": "Cursor AI와 ChatGPT API를 활용하여 간단한 웹사이트 제작부터 로그인, 결제, AI 기능 연동까지 직접 구현할 수 있는 실습형 역량을 기릅니다.", "target": "코딩 경험이 없지만 웹사이트·웹서비스 제작에 관심이 있는 구성원, 기획·운영·데이터 관련 직무 담당자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "Orange로 하는 노코드 AI 데이터 분석(2) 전처리와 시각화", "duration": "11:54:07", "contents": "21", "instructor": "최정아", "summary": "코딩 없는 AI 데이터 분석, Orange3! 효과적인 데이터 분석을 위한 전처리부터 데이터의 가치를 보여주는 시각화까지 한 번에!\n\nOrange3는 코딩 없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 데이터 전처리와 시각화, 아직도 엑셀과 파워포인트 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정을 통해 엑셀보다 편하게 데이터를 전처리 하고, 파워포인트보다 쉽게 시각화하는 방법을 습득하여, 심화 데이터 사이언티스트로 거듭나 보자.", "goal": "- 데이터 전처리와 피처 엔지니어링의 기본 프로세스를 설명할 수 있다.\n- 데이터 전처리로 효과적인 데이터 분석의 기초를 마련할 수 있다.\n- 다양한 시각화 기법을 활용하여 분석 결과를 명확하게 전달할 수 있다.", "target": "- 노코드 프로그램으로 데이터 전처리와 피처 엔지니어링을 간단히 수행하고 싶은 직장인\n- 데이터 시각화를 통해 분석 결과를 명확하게 전달하고자 하는 직장인\n- 데이터 시각화 역량을 향상하여 업무 효율성을 향상하고자 하는 직장인", "level": "심화"}, {"cat1": "OA", "cat2": "프리미어", "title": "쉽게 배우는 프리미어CC(영상편집, 생성형 AI)", "duration": "12:11:24", "contents": "28", "instructor": "양지원", "summary": "영상편집 업계에서 가장 많이 사용되는 프리미어 프로 프로그램에 대한 사용 방법과 AI를 활용한 영상편집 방법에 대해 이해한다. \n이를 통해 영상편집 파트에 대한 전문 인력 양성을 목표로 한다.", "goal": "1. 프리미어 프로의 주요 구성 패널을 이해하고, 러프 컷 편집과 정밀 컷 편집의 기초를 다진다.\n2. 기초 편집 후 효과 적용, 색 보정, 자막 삽입을 통해 종합 편집을 진행한다.\n3. 오디오 볼륨 조절, 배경 음악 삽입 및 믹싱을 통해 더 높은 품질의 영상 콘텐츠를 제작할 수 있도록 한다.\n4. AI를 활용한 편리한 기능을 통해 영상편집 시간을 줄이고 작업 속도를 높여 입문자들이 크리에이티브한 작업에 몰두할 수 있도록한다. ", "target": "- 프리미어 프로 입문자\n- 프리미어 기존버전 학습자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[ICT 지식 큐브] 인공지능, 보안, 네트워크, 클라우드", "duration": "12:20:28", "contents": "24", "instructor": "이정하/박수민/김준삼/김정욱/전지웅/박민수/최수경/김정우", "summary": "다양한 업무영역 크로스오버가 가능한 IT 전문 기술자를 양성하자.", "goal": "- ICT 기술 트렌드, 비즈니스 및 ICT 기술 융합 등 단순하고 명확한 개념설명과 사례를 기반으로 짧은 시간 내 내재화가 가능하도록 핵심 내용을 중심으로 학습한다. \n- 다양한 업무영역 크로스오버가 가능한 IT 전문 기술자 양성이 가능하며, 전문 자격 취득을 위한 에센스를 제공한다.", "target": "- 정보화에 관심이 있는 자\n- ICT 기술 관련 전문직 종사자, 시스템 및 소프트웨어 엔지니어 및 IT 전문 역량 강화 희망자\n- ICT 전문자격(정보관리/컴퓨터시스템응용기술사, 정보시스템감리사 등) 취득에 관심이 있는 분", "level": "Seed"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "비전공자도 쉽게 하는 Python 입문", "duration": "12:47:02", "contents": "16", "instructor": "박성백", "summary": "Python 환경설정부터 Python 프로그래밍의 기초 개념, 라이브러리, 언어의 사용 등을 실습 기반으로 제시하여 비전공자도 쉽게 익히고, 업무에 활용할 수 있도록 내용을 구성하였습니다. ", "goal": "- Python 개발환경을 구축하고, 기본 구조를 이해할 수 있다. \n- Python 언어의 기본문법, 리스트(list), 튜플(tuple), 셋(set), 딕셔너리(dictionary) 함수 사용법을 익힐 수 있다.\n- 제어문, 반복문 등을 통해 코드를 제어하는 방법을 습득하고, 자료형을 통해 데이터를 다루는 방법을 파악할 수 있다. \n- Python의 내장 형식과 함수들을 연습해서 간단하고, 반복적인 업무를 코드로 작성할 수 있다.", "target": "- Python을 처음 시작하는 프로그래밍 입문자\n- 응용프로그램 개발 및 데이터베이스 관리 업무를 시작하는 실무자\n- 프로그래밍으로 업무를 효율적으로 하고자 하는 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT를 활용한 세상에서 제일 쉬운 파이썬 코딩 클래스", "duration": "13:14:41", "contents": "21", "instructor": "김진", "summary": "코딩알못도 개발자만큼 프로그래밍을? 생성형 AI가 다 알려주는 코딩 비법!\n본 과정을 통해 코딩알못 초보자가 챗GPT를 활용하여 기초 코딩 지식을 익히고 프로젝트 실습까지 수행하도록 성장하는 방법을 제공합니다.", "goal": "- 생성 AI를 활용한 프로그래밍 계획 및 실제 구문을 작성할 수 있다.\n- 목표 기술에 대한 단계별 학습 계획을 작성할 수 있다.\n- 코딩 프로젝트를 수행하며 코드 리팩토링과 상세한 피드백을 요청할 수 있다.\n- 생성 AI 기반 코딩을 수행할 수 있는 기초 코딩 역량을 기를 수 있다.\n", "target": "- 코딩에 생성형 AI를 활용하는 법을 알고 싶은 직장인\n- 실무에서 필요한 기초 코딩 지식을 쉽게 익히고 싶은 직장인\n- 생성형 AI 사용법을 익혀 효율적으로 업무를 하고 싶은 모든 분\n", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "데이터 분석을 위한 파이썬 프로그램 통계분석 기초", "duration": "13:28:54", "contents": "28", "instructor": "정훈희", "summary": "[SW교육특강]데이터분석을 위한 파이썬 프로그램 통계분석 데이터 기초 과정 강좌를 수강합니다.", "goal": " - 파이썬을 이용한 데이터분석 방법에 대해 학습할 수 있다.", "target": "- 파이썬 프로그램을 사용하고자 하는 자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 스킬링] AI 업무 자동화로 완성하는 24시간 무인 오피스", "duration": "13:32:06", "contents": "28", "instructor": "안현수", "summary": "AI로 내 컴퓨터에 24시간 일하는 '무인 사무실' 만드는 법!\n코드를 몰라도 따라하면 완성되는 엔드 투 엔드 대량 업무 자동화 워크플로우", "goal": "1. 오피스 툴들을 하나로 묶어 끊김 없이 돌아가는 엔드 투 엔드 자동화 시스템을 설계할 수 있다.\n2. PC에 파이썬 환경을 구축하여 안전하게 대량의 데이터를 분석할 수 있다.\n3. 바이브코딩만으로 원하는 프로그램을 스스로 구현할 수 있다.", "target": "1. MS Office 프로그램을 사용하는 사무직 직장인\n2. 보안에 민감한 데이터를 다루는 데이터 분석 담당자\n3. '실무자'를 넘어 '설계자'로 도약하고 싶은 기획자", "level": "고급"}, {"cat1": "OA", "cat2": "일러스트", "title": "쉽게 배우는 일러스트CC(그래픽, 생성형 AI)", "duration": "14:42:49", "contents": "24", "instructor": "신현숙", "summary": "2D 그래픽의 대표적인 벡터 드로잉 프로그램인 일러스트레이터의 기본적인 사용법을 이해하고 이를 활용한 이미지 제작과 AI 기능을 통한 이미지 표현를 극대화하여 창의적인 디자인 작업에 자유롭게 적용할 수 있는 전문적인 시각 표현 기술을 익히는데 그 목표를 둔다.", "goal": "1. 일러스트레이터의 기본적인 도구 사용법을 익힌다.\n2. 다양한 벡터이미지를 제작할 수 있도록 여러 가지 형태를 실습한다.\n3. 일러스트레이터의 그래픽 효과를 이미지에 적용하여 표현력을 높이도록 한다.\n4. AI 기능을 활용하여 아이디어에 맞는 적합한 이미지를 빠르게 생성하고 퀄리티 높은 결과물을 제작하도록 한다.", "target": "- 일러스트 입문자 \n- 일러스트 기존버전 학습자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "R을 활용한 빅데이터 및 통계분석", "duration": "14:56:30", "contents": "24", "instructor": "박성백", "summary": "R프로그래밍을 이용해 누구나 빅데이터 분석을 할 수 있도록 데이터의 기본적인 개념, R의 유용한 함수와 패키지, 데이터 분석 실습을 담았습니다. ", "goal": "- R을 통한 데이터 스크래핑 기법과 크롤링 기법을 익혀 원하는 데이터를 추출할 수 있다.\n- R을 활용하여 데이터 분석 방법을 익히고 통계자료로 만들 수 있다.  \n- 다양한 타입의 자료를 수집하여 비즈니스 관점으로 활용할 수 있다.", "target": "- 전산시스템 및 데이터 관리 담당자\n- 마케팅 정보 수집 및 분석자\n- 빅데이터 수집 및 분석을 효율적으로 진행하고 싶은 현업 종사자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 스킬링] 기획자를 위한 AI Excel 실전: 뇌과학적 데이터 시각화 테크닉", "duration": "18:43:04", "contents": "33", "instructor": "최정아", "summary": "0.2초만에 시선을 사로잡는 보고서의 비밀! 뇌과학 인지 설계를 기반으로 AI와 함께 빠르게 완성하는 압도적 데이터 시각화", "goal": "- 뇌과학 기반 시지각 원리를 체계적으로 분석하여, 보고서의 가독성을 객관적으로 평가하고 개선할 수 있다.\n- 복잡한 데이터에서 핵심 인사이트를 도출하고 이를 전략적으로 강조하는 대시보드를 설계할 수 있다.\n- AI와 엑셀 고급 기능을 활용하여 시계열 예측 보간 및 지도 시각화 등 고난도 데이터 전처리와 시각화 프로세스를 자동화할 수 있다.", "target": "- 시각화 이론은 모르고 감각에만 의존하여 보고서를 작성하는 실무자\n- 복잡한 데이터의 핵심 인사이트 도출 및 전달에 어려움을 겪는 기획자\n- AI를 도구로 활용하여 데이터 전처리 및 시각화 생산성을 높이고 싶은 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI가 훔쳐간 인문학", "duration": "2:00:36", "contents": "8", "instructor": "김철수", "summary": "\"AI가 훔쳐가 인문학\" 의 저자, 김철수 소장의 철학적 질문을 바탕으로 AI시대를 살아가야 할 현대인에게 삶의 통찰과 지혜를 제시합니다.", "goal": "1. AI와 공존하며 살아가야 하는 시대, 철학적 질문을 바탕으로 삶의 통찰력과 지혜를 얻어갈 수 있다.\n2. AI시대 필요한 기술과 사고의 방법 학습으로 미래에 대비할 수 있다.", "target": "인공지능 및 인문학에 관심 있는 모든 사람", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[슬기로운 통계생활] Tidyverse 기초과정", "duration": "2:02:53", "contents": "5", "instructor": "이삭", "summary": "R 데이터 분석의 주축을 이루는 tidyverse 패키지를 통해 주요 함수의 용법을 이해하자!", "goal": "- Tidyverse 패키지 주요함수에 대한 기초 내용과 사용법을 숙지할 수 있다.\n- Tidyverse 패키지를 사용하여 데이터의 특성들을 시각화하고, 해석할 수 있다.", "target": "- 데이터 분석을 처음 공부하는 직장인\n- R을 처음 배우는 직장인\n- Tidyverse 패키지를 활용하고자 하는 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT로 업그레이드하는 비즈니스 엑셀 1", "duration": "2:03:12", "contents": "12", "instructor": "권현욱", "summary": "이 과정은 ChatGPT를 활용해 엑셀의 기본 역량을 업그레이드할 수 있도록 해줍니다.\n \n■ 엑셀, 워드, 파워포인트에서의 단순 작업이 힘들다면?\n  매크로와 VBA 코딩 등 엑셀뿐만 아니라 워드와 파워포인트에도 ChatGPT를 활용하여 쉽고 빠르게 ‘업무 자동화’ 하여 업무 역량을 업그레이드할 수 있습니다.\n \n■   다양한 예제 실습\n  다양한 예제를 통해 학습 내용을 응용해 볼 수 있어요!\n \n■   국내 최초 발간 [챗GPT+엑셀 업무자동화 정석] 저자의 강의\n   Microsoft Excel MVP(최고기술전문가)이자 국내 최초로 발간된 ChatGPT 엑셀 본격 활용서 [챗GPT+엑셀 업무자동화 정석] 저자의 강의로 누구나 쉽게 이해할 수 있습니다.", "goal": "ChatGPT를 활용하여 엑셀의 기본 기능뿐만 아니라 복잡한 함수 사용 등 다양한 엑셀 활용법에 대해 학습할 수 있다.", "target": "ChatGPT와 엑셀을 처음 사용하거나 엑셀 활용이 어려운 모든 학습자", "level": "심화"}, {"cat1": "경영일반", "cat2": "경영혁신", "title": "같은 AI 다른 세대, 우리는 왜 이렇게 AI를 다르게 쓰는가", "duration": "2:09:13", "contents": "8", "instructor": "최원설/이재하/고은비", "summary": "2025년, 업무혁신의 가장 큰 트렌드 AI\nAI는 이제 모든 세대가 마주한 공통의 과제입니다.\nXYZ세대는 서로 다른 방식으로 AI를 이해하고 활용하고 있습니다. 이 과정은 세대별 시각 차이를 넘어, AI를 소통과 협업의 언어로 바꾸는 방법을 함께 모색합니다. AI 시대, 세대를 잇는 새로운 일의 문화를 만나보세요.4", "goal": "세대 이해와 AI 기반 협업으로 조직 맞춤 커뮤니케이션 전략을 수립할 수 있다.", "target": "다양한 세대가 함께 일하는 조직 구성원 및 관리자 (MZ세대 ~ X세대)", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "일단 따라하면 생산성이 높아지는 RPA 활용 모음.ZIP", "duration": "2:09:14", "contents": "12", "instructor": "양지수", "summary": "AI, 로봇과 함께 일하는 4차 산업혁명 시대! 앞으로 RPA 활용 능력은 엑셀 만큼이나 직장인에게 꼭 필요한 역량으로 여겨질 수 있는데요. \n단순반복 업무는 RPA 로봇에 맡긴다면, 보다 생산적인 업무에 몰입할 수 있습니다. 글로벌 RPA 시장 점유율 1위(가트너, 2018) UiPath로 RPA 활용 방법을 알아봅니다.", "goal": "RPA로 대체할 수 있는 업무를 파악할 수 있다.\nUipath 툴을 사용하여 내가 원하는 RPA 프로세스를 만들 수 있다.", "target": "RPA를 처음 접하는 구성원, 코딩 없이 RPA를 활용하고 싶은 구성원", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] n8n으로 쉽게 완성하는 나만의 AI 워크플로우", "duration": "2:10:58", "contents": "6", "instructor": "윤현지", "summary": "반복 업무는 최소화하고, 성과는 극대화하자!\n글로벌 기업들이 선택한 AI 에이전트 기반 자동화 툴, n8n으로 코딩 없이 Agentic Workflow를 시작해보자!", "goal": "1. AI 에이전트와 자동화의 기본 개념부터 실무 워크플로우 구성까지 단계별로 습득할 수 있다.\n2. 단순 업무 자동화가 아닌 AI를 통해 새로운 단계로 진화한 업무 자동화를 빠르게 접목하여 실무에 활용할 수 있다. \n3. 실무에서 자주 쓰는 케이스의 워크플로우를 실습을 통해 구성할 수 있다.", "target": "1. 반복 업무를 자동화하여 업무 생산성과 효율성을 높이고 싶은 직장인\n2. 최신 AI 활용 역량을 실무에 접목하고 싶은 모든 임직원", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "평범한 직장인도 5분만에 만드는 AI 콘텐츠", "duration": "2:12:55", "contents": "8", "instructor": "김경찬", "summary": "생성형 AI 시대 직장인이 갖추어야 할 콘텐츠 생성 실무 역량 중심 구성 AI 시대, 창의적 콘텐츠 제작은 직장인에게 경쟁력이 되고 있습니다. 본 과정은 AI를 활용한 업무 효율성과 경쟁력을 동시에 높이는 실질적이고 실무적인 강의를 제공합니다. 10년차 직장인이자 사내 AI 활용 강의를 하고 있는 강사를 통해 이론이 아닌 일반 직장인도 실제 활용가능한 기능 위주로 학습을 진행합니다. ", "goal": "1. 미드저니, 런웨이 젠쓰리 등 생성형 AI를 통해 누구든 쉽게 원하는 이미지, 영상을 만들 수 있습니다.  \n2. 현 직장인 디자이너가 직접 알려주는 기능 세팅, 프롬프트, 유의사항, 활용 팁을 통해 교육영상 한편이 끝날 때마다 해당 기능을 바로 활용할 수 있습니다. ", "target": "- 기술을 활용하여 실무에 필요한 콘텐츠를 직접 제작하고자 하는 직장인\n- 미드저니와 같은 생성형 AI 도구를 활용해 브랜드 이미지, 광고 콘텐츠, 영상 등을 효율적으로 제작하려는 디자이너나 마케터\n- 조직 내 AI 도입 가능성을 탐색하고, 팀의 생산성과 창의성을 높이기 위해 AI 기반 콘텐츠 제작 방법을 배우고자 하는 관리자", "level": "심화"}, {"cat1": "자기계발", "cat2": "자기혁신", "title": "디지털 분신술: AI와 함께 만드는 퍼스널 에이전트", "duration": "2:15:00", "contents": "10", "instructor": "손동진", "summary": "하나의 정체성으로는 부족한 시대, 디지털 분신술을 펼쳐라! 나와 함께 일하는 퍼스널 에이전트로 나의 역할과 능률을 확장해 보자", "goal": "1. 자신의 경험을 직무 전문성으로 구조화해 브랜드화하고, 콘텐츠 자산 전략으로 확장할 수 있다.\n2. AI 에이전트를 구축하고 업무 현장에 활용할 수 있다.\n3. AI 에이전트에 분야와 역할을 부여하여 실전에서 업무 생산성을 극대화하고 수 있다.", "target": "1. AI를 ‘도구’가 아닌, ‘업무 파트너‘로 쓰며 경쟁력을 키우고 싶은 모든 직장인\n2. 개인 업무 역량을 시스템화하고 싶은 1인 기업가와 기획 담당자\n3. SNS를 운영하며 자신의 경험을 장기 수익으로 창출하고 싶은 인플루언서와 크리에이터 ", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 새로운 비즈니스 기회를 선점하는 AI 기술 트렌드", "duration": "2:15:57", "contents": "10", "instructor": "이소영, 이예림", "summary": "AI 기술 트렌드에서 엿볼 수 있는 비즈니스 기회 창출 인사이트", "goal": "- 현장에서 가장 많은 실무적 변화를 가져오고 있는 핵심 AI 기술을 설명할 수 있다.\n- AI 도입 전후의 비즈니스 변화 요소를 비교해볼 수 있다.\n- 자신이 속한 조직에 접목 가능한 AI 기술을 선정하고 적용 시나리오를 작성할 수 있다.", "target": "- 전략적 시야가 필요한 경영/기획 실무자\n- AI와 결합되어 발생하는 비즈니스 기회를 선점하고자 하는 경영자\n- 빠르게 바뀌는 AI 트렌드와 소비자 트렌드에 대한 이해가 필요한 모든 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "AI 리더십: 창의력과 데이터가 만나는 리더십의 미래", "duration": "2:20:08", "contents": "10", "instructor": "오상진", "summary": "본 과정은 ‘데이터와 AI 중심의 환경’을 조성하고 구성원의 협업을 강화하며, 창의적인 조직 문화를 구축하는 방법을 제시합니다.  \n\n☞ 이 과정이 특별한 이유는..?\n ① AI 데이터 자본주의 시대에 어떻게 적응하고 리더십을 발휘할 수 있는지 인사이트를 얻어갈 수 있어요!\n ② 창의성, 증거기반 시스템 사고, 센스메이킹 등 키워드로 알아보는 AI 시대 리더십을 키울 수 있습니다. \n ③ 프로그램 개발자 출신의 경영학자이자, 창의적 조직 HR 전문가인 [AI 리더십] 저자가 쉽게 풀어주는 강의입니다.", "goal": "AI 데이터 자본주의 시대, 창의력과 데이터를 활용한 올바른 대응 방법을 학습하고,  현업에서 AI 중심의 조직문화와 데이터 리더십을 구축할 수 있다.", "target": "AI 데이터 시대를 이해하고 창의적인 조직 문화를 구축하고 싶은 모든 구성원", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "Cursor AI (커서) 입문에서 실전 웹사이트 만들기까지 Part.1 기본 사용법", "duration": "2:23:40", "contents": "5", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 툴에 대한 기초 사용법과 이를 사용한 실전 웹사이트 만들기에 대해서 배우는 동영상 과정입니다.", "goal": "- 최신 AI 인공지능 툴을 사용하여 모던한 웹사이트 구축 과정을 학습합니다.", "target": "- 커서 AI 인공지능 툴을 사용하여 실전 웹사이트를 만드는 과정을 배우고자 하는 사람", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "업무수행력", "title": "말해봐, ChatGPT가 다 해줄게. 데이터 분석", "duration": "2:24:27", "contents": "7", "instructor": "고일화", "summary": "이 과정은 ChatGPT를 활용하여 수치형·텍스트형 데이터를 분석하고 이를 실무 보고서로 전환하는 실습 중심 교육이며 기본적인 데이터 구조화부터, 패턴 인사이트 도출, KPI 분석, 고객 피드백 자동 분류, 반복 보고서 자동화 템플릿 구축까지 포괄적으로 다루며, 데이터 해석과 문장 전환 능력을 함께 기를 수 있다. 데이터 시각화 힌트 제공과 함께, 팀/개인 맞춤형 템플릿 설계까지 병행하여 학습 효과를 극대화한다.", "goal": "수치 및 텍스트 데이터를 GPT에 맞는 구조로 정리하고 분석할 수 있다.\n데이터 기반 문장을 자동으로 생성하는 프롬프트를 설계할 수 있다.\n반복적인 보고서 업무를 자동화할 수 있는 템플릿을 구축할 수 있다.", "target": "데이터 해석과 보고서 작성을 동시에 효율화하고 싶은 일반 사무직 종사자\n고객 피드백, KPI, 설문 등 다양한 데이터를 다루는 기획/마케팅/영업 담당자\n반복적인 리포트 작성 업무를 자동화하고 싶은 관리자 및 팀 리더", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "프리젠테이션", "title": "기획, 디자인, 발표까지 다 되는 AI 활용 프레젠테이션", "duration": "2:26:06", "contents": "8", "instructor": "홍순성", "summary": "AI를 잘 쓰면 프레젠테이션 고수가 될 수 있다! 직장과 비즈니스에서 프레젠테이션 역량은 필수입니다. 하지만 멋진 기획, 세련된 디자인, 효과적인 발표까지 완성하려면 많은 시간과 노력이 필요하죠. 이 과정을 통해 프레젠테이션 준비는 더 이상 부담이 아니라 즐거운 경험으로 바뀔 것입니다.", "goal": "- 프레젠테이션 준비 단계별로 적절한 AI 도구를 선택하여 쓸 수 있다.\n- 적절한 프롬프트와 작업 순서를 적용하여 더 좋은 프레젠테이션 결과물을 효율적으로 만들어낼 수 있다.", "target": "- 기획서와 보고서를 효율적으로 작성해야 하는 직장인\n- 프레젠테이션과 발표 역량을 중시하는 비즈니스 실무자\n- 업무 혁신과 디지털 생산성을 추구하는 일반 사무직 및 관리자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "코파일럿 실무 활용 강의! MS오피스에서 인공지능 활용하기", "duration": "2:26:55", "contents": "11", "instructor": "박기삼/임재훈", "summary": "MS 오피스에서 인공지능 코파일럿을 활용해 업무 효율성과 생산성을 극대화하는 실무 활용 강의!", "goal": "- 코파일럿의 주요 기능과 개념을 이해하고 이를 실무에 적용할 수 있다.\n- MS 워드, 엑셀, 파워포인트에서 코파일럿을 사용하여 문서 작성, 데이터 분석, 프레젠테이션 제작 등의 업무 생산성을 극대화할 수 있다. \n- 코파일럿을 통해 이메일 관리, 보고서 작성 등 반복 업무를 효율적으로 처리할 수 있다.\n- 코파일럿을 이용하여 업무 시간을 절감하고 생산성을 향상할 수 있는 구체적인 방법을 터득한다.", "target": "- MS 코파일럿을 활용해 업무 생산성을 높이고 싶은 직장인\n- 워드, 엑셀, 파워포인트에서 인공지능 기능을 통해 일의 효율성을 극대화하고 싶은 모든 직장인\n- 데이터 처리, 문서 작성, 프레젠테이션 제작 등 다양한 사무 작업에서 인공지능을 적극적으로 도입하고자 하는 관리자 및 실무자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "리더를 위한 생성형 AI 비즈니스 전략", "duration": "2:29:40", "contents": "6", "instructor": "김진", "summary": "미래를 이끄는 리더의 필수 선택, 생성형 AI 비즈니스 전략 교육\n\nAI의 잠재력을 전략적으로 활용하여, 조직을 다음 단계로 도약시키는 방법을 모색해보자!\n\n본 과정을 통해 리더들이 비즈니스 현장에서 필수 역량이 된 생성형 인공지능을 업무와 사업에 제대로 활용할 수 있을 것이다.", "goal": "- 생성형 인공지능 도구를 활용한 다양한 방법을 습득할 수 있다.\n- AI와의 상호작용을 최적화하는 프롬프트 엔지니어링 기법을 배워, 생산성을 극대화할 수 있다.\n- AI를 활용한 비즈니스 전략을 이해하고, 이를 통해 혁신적인 비즈니스 환경을 구축할 수 있다.", "target": "- AI 기술을 활용해 생산성을 높이고자 하는 모든 직장인 및 경영인\n- 최신 AI 기술을 업무에 적용하고 싶은 IT 전문가\n- 프롬프트 엔지니어링 기법을 배우고 싶은 데이터 분석가\n- AI 비즈니스 전략을 이해하고 적용하고 싶은 경영자와 기획자", "level": "심화"}, {"cat1": "IT", "cat2": "IT 기획", "title": "올인원 데이터분석 실무 : 데이터를 다루는 핵심 테크닉", "duration": "2:29:42", "contents": "4", "instructor": "김계철", "summary": "데이터 분석의 본질적인 문제를 해결하기 위해 반드시 알아야 하는 10개의 핵심 테크닉을 학습하고, 이를 바탕으로 데이터를 효율적으로 가공하고, 분석 및 모델링을 통해 실행 가능한 인사이트를 도출할 수 있는 실무형 역량을 배양하는 데 초점을 둡니다.", "goal": "- 데이터 가공, 군집분석, 텍스트 분석 등 다양한 데이터 처리 및 분석 기법을 학습하여, 실무에서 데이터를 활용해 문제를 정의하고 해결할 수 있는 실질적인 능력을 갖춘다.\n- 머신러닝 기술을 이해하고 이를 활용한 모델을 구축함으로써, 데이터를 기반으로 예측 및 의사결정 지원을 위한 자동화된 솔루션을 설계할 수 있는 역량을 확보한다.", "target": "- 공공기관 근무자\n- 데이터를 기반으로 의사결정하고 행정서비스을 제공하고자 하는 자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] AI 혁명을 이끈 천재들의 비즈니스 인사이트", "duration": "2:32:34", "contents": "12", "instructor": "이승민", "summary": "우리는 왜 기술이 아닌 '사람'을 통해 AI를 배워야 할까?\nAI 혁명을 이끈 천재들에게 배우는 통찰, 기술보다 빛나는 사람의 이야기", "goal": "1. AI 혁신을 이끈 핵심 인물들의 도전과 업적을 파악하고, 급변하는 기술 환경 속에서 개인과 기업이 갖춰야 할 미래 경쟁력이 무엇인지 파악할 수 있다.\n2. AI 기술이 변화시키는 산업 구조와 미래 사회의 거시적 방향성에 대한 인사이트를 얻을 수 있다.\n3. AI 혁명이라는 거대한 흐름 속에서 인간 고유의 역할과 창의적 기회를 발견할 수 있다.", "target": "1. AI의 발전과 이를 통한 미래 인사이트를 파악하고 싶은 직장인\n2. AI 변화의 흐름을 이해하고 트렌드를 알고 싶은 직장인\n3. AI 시대의 의사결정과 문제해결 역량이 요구되는 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "AI를 활용한 실무 영상 만들기 (ChatGPT x RunwayML x Photoshop x 영상편집)", "duration": "2:35:36", "contents": "8", "instructor": "박서연", "summary": "· 본 과정을 통해 학습자는 AI를 이용한 기획, 이미지 제작, 동영상 제작을 할 수 있게 됩니다. · 본 과정은 AI영상 제작을 하기 위한 입문자들에게 영상기획부터 편집까지 진행하여 하나의 완성 된 영상을 제작할 수 있도록 구성하였습니다.", "goal": "· AI 기반 이미지·영상 생성 도구를 활용하여 영상 기획부터 제작까지의 전체 흐름을 이해하고 적용할 수 있다. · AI를 활용한 이미지 제작, 영상 소스 생성, 편집 과정을 통해 실무형 영상 콘텐츠를 완성할 수 있다. · 기본적인 영상 편집 기초를 익혀 AI 생성 결과물을 효과적으로 연출할 수 있다. · 완성도 있는 짧은 영상 콘텐츠를 제작하여 실무 활용 또는 포트폴리오로 활용할 수 있다.", "target": "AI를 활용한 영상 제작에 관심 있는 입문자 및 초보자 영상 편집 또는 콘텐츠 제작을 처음 접하는 일반인 유튜브, SNS, 쇼츠 등 영상 콘텐츠를 직접 제작하고자 하는 창작자 디자인·영상·미디어 분야에 관심 있는 고등학생, 대학생, 일반 성인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "업무시간을 절반으로, ChatGPT로 시작하는 데이터 리터러시(2)", "duration": "2:36:09", "contents": "10", "instructor": "구자룡", "summary": "생성형 AI 도구를 활용한 노코드 데이터 분석을 주제로 합니다. ChatGPT, Gemini, Claude, Perplexity, Julius 등의 AI 도구를 사용하여 데이터 수집, 분석, 시각화, 보고서 작성 등 데이터 분석의 모든 단계를 수행합니다. \n", "goal": "- 다양한 데이터 분석 기법을 습득하고 실습을 통해 실제 비즈니스 상황에서의 적용 능력을 향상시킵니다.\n- AI를 활용한 데이터 분석 결과를 해석하고 이를 기반으로 전략적 의사결정을 내릴 수 있는 능력을 기릅니다.\n- 코드 작성 없이도 데이터 수집, 클리닝, 분석, 시각화까지 모든 데이터 분석 과정을 AI 도구로 수행하는 기술을 익힙니다.\n- 시장 조사, 설문지 작성, 데이터 수집, 가설 검정, 상관관계 및 인과관계 분석, 텍스트 데이터 분석 등 다양한 데이터 분석 도구와 기법을 효과적으로 활용할 수 있는 능력을 기릅니다.", "target": "- 마케팅 전략을 세우고 시장 조사가 필요한 학습자\n- 기존에 복잡한 데이터 분석 도구없이 보다 빠르고 간편하게 데이터를 분석하고 싶은 학습자\n- 빠르고 효율적으로 데이터를 분석하여 의사결정을 하고 싶은 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 치트키] 인공지능 × 인간지능 새 판짜기", "duration": "2:36:11", "contents": "8", "instructor": "김미경", "summary": "인간 사고 증폭을 위한 인간-AI 협업의 새 프레임\n\n인간의 능력을 최대한 증폭시키기 위해 AI는 어떻게 활용해야 하는가? 창의성의 새로운 판 위에서 인간–AI 협업은 어떤 기준으로 실행되어야 하는가? 그리고 직무와 워크플로우는 어떻게 설계해야 하는가?\n이 과정은 이러한 질문에 답할 수 있는 새로운 틀과 실행 전략을 제시한다.", "goal": "창의성에 대한 확장된 개념과 새로운 평가 관점을 이해한다.\n인간–AI 협업 기반의 창의성 증폭 메커니즘과 협업 모델을 이해한다.\n생성형 AI의 기술적 특성과 한계를 고려한 활용·관리 기준을 수립한다. \nAI–인간 협업 관점에서 창의적 직무 변화와 실행 방향을 도출한다.", "target": "- AI를 활용하여 창의적 생산성을 높이고자 하는 모든 직장인\n- AI와 인간 협업을 통한 업무 체계와 조직 구조를 마련하고자 하는 모든 비즈니스 리더 및 실무자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 한 번에 끝내는 제미나이 올인원: 워크스페이스, 나노바나나, Veo&Flow, Canvas", "duration": "2:37:43", "contents": "5", "instructor": "서지연", "summary": "AI 툴 이동 없이 제미나이 하나로, 기획부터 고퀄리티 비주얼 콘텐츠 완성까지 원스톱으로 끝내기!\nAI 툴 이동 없이 제미나이에서 한 번에! 이미지·영상·문서 제작 통합 솔루션\n- AI 툴 옮겨 다니느라 낭비되는 시간은 이제 그만, 단 하나의 플랫폼 구글 제미나이에서 끝내는 멀티모달 AI 활용법 제시\n- 기획부터 시각화·영상 완성까지 제미나이 하나로 처리하며 콘텐츠 제작 속도와 결과물 완성도 극대화", "goal": "1. 모바일 앱의 실전 활용 전략과 PC 웹 맞춤 설정을 통해 언제 어디서든 제미나이를 자유롭게 호출하고 활용할 수 있다.\n2. 텍스트 프롬프트를 넘어 나노바나나와 Veo3 등의 도구를 사용하여 수준 높은 이미지와 영상을 제작할 수 있다.\n3. 구글 워크스페이스 연동 및 Canvas 기능을 마스터하여 데이터 시각화와 자료 편집 업무의 효율을 향상시킬 수 있다.", "target": "1. 기획부터 이미지, 영상 제작까지 AI 툴 하나로 효율적으로 작업 하고 싶은 직장인\n2. 디자인 툴 숙련 없이 감각적인 이미지, 영상을 제작하고 싶은 직장인\n3. 기획서나 보고서 작성할 때마다 시각화 자료가 부족해 고민인 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Chat GPT, 내 동료가 되어라!", "duration": "2:37:43", "contents": "10", "instructor": "이시한", "summary": "Chat GPT,  우리는 어떻게 기회를 만들어갈 것인가?", "goal": "- 이론적 정의부터 Chat GPT가 이끈 각계각층의 변화를 살펴보고, 미래 인재 경쟁력(아이디어를 갖고, AI를 잘 활용하는 인간)에 대해 이해할 수 있습니다.\n- 검색과 가상의 마케팅 사례 등을 바탕으로 Chat GPT의 활용 방안을 확인할 수 있습니다.", "target": "-  전 구성원", "level": "Seed"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[DS Class] 딥러닝 실무 프로젝트", "duration": "2:37:59", "contents": "4", "instructor": "김진숙", "summary": "본 강의를 통해 딥러닝의 중요 핵심 모델 중 이미지 인식 AI 모델인 CNN을 활용한 이미지 분류 프로젝트를 제작해보고, 이를 바탕으로 다양한 이미지 파일들을 딥러닝 CNN 알고리즘을 활용하면 쉽게 구분할 수 있습니다.", "goal": "- 딥러닝에 활용할 데이터 확보 및 전처리, 데이터 셋 나누기 과정을 알 수있다.\n- 모델 학습 및 평가와 모델 개선 방법을 알 수 있다.\n- Flask 프레임워크를 이용한 CNN모델 웹 서빙에 대해 알 수 있다.", "target": "- 딥러닝을 활용할 줄 알지만 실무에 적용해본 적이 없어 명확한 결과물을 만들어보고 싶은 분\n- 딥러닝 뿐 아니라 데이터 핸들링 과정을 포함해 인공지능 분석의 모든 과정을 실제로 활용해보고 싶으신 분", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI 시대, 문제 해결의 새로운 패러다임:HIPS", "duration": "2:38:45", "contents": "10", "instructor": "변창우", "summary": "AI 시대, 지금 직장인이 직면한 가장 큰 문제는 AI가 우리의 일과 직장을 어떻게 바꾸어갈 것인가 하는 문제입니다. \n‘AI가 우리의 자리를 대체할 것인가?’, ‘AI를 활용하여 성과를 높이려면 어떻게 해야 하는가?’라는 질문에 대한 답을 찾아야 할 때입니다.", "goal": "- 새로운 아이디어를 도출하고, 학습 내용을 바로 업무에 적용할 수 있는 실전 가이드로 현업의 문제 상황을 해결할 수 있습니다.\n- 다양한 실무 예시를 통해 HIPS 프로세스를 실전에서 적용하는 방법을 연습하며, 피드백을 통해 역량을 향상시킬 수 있습니다.", "target": "- 실무에 바로 적용 가능한 능력을 강화하고 싶은 모든 직장인\n- 문제를 발견하고 정의하며 해결하는 능력을 향상 시키고 싶은 직장인", "level": "Seed"}, {"cat1": "리더십", "cat2": "변화관리", "title": "AI 시대의 조직 성장을 이끄는 변화관리 전략", "duration": "2:38:56", "contents": "10", "instructor": "박종규", "summary": "AI와 함께 일하는 시대, 우리는 변화에 어떻게 반응해야 할까? AI 시대 변화관리의 새로운 기준과 전략", "goal": "1. AI 도입이 변화관리와 조직문화에 미치는 영향과 변화 양상을 설명할 수 있다.\n2. AI 시대에 효과적인 변화관리 전략과 실행 프로세스를 설명할 수 있다.\n3. 조직의 혁신과 성과를 높이기 위한 변화관리 전략을 실제 팀에 적용할 수 있다.", "target": "1. AI 시대에 맞는 변화관리 역량을 통해 성과와 팀 몰입을 높이고 싶은 팀 리더와 관리자\n2. AI 도입 이후 기존 조직문화와 변화관리에 한계를 느끼고 재정비를 필요로 하는 리더\n3. AI 시대, 변화에 대한 불안감과 고민을 느끼는 모든 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "초보자를 위한 파이썬 프로그램 기초개념 마스터", "duration": "2:40:15", "contents": "13", "instructor": "정훈희", "summary": "파이썬 프로그램 초보자를 위한 특별강좌 기초개념부터 배우기 과정을 수강합니다.", "goal": "- 파이썬 언어의 특징에 대해 학습한다.\n- 파이썬의 기본 문법에 대해 학습한다.", "target": "- 프로그래밍 입문자", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 미드저니로 생성하고 캡컷으로 완성하는 AI 영상 제작 클래스", "duration": "2:42:10", "contents": "6", "instructor": "양솔지", "summary": "복잡한 촬영도, 비싼 비용도 필요 없는 AI 영상 제작, 미드저니로 생성하고 캡컷으로 편집하여 쉽고 빠르게 나만의 영상 완성하기!", "goal": "- 미드저니를 활용하여 목적에 맞는 AI 이미지와 영상을 생성할 수 있다.\n- 캡컷의 편집 기능을 활용하여 원하는 형태의 영상을 제작할 수 있다.\n- 색감, 톤, 무드를 일관되게 유지하는 스타일 코드로 나만의, 우리 브랜드의 영상 스타일을 전략적으로 구축할 수 있다.", "target": "- 짧은 시간 안에 실무에 바로 적용할 수 있는 AI 영상 제작 방법을 알고자 하는 직장인\n- 이미지, 영상 제작의 전 과정을 AI로 효율화하고 싶은 직장인\n- 브랜드 무드를 유지하면서도 일관된 영상을 구축하고 싶은 영상 기획자 및 개발자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "직무별 AI 대응 전략 - 내 일자리 진단부터 스킬업까지", "duration": "2:44:30", "contents": "8", "instructor": "이시한", "summary": "내 일의 미래를 진단하고, AI와 함께 성장하는 법을 배운다.\n기술은 빠르게 진화하고, 산업 구조와 직무는 그보다 더 빠르게 바뀝니다.\n지금 필요한 것은 내 일의 미래를 읽는 힘. AI 트렌드를 이해하고, 변화를 주도하는 사람만이 생존합니다.\n이 과정은 산업 재편과 기술 전환 흐름 속에서 지금, 나의 일에 어떤 변화가 오는지, 그리고 어떻게 대비할 수 있는지를 직무 관점에서 구체적으로 알려드립니다.", "goal": "AI 기반 산업 재편 흐름과 기술 트렌드를 이해하고 직무별 변화 양상과 대응 전략을 파악할 수 있다.", "target": "변화에 대응해야 하는 전 직군 실무자 ", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[슬기로운 통계생활] 엑셀로 배우는 기초통계 part1", "duration": "2:46:53", "contents": "8", "instructor": "이삭", "summary": "엑셀을 사용한 기초 통계 과정! \n통계의 기초지식을 학습하고, 데이터가 주어졌을 때 통계적으로 시각화하는 방법을 학습합니다.\n또한 데이터의 특성을 나타내는 통계 지표들을 학습하면서 엑셀의 기능을 자연스럽게 익힐 수 있는 강의입니다.", "goal": "- 확률변수를 통해 데이터의 발생 원리에 대해 이해할 수 있다.\n- 다양한 엑셀 기능을 활용하여 데이터의 특성을 나타내는 방법을 사용할 수 있다.", "target": "- 통계를 처음 배우는 분들\n- 데이터 분석을 처음 공부하는 분들\n- 엑셀을 활용하여 통계를 처음 사용하는 분들", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "AI-POT (AI 프롬프트활용능력) 2급 Part.1 기초", "duration": "2:47:08", "contents": "5", "instructor": "강태안", "summary": "· 본 강좌를 통해 AI 플랫폼에 대한 이해와 개념을 학습할 수 있다. \n· 본 강좌를 통해 AI-POT 2급 자격증을 취득할 수 있다.", "goal": "· AI 프롬프트 활용능력에 대한 학습 · 대화형 인공지능인 chatGPT에 대한 이해, 사용 방법에 대한 학습", "target": "· 남녀노소 누구나 학습 가능", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] AI 에이전트 입문 치트키, Claude MCP로 끝내는 업무 자동화", "duration": "2:47:32", "contents": "5", "instructor": "한정호", "summary": "글로벌 교역의 근간을 이루는 해운&조선 산업, 활발한 투자가 예상되는 가운데 알 건 알아야 시장을 따라간다!\n전 세계 교역량의 80% 이상은 해상 운송에 의해 이루어지고 있다. 이를 가능하게 하는 산업이 바로 해운과 조선이다.\n본 과정은\n해운&조선의 기본 개념부터 산업의 성장과 전망, 그리고 투자에 영향을 미치는 여러 요소들까지 15년차 해운/조선 연구원, 현직 글로벌 1위 조선소 기획자가 잘 짜놓은 효율적 커리큘럼을 따라 안내한다.", "goal": "1. MCP로 가능한 다양한 자동화 기술을 습득할 수 있다.\n2. AI 에이전트를 실제 업무에서 활용하는 법을 이해하여 효율을 향상시킬 수 있다.\n3. SNS, 크롤링, 디자인 등 다양한 툴로  MCP 연동을 수행할 수 있다.", "target": "1. 팀원들의 생산성을 향상시켜 팀의 성과를 끌어올리고 싶은 팀장/관리자\n2. AI를 활용하여 반복업무를 줄이고 업무생산성을 높이고 싶은 실무자 \n3. AI 활용 역량을 갖추어야 하는 모든 직장인", "level": "고급"}, {"cat1": "리더십", "cat2": "팀웍", "title": "AI 시대의 효율성을 높이는 팀워크 전략", "duration": "2:48:04", "contents": "10", "instructor": "박희만", "summary": "- AI 도입으로 인해 조직의 핵심 이슈로 대두되고 있는 ‘팀워크의 재설계’를 다루는 최초의 전문 과정 \n- 팀워크의 최신 이론과 AI 시대에 적용 가능한 팀워크의 새로운 기준 및 실행 전략을 제시", "goal": "1. AI의 도입이 팀워크에 미치는 영향과 변화 양상을 설명할 수 있다.\n2. AI를 팀의 일부로 받아들일 때 필요한 팀 설계 전략을 설명할 수 있다.\n3. 성과를 높이기 위한 AI 기반 협업 전략을 실제 팀에 적용할 수 있다.", "target": "1. AI 시대에 맞는 협업 문화를 만들고 싶은 팀장\n2. AI 도입 이후 기존 업무 방식과 팀워크에 한계를 느끼고 재정비를 필요로 하는 팀 구성원\n3. 새로운 시대에 맞는 소통과 공동 작업 방식을 통해 업무 생산성을 높이고 싶은 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "업무시간을 절반으로, ChatGPT로 시작하는 데이터 리터러시(1)", "duration": "2:48:25", "contents": "10", "instructor": "구자룡", "summary": "생성형 AI 도구를 활용한 노코드 데이터 분석을 주제로 합니다. ChatGPT, Gemini, Claude, Perplexity, Julius 등의 AI 도구를 사용하여 데이터 수집, 분석, 시각화, 보고서 작성 등 데이터 분석의 모든 단계를 수행합니다. \n", "goal": "- 다양한 데이터 분석 기법을 습득하고 실습을 통해 실제 비즈니스 상황에서의 적용 능력을 향상시킵니다.\n- AI를 활용한 데이터 분석 결과를 해석하고 이를 기반으로 전략적 의사결정을 내릴 수 있는 능력을 기릅니다.\n- 코드 작성 없이도 데이터 수집, 클리닝, 분석, 시각화까지 모든 데이터 분석 과정을 AI 도구로 수행하는 기술을 익힙니다.\n- 시장 조사, 설문지 작성, 데이터 수집, 가설 검정, 상관관계 및 인과관계 분석, 텍스트 데이터 분석 등 다양한 데이터 분석 도구와 기법을 효과적으로 활용할 수 있는 능력을 기릅니다.", "target": "- 마케팅 전략을 세우고 시장 조사가 필요한 학습자\n- 기존에 복잡한 데이터 분석 도구없이 보다 빠르고 간편하게 데이터를 분석하고 싶은 학습자\n- 빠르고 효율적으로 데이터를 분석하여 의사결정을 하고 싶은 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Cursor AI (커서) 입문에서 실전 웹사이트 만들기까지 Part.4 실습 (웹사이트 만들기 3)", "duration": "2:49:17", "contents": "7", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 툴에 대한 기초 사용법과 이를 사용한 실전 웹사이트 만들기에 대해서 배우는 동영상 과정입니다.", "goal": "- 최신 AI 인공지능 툴을 사용하여 모던한 웹사이트 구축 과정을 학습합니다.", "target": "- 커서 AI 인공지능 툴을 사용하여 실전 웹사이트를 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI 생성 이미지로 완성하는 일러스트 실무 (Illustrator AI)", "duration": "2:49:18", "contents": "6", "instructor": "김기민", "summary": "· 그림 실력이 없어도 누구나 쉽게 시작할 수 있도록, AI 일러스트 제작의 기본 개념부터 실무 활용까지 단계적으로 학습합니다. · 텍스트 입력만으로 이미지를 만들어내는 프롬프트 작성법을 익히고, 원하는 스타일과 분위기를 효과적으로 표현하는 방법을 이해합니다. · 다양한 AI 이미지 생성 도구를 활용하여 캐릭터, 배경, 콘텐츠용 일러스트 등을 직접 제작하며 창작 역량을 확장합니다. · 생성된 이미지를 수정·보완하는 방법까지 함께 익혀, 개인 창작물, SNS 콘텐츠, 굿즈 제작 등 실생활에 바로 활용 가능한 결과물을 완성합니다.", "goal": "· AI 이미지 생성 도구의 기본 원리와 기능을 이해하고, 스스로 원하는 이미지를 기획하고 생성할 수 있습니다. · 목적과 주제에 맞는 프롬프트를 작성하여 스타일, 분위기, 구도, 디테일을 효과적으로 제어할 수 있습니다. · 다양한 AI 도구를 활용해 캐릭터, 배경, 아이콘, 콘텐츠용 이미지 등 여러 유형의 일러스트를 제작할 수 있습니다. · 생성된 이미지를 수정·보완하고 개선하는 과정을 통해 결과물의 완성도를 높일 수 있습니다. · AI 일러스트 제작 과정을 전반적으로 이해하고, 개인 창작, SNS 콘텐츠, 간단한 디자인 작업 등에 능동적으로 활용할 수 있습니다.", "target": "· AI 기능이 탑재된 최신 Illustrator 2025를 체계적으로 배우고 싶은 초중급 학습자 · 아이콘, 그래픽 요소, 패턴, 포스터 등 실무에 활용 가능한 벡터 디자인을 직접 제작하고 싶은 예비 디자이너 · AI 기반 디자인 자동화와 효율적인 작업 방식으로 생산성을 높이고자 하는 크리에이터 및 마케터", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "처음 배우는 생성형AI 프로그램개발(LLM)", "duration": "2:53:33", "contents": "8", "instructor": "허정준", "summary": "LLM 애플리케이션이 사람들의 관심을 끌 수밖에 없는 이유는 무엇일까요? 현재까지 수많은 기술들이 등장했다 사라져 갔는데, 오늘날에도 여전히 사용되고 있는 주요 기술은 개발이나 사용 패러다임을 크게 발전시켰다는 특징이 있습니다. LLM 애플리케이션이 주력으로 자리 잡아 개발자 두뇌 속의 필수 공구상자에 들어갈지를 판단하기 위해, 우선 어떤 변화가 일어나고 있는지를 전문 강사님의 강의를 통해 알아봅시다!", "goal": "- LLM 아키텍처에 대해 기초를 다질 수 있다.\n- RAG라는 LLM의 대표적인 애플리케이션을 만드는 방법에 대해 파악할 수 있다.\n- 멀티 모달과 에이전트 심화 주제 다루는 기술까지 확인할 수 있다. ", "target": "- 기업체 전 임직원\n- LLM을 배우고 싶은 직장인\n- LLM을 활용해 AI 애플리케이션을 개발하려는 개발자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "움직이는 지능, 피지컬 AI 시대", "duration": "2:54:33", "contents": "8", "instructor": "박종성", "summary": "피지컬 AI는 더 이상 스크린 속에서만 작동하는 인공지능이 아니라, 로봇·자율주행차·드론처럼 ‘몸’을 얻어 현실을 감지하고 판단하며 직접 움직이는 AI로 빠르게 확장되고 있습니다. 제조 현장의 휴머노이드 로봇, 도로 위 완전 자율주행, 정밀 농업 드론 사례를 통해 피지컬 AI가 산업과 일상을 어떻게 바꾸고 있는지 살펴보고, 감지–인식–행동의 작동 원리와 디지털 트윈·강화학습 기반 학습 방식, 그리고 체화된 데이터가 만들어내는 새로운 경쟁 구도까지 이해해봅니다. 이를 통해 피지컬 AI 시대의 핵심 개념과 흐름을 한 번에 정리하고, 앞으로 우리가 준비해야 할 변화의 방향을 함께 탐색해보겠습니다.\n피지컬 AI의 개념부터 미래까지 연결하는 흐름 중심 구성\n스크린 속 AI를 넘어 현실로 확장된 피지컬 AI의 등장 배경부터 작동 원리, 산업 적용, 미래 변화까지를 하나의 흐름으로 정리하여, 기술의 맥락을 단계적으로 이해할 수 있도록 구성\n기술 설명을 넘어 산업·노동·국가 경쟁까지 확장한 관점 제시\n개별 기술에 국한되지 않고, 산업 현장과 인간의 노동 변화, 글로벌 기술 경쟁과 국가 전략까지 함께 다루어 피지컬 AI가 만들어내는 구조적 변화를 종합적으로 조망\n사례와 개념을 통해 피지컬 AI 시대의 핵심 질문을 제시하는 과정\n로봇·자율주행·제조 현장 사례를 통해 ‘왜 피지컬 AI가 중요한가’, ‘우리는 무엇을 준비해야 하는가’라는 질문을 자연스럽게 연결하며 이해  중심의 학습 경험 제공", "goal": "- 피지컬 AI의 핵심 개념과 작동 원리를 이해하고 파악할 수 있다.\n- 산업·기업·기술 구조를 통해 글로벌 트렌드를 설명할 수 있다.\n- 체화된 데이터(Embodied Data)의 중요성을 이해하고 활용 방향을 탐색할 수 있다.", "target": "- 제조업, IT, R&D, 기술기획 직무 종사자\n- AI·로봇·자동화 분야 기초 지식이 필요한 일반 직장인\n- 피지컬 AI의 기술·산업·정책 동향을 한눈에 파악하려는 실무자", "level": "Seed"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 코딩없이 데이터 분석! Orange3로 설득력 있는 문서 만들기", "duration": "2:56:57", "contents": "9", "instructor": "김진", "summary": "코딩을 몰라도 할 수 있는 데이터 분석 머신 러닝 도구 Orange3! 드래그 앤드 드롭으로 데이터 분석 쉽게 하기!\n\nOrange3는 코딩없이 드래그 앤드 드롭 기능으로 누구나 쉽게 데이터 분석을 할 수 있는 머신 러닝 도구이다. 보고서 작성을 위해 꼭 필요한 데이터 분석, 아직도 엑셀 밖에 모른다면 Orange3를 활용해보자.\n\n본 과정은 데이터 분석 및 인공지능 기반 분석에 대한 실질적인 업무 역량을 향상할 수 있도록 다양한 예제와 실습을 제공한다. Orange3를 활용한 데이터 분석 기법을 습득하고, 실제 업무에 적용하는 능력을 향상해 보자.", "goal": "- 노코딩 인공지능 데이터분석 도구인 Orange3 활용 방법을 설명할 수 있다.\n- 머신 러닝 데이터 분석의 기본 개념을 설명할 수 있다.\n- 데이터를 활용하여 인사이트를 얻는 데이터 분석 기법을 설명할 수 있다.", "target": "- 복잡한 코딩 없이 인공지능을 생산적인 도구로 사용하고 싶은 직장인\n- 인공지능 사용법을 익혀 업무 효율성을 향상하고 싶은 직장인\n- 데이터 분석 역량을 향상하고자 하는 직장인", "level": "고급"}, {"cat1": "리더십", "cat2": "변화관리", "title": "AI 시대의 생존 전략과 리빌딩 인사이트", "duration": "2:58:21", "contents": "12", "instructor": "이중학", "summary": "인공지능이 인간의 업무를 빠르게 대체하는 시대, 어떻게 살아남아야 할까?\nAI 분야에서 가장 핫한 동국대학교 이중학 교수가 AI 시대 생존 전략과 리빌딩 인사이트를 생생하게 전달한다.", "goal": "- AI 시대 일의 본질을 재정의하고, 변화에 대응하기 위한 생존형  성장 전략을 수립할 수 있다.\n- AI와의 협업 및 공동작업 환경을 효과적으로 설계할 수 있다.\n- AI 도입 이후 기술변화 속에서도 인간 고유의 강점과 윤리적 기준을  유지할 수 있다.", "target": "- AI와 협업하여 팀의 생산성을 높이고 싶은 팀 리더와 관리자\n- AI 도입 이후 조직 혁신과 인재 전략을 고민하는 모든 리더\n- AI 기반 업무 변화에 적응하고자 하는 모든 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI-POT (AI 프롬프트활용능력) 1급 Part.1", "duration": "2:58:30", "contents": "5", "instructor": "강태안", "summary": "· 본 강좌를 통해 AI 플랫폼에 대한 이해와 개념을 학습할 수 있다. \n· 본 강좌를 통해 AI-POT 1급 자격증을 취득할 수 있다.", "goal": "· AI 프롬프트 활용능력에 대한 학습 및 여러가지 실습에 대한 이론 · 대화형 인공지능인 chatGPT에 대한 이해, 사용 방법에 대한 학습", "target": "· 남녀노소 누구나 학습 가능", "level": "Seed"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "딥러닝 개발자에게 꼭 필요한 기초 수학", "duration": "20:08:09", "contents": "8", "instructor": "조준우", "summary": "세상에서 가장 꼼꼼한 딥러닝, 그 시작에 필요한 수학 지식부터 딥러닝의 기반을 단단하게 다져드립니다!", "goal": "- 딥러닝 활용의 기초가 되는 수학 지식을 이해할 수 있다.\n- 수학 지식을 기반으로 딥러닝 알고리즘의 원리를 파악하여 업무에 활용할 수 있다.", "target": "- 딥러닝에 관심이 있는 SW 개발자\n- 딥러닝 활용의 기초가 되는 수학 지식이 궁금한 모든 임직원", "level": "고급"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "[DS Class] 딥러닝을 위한 기초 수학", "duration": "3:00:20", "contents": "4", "instructor": "김진숙", "summary": "누구나 딥러닝에 쉽게 입문할 수 있도록 강의를 통해 딥러닝의 개념과 작동 원리를 알려드립니다.\n그야말로 혁명적인 생산성 향상을 가져오기 위해, 당신도 딥러닝에 입문해보세요!", "goal": "- 딥러닝의 기초 개념과 머신러닝과의 차이를 알 수 있다.\n- 딥러닝의 인공지능 학습 원리를 이해할 수 있다.\n- 회귀, 분류 등 딥러닝의 모델 구현을 위한 수학적 원리를 이해할 수 있다.", "target": "- 인공지능으로 혁신적인 생산성을 확보하고 싶은 실무자\n- IT업계로 창업/이직/입사 등 커리어를 쌓고 싶은 모든 사람\n- 이미 딥러닝을 활용하고 있지만, 작동 원리에 대해서는 모르는 실무자", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "Claude Code: 바이브 코딩으로 웹앱 기획부터 배포까지", "duration": "3:00:23", "contents": "7", "instructor": "송태영", "summary": "개발 지식, 경험 없어도 웹앱 완성! Claude Code로 기획부터 배포까지, 프롬프트 한 줄로 끝내는 차세대 개발 패러다임 ‘바이브 코딩’ 입문하기", "goal": "- 자연어 명령만으로 AI가 코딩을 수행하는 방식인 바이브 코딩에 대해 이해할 수 있다.\n- AI가 효율적으로 명령을 처리하여 올바른 결과를 출력하도록 프롬프팅 할 수 있다.\n- Claude Code를 통해 실제 프로그램을 개발하는 역량을 획득할 수 있다.", "target": "- AI 시대, 새로운 개발 방식을 익혀 경쟁력을 갖추고 싶은 직장인\n- 개발자 도움 없이 AI를 활용하여 프로그램을 완성하고 싶은 기획자 및 마케터", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "Chat GPT 질문법, 똑똑한 사람은 어떻게 생각하고 질문하는가?", "duration": "3:00:46", "contents": "8", "instructor": "이시한", "summary": "생성형 AI의 시대, 제대로 된 질문이 정답보다 중요합니다. ", "goal": "- 생성형 AI를 업무에 활용하기 위한 다양한 사고법과 질문하는 방법을 학습합니다.", "target": "-  전 임직원", "level": "Seed"}, {"cat1": "IT", "cat2": "IT 기획", "title": "모두를 위한 AI 데이터 시각화 수업", "duration": "3:02:10", "contents": "6", "instructor": "최재원", "summary": "데이터 시각화는 단순히 예쁘게 보이는 그래프를 만드는 작업일까요? 아닙니다! 데이터 시각화는 예술이자 과학입니다. 과학적으로 정확하면서 미적으로 흉하지 않아야 하며, 또한 미적으로 탁월하면서도 과학적으로 오류를 용납하지 않는 결과물을 만들어야 합니다. 이 과정은 통계적 본질에 기반해 데이터를 과학적으로 정확하게, 동시에 시각적으로도 명확하게 전달하는 방법을 다룹니다.", "goal": "- 데이터를 명확하게 전달하는 색상 및 기호화 원칙을 이해하고, 실무 문서나 보고서에서 정보 전달력을 높일 수 있다.\n- 주요 시각화 유형과 그 특성을 파악하여, 직무 목적에 맞는 적절한 그래프를 선택하고 구성할 수 있다.\n- 좋은 그래프와 잘못된 예시를 비교 분석함으로써, 실무에서 신뢰성과 설득력을 갖춘 시각화 자료를 제작할 수 있다.", "target": "- 기업체 전 임직원\n- AI에 관심있는 학습자\n- 빅데이터와 데이터베이스에 관심있는 개발자 및 종사자", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 트렌디한 검색 AI 퍼플렉시티(Perplexity)로 출처 기반 리서치 완성하기", "duration": "3:03:23", "contents": "6", "instructor": "오복실", "summary": "실시간 검색과 확실한 출처 기반 인사이트 도출에 강한 퍼플렉시티(Perplexity) AI로 완성하는 리서치 자동화!", "goal": "- 퍼플렉시티 정보 탐색부터 자동화 적용까지의 업무를 이해할 수 있다.\n- 텍스트 분석, 이미지 제작, 반복 업무 자동화를 아우르는 실무 중심 워크플로우를 구성할 수 있다.\n- 다양한 실무 상황에서 퍼플렉시티를 활용한 리서치를 활용할 수 있다.", "target": "- 검색 결과를 신뢰할 수 있는 요약본과 출처로 정리하고 싶은 리서처\n- 방대한 자료를 빠르게 분석해 인사이트를 도출해야 하는 기획자\n- AI를 활용해 콘텐츠 제작과 정보 큐레이션을 고도화하려는 크리에이터\n- ChatGPT 이후의 리서치 도구를 고민하는 AI 기반 정보 활용자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "생성형 AI 완전정복! 업무 효율화부터 보안윤리까지", "duration": "3:04:35", "contents": "6", "instructor": "김덕진", "summary": "AX 시대 생존을 위한 필수 전략을 알려 드립니다!", "goal": "1. 단순 AI에 대한 소개가 아닌 AGI, 인터페이스의 변화 등 AI의 미래와 해외 기업의 AI 적용 사례를 통한 인사이트를 제공할 수 있습니다.\n2. 직장인들이 AI를 업무에 효과적으로 활용할 수 있도록 실무 중심의 적용방법을 학습할 수 있습니다.\n3. AI 활용 과정에서 반드시 고려해야 할 윤리적 이슈도 함께 다뤄 균형 잡힌 관점을 제공할 수 있습니다.", "target": "- 생성형AI를 똑똑하게 활용하고 싶은 모든 직장인", "level": "심화"}, {"cat1": "IT", "cat2": "IT 기획", "title": "엑셀보다 쉬운 파이썬 2시간에 완성하기", "duration": "3:07:25", "contents": "4", "instructor": "김계철", "summary": "파이썬과 판다스 라이브러리의 주요 기능과 활용법을 익히고, 이를 통해 실제 데이터를 가공하고 분석하는 능력을 키울 수 있습니다. 데이터 정제, 변환 등 다양한 분석 기법을 익혀 데이터에서 유용한 정보를 추출하고, 이를 바탕으로 의사 결정을 지원할 수 있도록 합니다.", "goal": "- 파이썬을 활용한 데이터 분석을 위한 환경을 성공적으로 구축하고, 필요한 라이브러리 및 도구를 설치하고 설정하는 방법을 이해한다.\n- 주피터 노트북의 기능과 사용법을 익혀, 코드 실행 및 데이터 분석을 효율적으로 수행할 수 있는 능력을 배양한다.", "target": "- 공공기관 근무자\n- 데이터를 기반으로 의사결정하고 행정서비스을 제공하고자 하는 자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "일하는 방식, 생성형 AI로 갈아탔습니다", "duration": "3:07:52", "contents": "10", "instructor": "서판규", "summary": "이제는 피할 수 없는 생성형 AI 활용\n엑셀, 코딩, 앱 개발까지—AI와 함께라면 누구나 쉽게 시작할 수 있습니다. ChatGPT, 퍼플렉시티 등 생성형 AI 도구를 활용해 엑셀 자동화부터 파이썬 기초, 앱 만들기까지 실습 중심으로 익힙니다. 비개발자도 따라 할 수 있는 실전형 AI 업무 혁신 과정을 지금 만나보세요. ", "goal": "- 생성형 AI 도구를 활용해 엑셀 업무를 자동화하고 실무 효율을 높일 수 있다.\n- AI의 도움으로 파이썬 기초와 앱 개발을 쉽게 체험하며 디지털 역량을 강화할 수 있다.", "target": "전 구성원", "level": "심화"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "너도 나도 데이터사이언스", "duration": "3:08:08", "contents": "8", "instructor": "전익진", "summary": "‘나는 뼈문과생이라 데이터 분석같은 것 못해!’라고 하는 여러분들에게 너도 나도 데이터사이언스에 관심을 갖고 쉽게 접근할 수 있다는 이야기를 진솔하게 들어봅시다.", "goal": "데이터사이언스의 개념을 이해하고 데이터와 친숙해질 수 있다.", "target": "데이터사이언스에 대한 개념을 알고 데이터분석의 세계에 들어가보고자 하는 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "AI 에이전트로 시작하는 바이브 코딩 : 데이터 분석 도구 마스터", "duration": "3:11:36", "contents": "7", "instructor": "신성진", "summary": "본 과정은 AI 에이전트를 기반으로 엑셀, 구글 시트, 파이썬을 연계한 자동 데이터 분석 전 과정을 다루는 실무 중심 과정으로, 실제 업무 데이터를 활용한 종합 실습을 통해 현업 적용력을 강화하는 과정이다.", "goal": "AI 에이전트 기반 데이터 분석 흐름을 이해할 수 있다.\n다양한 도구를 연계하여 자동 분석과 시각화를 수행할 수 있다.\n실무 데이터를 기반으로 분석 결과 보고서를 완성할 수 있다.", "target": "데이터 분석이 필요한 기업 실무자\n엑셀이나 구글 시트를 활용하지만 분석에 어려움을 느끼는 직장인\nAI 기반 업무 자동화와 데이터 분석 역량을 강화하고자 하는 학습자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[Get it Trend] 인공지능, 제4차 산업혁명을 리드하라!", "duration": "3:16:31", "contents": "8", "instructor": "조성배", "summary": "SF영화 속 인공지능이 이제는 우리의 일상생활 속에 공존한다! 영화속에서만 존재했던 인공지능, 지금은 현실세계에서 이뤄지고 있다.", "goal": "- 인공지능의 등장배경 및 개념을 설명할 수 있다\n- 인공지능의 구현기술과 종류를 이해할 수 있다\n- 인공지능의 적용사례를 통해 미래 시장과 기술 트렌드를 이해할 수 있다", "target": "- 인공지능에 관심이 있는 모든 직장인\n- 인공지능 관련 산업분야의 현업 담당자\n- 기업체 전 임직원", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "금융 X AI : 실무 가이드", "duration": "3:16:34", "contents": "8", "instructor": "김태헌", "summary": "AI 기술이 금융 산업 전반에 가져온 변화를 핀테크, 투자, 신용 리스크, 사기 탐지 등 다양한 사례를 통해 살펴보고, 파이썬 라이브러리를 활용한 실습으로 금융 AI의 적용 방식과 전략적 인사이트를 이해하는 과정입니다. 본 과정은 금융 전반의 주요 영역에서 AI가 어떻게 활용되고 있는지를 사례 중심으로 이해하고, 실습을 통해 금융 AI의 구조와 활용 전략을 함께 익힐 수 있도록 설계되었습니다.", "goal": "- 금융과 AI의 본질·필연성을 이해하고 산업 구조를 큰 그림에서 설명할 수 있다.\n- 금융 AI의 핵심 응용 영역을 문제 중심으로 분석할 수 있다.\n- 금융 AI 개발의 전 과정을 4-Layer Framework로 설계할 수 있다.\n- 최신 생성형 AI(LLM, RAG, 파인튜닝, 에이전트)를 금융 서비스에 안전하게 통합할 수 있는 지식을 갖출 수 있다.", "target": "- 금융 실무자\n- 금융 문제에 적용해 보고 싶은 분석가·개발자\n- 금융 분야에서 AI 활용을 배우려는 학습자", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "빅데이터가 별건가, 알고 보면 쉬운 통계상식", "duration": "3:16:58", "contents": "12", "instructor": "김진호", "summary": "이번 과정을 통해, 누가 언제 어디서 무엇을 어떻게 왜 하는지에 대한 정보를 담고 있는 데이터에서 고객과 시장에 대한 통찰력(insight)을 추출할 수 있는 능력과 데이터로부터 추출한 통찰력을 활용할 수 있는 기본적인 통계상식에 대해 살펴봅니다", "goal": "통계학적 용어의 정의를 인식하고, 올바른 정보를 추출할 수 있는 데이터 분석 능력을 갖출 수 있다.", "target": "- 빅데이터가 궁금한 직장인\n- 통계 상식을 업무에 활용하고자 하는 직장인 ", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 퍼플렉시티 딥 리서치 마스터 - AI 랩스로 압도적 시장 분석과 대시보드 완성", "duration": "3:17:17", "contents": "6", "instructor": "정옥선", "summary": "퍼플렉시티라는 AI 도구의 단순한 사용법 학습을 넘어, \n데이터를 수집, 분석하고, 이를 바탕으로 더 나은 의사결정할 수 있도록 돕는 \n전략적 보고서 작성, 데이터 시각화, 그리고 업무 자동화 능력 등 \n비즈니스 인텔리전스 역량을 배양할 수 있다.\n단순 검색 도구를 넘어 아이디어를 실현하는 강력한 파트너, \n퍼플렉시티를 마스터할 수 있는 기회!\n- 답변의 문장마다 명확한 출처를 각주 형태로 제공해 정보의 투명성을 보장하여 팩트 체크가 필수적인 시장 조사나 업무용 보고서 작성에  활용 가능한 퍼플렉시티\n- '딥 리서치' 기능을 통해 서론, 본론, 결론, 표, 그래프가 포함된 종합 분석 리포트를 자동으로 생성 가능\n- 'Labs' 기능을 활용하여 프롬프트만으로 데이터를 분석하고,  전문가 수준의 인터랙티브 대시보드와 PPT 슬라이드까지 제작할 수 있는 업무 생산성 향상 도구", "goal": "- 퍼플렉시티의 기능인 딥 리서치와 Labs 기능을 활용할 수 있다.\n- 복잡한 리서치 업무를 높은 신뢰도로 작성하고 시각화까지 도출할 수 있다.\n- Comet 브라우저와 함께 AI 에이전트 자동화를 수행할 수 있다.\n- 퍼플렉시티 활용에 최적화된 전략적 프롬프트 설계 공식을 적용할 수 있다. ", "target": "- 경쟁사 분석, 신시장 진입 전략 등 보고서를 빠르게 완성하고 싶은 직장인\n- AI와 데이터를 기반으로 대시보드를 만들고 싶은 실무자\n- 신뢰성과 성과가 증명되는 퍼플렉시티를 마스터하고 싶은 직장인\n- AI 리서치의 속도와 퀄리티를 동시에 올리고 싶은 직장인", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "ChatGPT 더 잘 사용하기, 프롬프트 엔지니어링", "duration": "3:20:21", "contents": "15", "instructor": "서승완", "summary": "AI 활용을 위한 실전 필수 역량, 프롬프트 엔지니어링\n빠르게 변화하는 산업 환경에 따라 업무 프로세스 또한 빠르게 변화하고 있습니다. \n생성형 AI의 활용은 이러한 변화에 대응하는 핵심 도구로 부상하고 있으며, 프롬프트 엔지니어링은 AI를 활용하기 위한 필수 역량입니다.\n올바르고 정확한 프롬프트를 통해 업무 생산성을 강화하고 비즈니스의 경쟁력을 강화할 수 있는 핵심 역량을 학습해 보세요. ", "goal": "- 프롬프트 엔지니어링에 대한 기본 개념과 원칙을 이해하여 AI툴을 단순히 이용하는 사용자가 아닌, 프롬프트 엔지니어링을 통해 효과적인 AI툴 활용으로 업무 효율성을 높일 수 있습니다. \n- 강의에서 설명되는 총 12가지의 기법을 통해 효과적으로 AI툴과 상호 작용하여 학습자가 원하는 정확하고 높은 품질의 답변을 얻을 수 있습니다.", "target": "- 업무에서 AI를 효과적으로 사용하여 시간을 효율적으로 사용하길 원하는 학습자", "level": "심화"}, {"cat1": "Biz. Skill", "cat2": "기획력", "title": "100% 챗GPT 실전 가이드 : 일 잘하는 사람들의 AI 활용비법 step2", "duration": "3:21:02", "contents": "19", "instructor": "프롬프트 크리에이터", "summary": "ChatGPT 200% 활용법!\nChatGPT가 비즈니스 뿐만 아니라 라이프 스타일에서도 확실한 트렌드가 된 시대에, 보다 효과적으로 유용하게 사용할 수 있는 정보를 다루는 과정입니다. \n\nChat와 함께 일하기!\n이 과정은 인공지능과 대화하고 편안하게 활용할 수 있도록 도움을 주며, ChatGPT와 놀라울 정도로 친해질 수 있는 방법을 쉽게 설명하고 있습니다. \n\n실습 위주의 강의로 바로 활용 가능!\n처음부터 끝까지 실제 프롬프트 작성화면과 도출되는 결과를 볼 수 있기 때문에 바로 활용 가능합니다.", "goal": "① 업무에서 자기 계발까지 폭넓은 범위에서 ChatGPT를 활용할 수 있다.\n② ChatGPT 프롬프트를 여러 상황과 주제에 맞게 적절하게 적용할 수 있다. \n③ ChatGPT를 실제 업무에 바로 활용할 수 있다.", "target": "1. ChatGPT를 어떻게 활용해야 할지 모르는 모든 학습자 \n2. ChatGPT를 보다 폭넓은 범위에서 활용하고 싶은 학습자 \n3. ChatGPT의 프롬프트를 좀 더 고급하여 작성해 보고 싶은 학습자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[DS Class] 구글 데이터 스튜디오 데이터 시각화 입문", "duration": "3:21:06", "contents": "6", "instructor": "김진", "summary": "데이터 시각화 입문을 위한 기본 내용부터 엑셀 파일을 포함한 다양한 이기종 데이터(GA4 서비스 데이터, 구글 시트 데이터, 회사 내부 보유 데이터 등)를 포함한 자동화된 사용자 상호작용을 지원하는 대시보드 형태의 시각화 보고서를 무료 서비스인 구글 데이터 스튜디오 기반으로 작성해서 비즈니스 인사이트를 도출해내거나 도출한 인사이트를 공유하는 방법을 배워보세요!", "goal": "- 데이터 시각화를 이해하고, 탐색적 시각화를 지원하는 사용자 상호작용 시각화 대시보드를 제작할 수 있다.\n- 이기종 데이터 연동을 통한 의사결정 실무 시각화 대시보드를 제작할 수 있다.\n- 비즈니스 의사결정을 지원하는 통합 데이터 대시보드를 제작할 수 있다.", "target": "- 데이터 분석 및 비즈니스 인텔리전스 분야 초보자\n- 대화형 자동화 대시보드 시각화 프로젝트를 구축하는 방법을 배우고자 하는 사람들\n- 구글 데이터 스튜디오를 활용해서 데이터 시각화 분야에 입문하고자 하는 분들", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "[슬기로운 통계생활] 엑셀로 배우는 기초통계 part2", "duration": "3:21:36", "contents": "11", "instructor": "이삭", "summary": "엑셀을 사용한 기초 통계 과정! \n통계의 기초지식을 학습하고, 데이터가 주어졌을 때 통계적으로 시각화하는 방법을 학습합니다.\n또한 데이터의 특성을 나타내는 통계 지표들을 학습하면서 엑셀의 기능을 자연스럽게 익힐 수 있는 강의입니다.", "goal": "- 표본 평균의 이론을 통해 통계 지표에 대해 이해할 수 있다.\n- 가설 검정의 개념에 대해 이해하고 엑셀을 활용하여 예제 문제를 직접 풀어볼 수 있다.", "target": "- 통계를 처음 배우는 분들\n- 데이터 분석을 처음 공부하는 분들\n- 엑셀을 활용하여 통계를 처음 사용하는 분들", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 치트키] 업무 순삭의 비밀, Agentic AI", "duration": "3:22:08", "contents": "10", "instructor": "김환", "summary": "업무 효율성과 창의성의 혁신 – Agentic AI \n\nAI는 이제 단순한 자동화를 넘어, 스스로 판단하고 실행하는 새로운 단계로 진화하고 있습니다. Agentic AI는 이러한 변화의 중심에서, 비즈니스와 조직이 더 스마트하게 움직일 수 있도록 돕는 핵심 기술입니다. 이 과정에서는 Agentic AI가 어떻게 의사결정과 실행을 연결하고, 실무에 적용될 수 있는지 명확하고 쉽게 이해할 수 있도록 정리했습니다. 미래를 준비하는 모든 실무자에게 꼭 필요한 지식을 지금 만나보세요.", "goal": "- Agentic AI 개념과 활용 방법을 이해할 수 있다. \n- 다양한 AI 플랫폼을 활용하여 업무 효율을 높일 수 있다. \n- AI 플랫폼 활용 시 발생할 수 있는 보안 이슈를 이해하고, 보다 안전하고 효율적인 AI 활용 전략을 수립할 수 있다. ", "target": "- AI를 활용해 업무 효율을 높이고 싶은 실무자\n- 디지털 전환을 추진하는 기획·전략 담당자\n- AI 기반 자동화에서 한 단계 더 나아가고 싶은 개발자·PM", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] 나만의 AI 에이전트 펠로(Felo)를 활용한 리서치부터 시각화까지", "duration": "3:23:28", "contents": "6", "instructor": "정옥선", "summary": "검색도, 문서 작성도 AI로 하는 시대, 리서치와 시각화에 강한 Felo AI로 만드는 업무 자동화 워크플로우! ", "goal": "- Felo AI의 소스별 검색 기능을 활용하여 정보 탐색의 효율성을 높일 수 있다.\n- AI 에이전트를 설계하여 업무 목적에 맞게 프로세스를 최적화할 수 있다.\n- 효과적인 템플릿을 활용해 리서치 인사이트 기반의 기획서/보고서/PPT 제작 속도 효율화 및 완성도를 높일 수 있다.\n- Notion 및 Canva 등과의 연동을 통해 효율적인 업무 환경을 구축할 수 있다.", "target": "- AI로 수집한 자료를 바로 정리하고, 요약 문서로 전환하고 싶은 직장인\n- 바로 활용할 수 있는 수준 높은 리서치 기획서를 만들고 싶은 실무자\n- 마인드맵부터 PPT까지 폭넓은 시각화 자료를 제작하고자 하는 실무자\n- Notion 연동부터 협업 문서 관리 기능까지 활용하고 싶은 실무자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "AI 에이전트로 끝내는 바이브 코딩 : 내 PC 제어와 실전 프로젝트", "duration": "3:26:08", "contents": "7", "instructor": "신성진", "summary": "본 과정은 AI 에이전트를 기반으로 엑셀, 구글 시트, 파이썬을 연계한 자동 데이터 분석 전 과정을 다루는 실무 중심 과정으로, 실제 업무 데이터를 활용한 종합 실습을 통해 현업 적용력을 강화하는 과정이다.", "goal": "AI 에이전트 기반 데이터 분석 흐름을 이해할 수 있다.\n다양한 도구를 연계하여 자동 분석과 시각화를 수행할 수 있다.\n실무 데이터를 기반으로 분석 결과 보고서를 완성할 수 있다.", "target": "데이터 분석이 필요한 기업 실무자\n엑셀이나 구글 시트를 활용하지만 분석에 어려움을 느끼는 직장인\nAI 기반 업무 자동화와 데이터 분석 역량을 강화하고자 하는 학습자", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "[구글 올인원 AI] 아날로그 업무 현장, AI 자동화로 시스템 구축하기", "duration": "3:26:15", "contents": "7", "instructor": "이광희", "summary": "구글 환경 구축에서 출발해 Gemini 활용, 검색 고도화, 메모·할 일·일정 관리, 드라이브·포토 활용, Gmail·Meet·Chat 협업, 문서·스프레드시트·슬라이드 실무, 이미지·영상 제작, 설문지·사이트 구축, NotebookLM 기반 자료 분석, Colab·Apps Script를 활용한 업무 자동화까지 단계적으로 익히는 실무형 과정이다. 단순 기능 소개가 아니라 실제 업무 장면에 바로 적용할 수 있도록 검색, 문서 작성, 데이터 정리, 발표 자료 제작, 신청 접수, 규정집 챗봇, 일정 등록, 설문 자동 생성 같은 실습 중심으로 구성되었다.", "goal": "1. 구글 생태계의 핵심 서비스와 AI 기반 스마트워크 흐름을 이해한다.\n2. Gemini와 구글 문서도구를 활용해 검색, 문서 작성, 데이터 정리, 프레젠테이션 제작, 설문 구축을 할 수 있다.\n3. NotebookLM, 예약 페이지, Colab, Apps Script를 활용해 반복 업무를 자동화하는 방법을 알 수 있다.", "target": "1. 구글과 AI를 업무에 체계적으로 적용하려는 직장인\n2. 문서, 일정, 협업, 데이터 업무를 효율화하려는 실무자\n3. 코딩 경험 없이도 자동화와 AI 활용을 배우려는 입문자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI Class] AI 이미지 생성의 대세, 나노바나나로 디자인 마스터하기", "duration": "3:28:58", "contents": "6", "instructor": "양솔지", "summary": "AI 이미지 생성의 핵심 도구로 부상한 나노바나나, \n디자인이 필요한 모든 환경에서 누구나 완성도 있는 결과물을 낼 수 있는 AI 고품질 이미지 생성 마스터 클래스\n입력한대로 생성만 하는 AI 도구가 아니다! 사용자가 필요로하는 이미지와 장면의 맥락을 이해하는 똑똑한 이미지 생성 AI ‘나노바나나’를 알려주는 강의\n- 단일 이미지 생성이 아닌, 나노바나나를 통해 동일한 인물·스타일·분위기를 유지한 채 반복적인 이미지 생성 가능\n- 사물·인물·공간의 관계를 인식해 부자연스러운 합성이나 어색한 부분을 최소화하는 방법 학습\n- 시리즈 콘텐츠, 브랜드 비주얼, 캠페인 이미지처럼 컨셉의 일관성이 중요한 작업에 최적화된 이미지 생성 AI에 대한 모든 것을 알려주는 강의", "goal": "- AI 이미지 생성 툴 나노바나나를 활용하여 매력적인 결과물을 만들 수 있다.\n- 이미지 프롬프트 설계법을 습득하여 정확한 지시를 수행할 수 있다.\n- 원하는 디자인 요소가 구현되도록 하는 핵심 명령어를 익힐 수 있다.\n- 실제 광고에 사용할 수 있는 수준의 디자인 결과물을 실습을 통해 만들어낼 수 있다.", "target": "- 툴 숙련도와 상관없이 AI로 아이디어를 시각화하고 싶은 직장인\n- 나노바나나로 콘텐츠 디자인 역량을 키우고 싶은 모든 직장인\n- 콘텐츠 제작에 쫓기지 않고 업무 효율을 확실히 올리고 싶은 직장인\n- 모델 섭외나 촬영 없이도 실제 광심화 비주얼을 직접 만들고 싶은 직장인", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "Cursor AI (커서) 입문에서 실전 웹사이트 만들기까지 Part.3 실습 (웹사이트 만들기 2)", "duration": "3:32:55", "contents": "8", "instructor": "김동준", "summary": "본 과정은 커서 AI 인공지능 툴에 대한 기초 사용법과 이를 사용한 실전 웹사이트 만들기에 대해서 배우는 동영상 과정입니다.", "goal": "- 최신 AI 인공지능 툴을 사용하여 모던한 웹사이트 구축 과정을 학습합니다.", "target": "- 커서 AI 인공지능 툴을 사용하여 실전 웹사이트를 만드는 과정을 배우고자 하는 사람", "level": "고급"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "AI시대, 일잘러를 위한 데이터 사고와 분석법", "duration": "3:33:12", "contents": "10", "instructor": "최재원", "summary": "먼지 쌓인 데이터, 여러분의 조직은 잘 활용하고 있습니까?\n데이터와 통계를 모르고, AI 시대의 기술과 비즈니스를 논할 수 없습니다! 통계적 사고를 위해 데이터를 대하는 태도와 소양을 기르고, 프로젝트와 조직의 성공을 위해 데이터 리드가 해야 할 일에 대해 자세하게 알 수 있을 것입니다.\n변동성으로 가득한 세상, 그 이면의 패턴을 찾아내봅시다!", "goal": "1. 현업에서 통계와 분석 결과에 대해 적절한 의견을 제시할 수 있는 데이터 리터러시 역량을 키울 수 있다.\n2. 머신러닝, 텍스트 분석, 딥러닝 AI의 이면에 숨은 기본 원리와 지식을 파악할 수 있다.", "target": "1. 기업체 전 임직원\n2. AI에 관심있는 학습자\n3. 빅데이터와 데이터베이스에 관심있는 개발자 및 종사자", "level": "Seed"}, {"cat1": "IT", "cat2": "IT 프로그래밍", "title": "SQL, 어디까지 알고 있니? (실무과정)", "duration": "3:33:45", "contents": "15", "instructor": "모원서", "summary": "SQL, 실무에선 어떻게 활용해야 할까? (실습노트 제공)\n‘SQL, 업무 효율성을 높여준다고 해서 배우긴 배웠는데… 대체 실무에서는 어떻게 활용해야 할까?’ \n고민하는 분들을 위한 실습 중점 과정!\nSQL의 기본적인 부분에 대해 간략히 Remind 후 실제 어떻게 활용할 수 있는지 알아봅니다. \n코드가 입력되어 있는 실습노트도 함께 제공하니, 다양하게 응용해보세요!", "goal": "- SQL의 기본적인 사용법에 대해 Remind 할 수 있다.\n- SQL 실무 활용법에 대해 알아보고, 실전에서 다양하게 활용할 수 있다.", "target": "- SQL의 기본적인 사용법을 알고 있는 학습자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "[AI 치트키] 오늘부터 당신도 피지컬 AI 좀 아는 사람", "duration": "3:33:51", "contents": "12", "instructor": "박종성", "summary": "AI, 드디어 몸을 갖다 - 로봇 시대, 나의 생존 전략은?\n\n피지컬 AI는 단순한 로봇이 아닙니다. 인공지능, 로봇공학, 에너지 기술의 대융합이 만들어낸 경제 패러다임의 전복입니다. 본 과정은 피지컬 AI의 등장 배경부터 글로벌 빅테크의 전략, 하드웨어 주권, 그리고 로봇세, 기본소득, 글로벌 불평등 등 미래 사회 이슈까지, 다양한 관점으로 확인할 수 있습니다. ", "goal": "- 피지컬 AI로 인한 주요 산업 구조의 변화를 이해하고, 새로운 비즈니스 기회를 모색할 수 있다.\n- 피지컬 AI가 야기하는 사회적/윤리적 이슈를 이해하고, 이에 대한 합리적인 대응 방안을 모색할 수 있다.\n- 다가올 피지컬 AI 시대를 대비해 개인이 취해야 할 커리어 생존 방향을 설계할 수 있다.", "target": "- 피지컬 AI 시대에 대비해야 하는 기획, 전략, 신사업 담당자\n- 피지컬 AI 시대의 사회적, 경제적 변화를 깊이 있게 이해하고 싶은 직장인 L5", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "처음 배우는 딥러닝(Deep Learning)", "duration": "3:34:22", "contents": "10", "instructor": "노태상", "summary": "AI, 머신러닝, 딥러닝의 주요 개념과 구조 이해하고 딥러닝의 활용방법을 학습한다.", "goal": "- AI, 머신러닝, 딥러닝 주요 개념과 구조 이해할 수 있다.\n- 딥러닝의 활용 사례 학습을 통해서 현업에 활용할 수 있다.", "target": "- 소프트웨어개발자\n- 시스템 엔지니어 등", "level": "고급"}, {"cat1": "AI", "cat2": "", "title": "AI 마케터 시대, 생성형 AI와 팀플레이하기", "duration": "3:35:32", "contents": "8", "instructor": "노준영", "summary": "AI가 일상에 완전히 들어온 '베타세대' 시대의 마케팅 성공을 위해 생성형 AI는 필수적인 협력 대상입니다.\n예측하기 어려운 대중의 마음과 마케팅 프로젝트의 높은 리스크를 AI를 통해 보완하고, 전략 부재로 인한 실패를 방지하는 새로운 패러다임을 제안합니다.\n브랜딩과 개인화 마케팅을 통해 세상에 하나뿐인 브랜드와 콘텐츠를 제작하는 방법을 제시합니다.", "goal": "- 생성형 AI의 기본적인 개념과 마케팅 영역에서의 역할 및 중요성을 이해할 수 있다.\n- 생성형 AI를 활용한 마케팅 전략 수립 및 실무 적용 방안을 습득할 수 있다.\n- 브랜딩, 개인화 마케팅, 콘텐츠 제작 등 다양한 마케팅 활동에 AI를 효과적으로 접목하는 방법을 배울 수 있다.\n- 생성형 AI와의 효율적인 소통을 위한 프롬프트 활용 기초 기술을 익힐 수 있다.", "target": "- 마케팅/기획 분야에서 생성형 AI 활용법에 대한 기초 지식이 필요한 실무자\n- 마케팅 효율을 높이고, 리스크를 줄이며 전략적인 접근을 원하는 담당자", "level": "심화"}, {"cat1": "AI", "cat2": "", "title": "업무시간을 단축하는 스마트한 문서작성, 한컴독스 AI(Web ver) Part.2 실무 (完)", "duration": "3:35:48", "contents": "7", "instructor": "강다빈", "summary": "본 과정은 직장인들이 한컴독스 AI를 활용하여 문서 작성의 심리적 장벽을 낮추고, 반복적인 업무 프로세스를 획기적으로 개선하여 업무 시간을 단축하는 방법을 다룹니다. \n- AI를 황용한 문서 초안 작성부터 실무 기획서, 보고서, 보도자료 생성까지 현업에서 즉시 활용 가능한 실무 위주의 문서 템플릿을 중심으로 진행합니다. \n- 한컴독스 AI의 핵심 사용법과 한셀, 한쇼 연계 방법을 익힘으로써, 문서 품질은 높이되 제작 시간은 단축하여 업무의 생산성을 극대화할 수 있습니다.", "goal": "한컴독스 AI의 전반적인 기능을 습득하고, 다양한 AI 도구를 능숙하게 활용하여 고품질의 비즈니스 문서를 제작할 수 있다. - AI를 활용한 문장 생성 및 편집 기술을 실무에 적용하여, 초안 작성 및 내용 고도화에 소요되는 시간을 효율적으로 관리할 수 있다. - 표·이미지 생성 및 대화형 탐색 기능을 통해 복잡한 정보 취합 과정을 자동화하고, 실무 중심의 스마트한 사무자동화 환경을 구축할 수 있다.", "target": "최신 AI 기술을 문서 작성 실무에 도입하여 업무 생산성을 높이고자 하는 직장인 - 한컴독스 AI 및 생성형 AI 오피스 도구를 체계적으로 학습하여 문서 작성 효율을 극대화하고자 하는 사용자 - 기획서, 보고서, 공문서 등 텍스트 기반의 비즈니스 문서 제작 비중이 높은 실무자 및 공공기관 종사자", "level": "심화"}, {"cat1": "IT", "cat2": "데이터 분석", "title": "설득의 핵심 Key, 시각적 데이터 스토리텔링", "duration": "3:38:27", "contents": "8", "instructor": "전익진", "summary": "이제 구구절절 설명하지 않고 내가 전하려는 핵심 메시지를 스토리로 담아 설득할 수 있습니다. ", "goal": "1. 구구절절 설명하지 않고 내가 전하려는 핵심 메시지를 스토리로 담아 설득할 수 있다.\n2. 스토리를 데이터에 담아, 더 시각적으로 전달할 수 있는 능력을 향상 시킬 수 있다.", "target": "전 구성원", "level": "Seed"}, {"cat1": "Biz. Skill", "cat2": "기획력", "title": "100% 챗GPT 실전 가이드 : 일 잘하는 사람들의 AI 활용비법 step1", "duration": "3:39:26", "contents": "20", "instructor": "프롬프트 크리에이터", "summary": "ChatGPT 200% 활용법!\nChatGPT가 비즈니스 뿐만 아니라 라이프 스타일에서도 확실한 트렌드가 된 시대에, 보다 효과적으로 유용하게 사용할 수 있는 정보를 다루는 과정입니다. \n\nChat와 함께 일하기!\n이 과정은 인공지능과 대화하고 편안하게 활용할 수 있도록 도움을 주며, ChatGPT와 놀라울 정도로 친해질 수 있는 방법을 쉽게 설명하고 있습니다. \n\n실습 위주의 강의로 바로 활용 가능!\n처음부터 끝까지 실제 프롬프트 작성화면과 도출되는 결과를 볼 수 있기 때문에 바로 활용 가능합니다.", "goal": "① 업무에서 자기 계발까지 폭넓은 범위에서 ChatGPT를 활용할 수 있다.\n② ChatGPT 프롬프트를 여러 상황과 주제에 맞게 적절하게 적용할 수 있다. \n③ ChatGPT를 실제 업무에 바로 활용할 수 있다.", "target": "① ChatGPT를 어떻게 활용해야 할지 모르는 모든 학습자 \n② ChatGPT의 기본 기능과 기본 프롬프트를 습득하고 싶은 학습자\n③ ChatGPT의 프롬프트를 쉽고 간단하게 배우고 싶은 학습자", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "전혀 다른 생성형 AI", "duration": "3:39:49", "contents": "10", "instructor": "심영환", "summary": "문학, 영화, 음악, 역사 등 다양한 시각에서 생성형 AI의 개념과 기술을 탐구하고, 개인과 기업이 AI의 변화에 어떻게 대응할 수 있을지에 대한 통찰을 제공합니다. 생성형 AI의 세계를 탐험하면서 그 변화를 이해하고 경험할 수 있습니다. 또한, 인문학적 사고와 비즈니스 관점에서 AI가 가져올 삶의 변화와 문화적 영향을 다각도로 분석하면서 개인과 기업이 AI로 인한 변화를 어떻게 준비해야 할지를 통찰할 수 있습니다. ", "goal": "- 인문학적 관점에서 생성형 AI의 개념과 원리를 좀 더 쉽게 이해하고 파악할 수 있다. \n- AI의 변화에 개인과 기업의 대응방법을 설명할 수 있다.", "target": "- 기업체 전 임직원\n- 스마트한 업무 역량 향상을 위해 생성형 AI의 필요성을 느끼는 직장인", "level": "Seed"}, {"cat1": "AI", "cat2": "", "title": "업무시간을 단축하는 스마트한 문서작성, 한컴독스 AI(Web ver) Part.1 기초", "duration": "3:40:49", "contents": "7", "instructor": "강다빈", "summary": "본 과정은 직장인들이 한컴독스 AI를 활용하여 문서 작성의 심리적 장벽을 낮추고, 반복적인 업무 프로세스를 획기적으로 개선하여 업무 시간을 단축하는 방법을 다룹니다. \n- AI를 황용한 문서 초안 작성부터 실무 기획서, 보고서, 보도자료 생성까지 현업에서 즉시 활용 가능한 실무 위주의 문서 템플릿을 중심으로 진행합니다. \n- 한컴독스 AI의 핵심 사용법과 한셀, 한쇼 연계 방법을 익힘으로써, 문서 품질은 높이되 제작 시간은 단축하여 업무의 생산성을 극대화할 수 있습니다.", "goal": "한컴독스 AI의 전반적인 기능을 습득하고, 다양한 AI 도구를 능숙하게 활용하여 고품질의 비즈니스 문서를 제작할 수 있다. - AI를 활용한 문장 생성 및 편집 기술을 실무에 적용하여, 초안 작성 및 내용 고도화에 소요되는 시간을 효율적으로 관리할 수 있다. - 표·이미지 생성 및 대화형 탐색 기능을 통해 복잡한 정보

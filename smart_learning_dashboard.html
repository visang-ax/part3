<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트러닝 과정 종합 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0E14;
  --surface: #141820;
  --surface2: #1A1F2B;
  --surface3: #222836;
  --border: rgba(255,255,255,0.06);
  --border-active: rgba(99,179,237,0.3);
  --text: #E2E8F0;
  --text-dim: #8892A4;
  --text-muted: #5A6478;
  --accent: #63B3ED;
  --accent2: #9F7AEA;
  --seed: #68D391;
  --seed-bg: rgba(104,211,145,0.1);
  --mid: #63B3ED;
  --mid-bg: rgba(99,179,237,0.1);
  --high: #F6AD55;
  --high-bg: rgba(246,173,85,0.1);
  --yes: #68D391;
  --no: #FC8181;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.2);
  --course-col-width: 360px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.header {
  background: linear-gradient(135deg, #141820 0%, #1a1f35 50%, #1e1a2e 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 40px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-inner { max-width: 1440px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #fff; flex-shrink: 0; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header h1 span { color: var(--accent); }
.header-badge { font-size: 11px; background: var(--surface3); color: var(--text-dim); padding: 4px 12px; border-radius: 20px; font-weight: 500; }

.tabs { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; }
.tab { padding: 8px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.2s; border: none; background: none; font-family: inherit; }
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { background: var(--accent); color: #0B0E14; font-weight: 600; }

.main { max-width: 1440px; margin: 0 auto; padding: 28px 40px 60px; min-width: 0; }
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; transition: all 0.2s; }
.stat-card:hover { border-color: var(--border-active); transform: translateY(-1px); }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.stat-num { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 240px; position: relative; }
.search-box input { width: 100%; padding: 10px 16px 10px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border 0.2s; }
.search-box input:focus { border-color: var(--accent); }
.search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; }
.filter-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.filter-btn:hover { border-color: var(--border-active); color: var(--text); }
.filter-btn.on { background: var(--accent); color: #0B0E14; border-color: var(--accent); font-weight: 600; }
.count-badge { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; padding: 8px 0; }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-width: 0; max-width: 100%; }
.table-scroll { overflow-x: hidden; max-width: 100%; min-width: 0; }
table { width: 100%; max-width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
thead th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
tbody td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
tbody td:nth-child(6) { white-space: nowrap; vertical-align: middle; }
tbody tr { transition: background 0.1s; }
tbody tr:hover { background: var(--surface2); }
tbody tr:last-child td { border-bottom: none; }

.course-name { font-weight: 500; color: var(--text); width: var(--course-col-width); max-width: var(--course-col-width); min-width: 0; line-height: 1.4; word-break: keep-all; overflow-wrap: anywhere; }
.course-name a { color: inherit; text-decoration: none; }
.course-name a:hover { color: var(--accent); text-decoration: underline; }
.instructor-cell { max-width: 118px; width: 118px; font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
th.col-idx { width: 40px; box-sizing: border-box; }
th.col-cat { width: 88px; }
th.col-course { width: var(--course-col-width); box-sizing: border-box; }
th.col-hours { width: 82px; }
th.col-inst { width: 118px; }
th.col-level { width: 88px; }
th.col-reason { width: auto; min-width: 0; }
.cat-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface3); color: var(--text-dim); font-weight: 500; white-space: nowrap; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-align: center; }
.badge-yes { background: rgba(104,211,145,0.12); color: var(--yes); }
.badge-no { background: rgba(252,129,129,0.1); color: var(--no); }
.badge-seed { background: var(--seed-bg); color: var(--seed); }
.badge-mid { background: var(--mid-bg); color: var(--mid); }
.badge-high { background: var(--high-bg); color: var(--high); }

.reason-text { font-size: 12px; color: var(--text-dim); line-height: 1.55; min-width: 0; width: auto; white-space: normal; word-break: keep-all; overflow-wrap: anywhere; }
.arrow { margin: 0 6px; color: var(--text-muted); }
td.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

.criteria-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
.criteria-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.criteria-grid { display: grid; gap: 12px; }
.criteria-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 16px 20px; border-left: 3px solid var(--accent); }
.criteria-row.no-border { border-left-color: var(--no); }
.criteria-row.seed-border { border-left-color: var(--seed); }
.criteria-row.mid-border { border-left-color: var(--mid); }
.criteria-row.high-border { border-left-color: var(--high); }
.criteria-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.criteria-desc { font-size: 12px; color: var(--text-dim); line-height: 1.7; }

.change-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.change-stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 16px 20px; text-align: center; }
.change-stat .num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
.change-stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

@media (max-width: 768px) {
  .header { padding: 20px 16px; }
  .main { padding: 16px; }
  .header-inner { flex-direction: column; align-items: flex-start; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .toolbar { flex-direction: column; }
  .search-box { min-width: 100%; }
}
</style>
</head>

<div class="header">

      <div class="logo">AX</div>
      <div>

    </div>
  </div>

</div>

  var mainEl = document.querySelector('.main');
  var rawW = wrap ? wrap.clientWidth : 0;
  var avail = rawW > 80 ? rawW : (mainEl && mainEl.clientWidth ? mainEl.clientWidth : (document.documentElement.clientWidth || 800) - 80);
  avail = Math.max(avail, 320);
  var reservedOtherCols = 528;
  var capByViewport = Math.max(160, avail - reservedOtherCols);
  var ideal = Math.min(measured, capByViewport);
  var narrowed = Math.floor(ideal * 0.72);
  return Math.max(180, narrowed);
}
function applyCourseColumnWidth() {
  document.documentElement.style.setProperty('--course-col-width', computeCourseColumnPx() + 'px');
}
applyCourseColumnWidth();
window.addEventListener('load', applyCourseColumnWidth);
var _courseColResizeT;
window.addEventListener('resize', function () {
  clearTimeout(_courseColResizeT);
  _courseColResizeT = setTimeout(applyCourseColumnWidth, 120);
});
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(applyCourseColumnWidth);
}
document.getElementById('s-total').textContent = STATS.total;
document.getElementById('s-yes').textContent = STATS.yes;
document.getElementById('s-yes-pct').textContent = Math.round(STATS.yes/STATS.total*100) + '% 인정률';
document.getElementById('s-seed').textContent = STATS.levels['Seed'] || 0;
document.getElementById('s-mid').textContent = STATS.levels['심화'] || 0;
document.getElementById('s-high').textContent = STATS.levels['고급'] || 0;

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });
});

function levelBadge(lv) {
  if (!lv) return '';
  if (lv === 'Seed') return '<span class="badge badge-seed">Seed</span>';
  if (lv === '심화') return '<span class="badge badge-mid">심화</span>';
  if (lv === '고급') return '<span class="badge badge-high">고급</span>';
  return '<span class="badge">' + lv + '</span>';
}
function approvedBadge(v) {
  const lv = (v||'').toLowerCase();
  if (lv === 'yes') return '<span class="badge badge-yes">Yes</span>';
  if (lv === 'no') return '<span class="badge badge-no">No</span>';
  return '';
}
/** 강사 2명 이상이면 "첫 이름 외 N명", 1명이면 그대로 */
function formatInstructor(raw) {
  if (raw == null || String(raw).trim() === '') return '';
  const parts = String(raw).split(/[/,，]/).map(function (s) { return s.trim(); }).filter(Boolean);
  if (parts.length <= 1) return parts[0] || String(raw).trim();
  return parts[0] + ' 외 ' + (parts.length - 1) + '명';
}

// Build change reason lookup by course name
const changeReasonMap = {};
CHANGES.forEach(ch => { changeReasonMap[ch.name] = ch.reason; });

let currentFilter = 'all';
let currentSearch = '';

function renderCourses() {
  const tbody = document.getElementById('courseBody');
  let filtered = COURSES.filter(c => {
    if ((c.approved || '').toLowerCase() === 'no') return false;
    if (currentFilter === 'seed' && c.new_level !== 'Seed') return false;
    if (currentFilter === 'mid' && c.new_level !== '심화') return false;
    if (currentFilter === 'high' && c.new_level !== '고급') return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return (c.name + c.cat1 + c.cat2 + c.instructor).toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('countBadge').textContent = filtered.length + '건';

  tbody.innerHTML = filtered.map((c, i) => {
    const nameCell = '<a href="' + c.url + '" target="_blank" rel="noopener">' + c.name + '</a>';
    // Use change reason if available, else course reason
    let reasonText = changeReasonMap[c.name] || c.reason || '';
    if (reasonText === '동일') reasonText = c.note || '';
    return '<tr>' +
      '<td class="mono">' + (i+1) + '</td>' +
      '<td><span class="cat-tag">' + c.cat1 + '</span></td>' +
      '<td class="course-name">' + nameCell + '</td>' +
      '<td class="mono">' + c.hours + '</td>' +
      '<td class="instructor-cell" title="' + String(c.instructor || '').replace(/"/g, '&quot;') + '">' + formatInstructor(c.instructor) + '</td>' +
      '<td>' + levelBadge(c.new_level) + '</td>' +
      '<td class="reason-text">' + reasonText + '</td>' +
    '</tr>';
  }).join('');
  applyCourseColumnWidth();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    currentFilter = btn.dataset.filter;
    renderCourses();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderCourses();
});

renderCourses();

// Criteria
(function() {
  const grid = document.getElementById('criteriaGrid');
  const borderMap = { 'AX 인정: Yes': '', 'AX 인정: No': 'no-border', 'Seed': 'seed-border', '심화': 'mid-border', '고급': 'high-border' };
  CRITERIA.slice(1).forEach(row => {
    if (!row[0] || row[0] === '난이도') return;
    const cls = borderMap[row[0]] || '';
    const div = document.createElement('div');
    div.className = 'criteria-row ' + cls;
    div.innerHTML = '<div class="criteria-label">' + row[0] + '</div>' +
      (row[1] ? '<div class="criteria-desc"><strong>판정 기준:</strong> ' + row[1].replace(/\n/g, '<br>') + '</div>' : '') +
      (row[2] ? '<div class="criteria-desc" style="margin-top:6px"><strong>판단 포인트:</strong> ' + row[2].replace(/\n/g, '<br>') + '</div>' : '') +
      (row[3] ? '<div class="criteria-desc" style="margin-top:6px"><strong>적용 예시:</strong> ' + row[3] + '</div>' : '');
    grid.appendChild(div);
  });
})();
</script>

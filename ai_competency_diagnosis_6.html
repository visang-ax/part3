var CAT_TO_ROLE={"Biz. Skill":"기획/마케팅","IT":"IT/데이터","AI":"전 직군 공통"};
var roles=["기획/마케팅","IT/데이터","전 직군 공통"];
var selectedRoles={};
var roleGrid=document.getElementById("roleGrid");
roles.forEach(function(r){
  var btn=document.createElement("button");btn.type="button";btn.className="role-btn";btn.textContent=r;
  btn.onclick=function(){
    if(selectedRoles[r]){delete selectedRoles[r];btn.className="role-btn"}
    else{selectedRoles[r]=true;btn.className="role-btn on"}
    document.getElementById("role-card").className=Object.keys(selectedRoles).length>0?"role-card selected":"role-card";
    updateProgress();
  };
  roleGrid.appendChild(btn);
});
var questions=[
  "ChatGPT, Claude, Gemini 등 생성형 AI 도구가 무엇인지 알고 있고, 직접 사용해본 적이 있다.",

var answers=new Array(10).fill(null);
var list=document.getElementById("questionList");
questions.forEach(function(q,i){
  var card=document.createElement("div");card.className="question-card";card.id="card-"+i;
  card.innerHTML='<div class="q-top"><div class="q-number" id="num-'+i+'">'+(i+1)+'</div><div class="q-text">'+q+'</div></div><div class="btn-group"><button type="button" class="answer-btn" id="yes-'+i+'" onclick="selectAnswer('+i+',1)">예</button><button type="button" class="answer-btn" id="no-'+i+'" onclick="selectAnswer('+i+',0)">아니오</button></div>';
  list.appendChild(card);
});
function selectAnswer(idx,val){
  answers[idx]=val;
  document.getElementById("yes-"+idx).className="answer-btn";
  document.getElementById("no-"+idx).className="answer-btn";
  if(val===1)document.getElementById("yes-"+idx).className="answer-btn yes-selected";
  else document.getElementById("no-"+idx).className="answer-btn no-selected";
  document.getElementById("card-"+idx).className="question-card answered";
  updateProgress();
}
function updateProgress(){
  var answered=answers.filter(function(a){return a!==null}).length;
  var roleSelected=Object.keys(selectedRoles).length>0?1:0;
  var total=answered+roleSelected;
  document.getElementById("progressText").textContent=total+" / 11 응답 완료";
  document.getElementById("progressBar").style.width=Math.round(total/11*100)+"%";
  document.getElementById("submitBtn").className=total>=11?"submit-btn active":"submit-btn";
}
function showResult(){
  var score=0;for(var i=0;i<answers.length;i++)score+=answers[i];
  var level,color,recommend;
  if(score<=3){level="Seed (AI 입문)";color="#1D9E75";recommend="AI를 처음 접하는 단계입니다. 걱정하지 마세요!<br><br>• 추천: AX 아카데미 Seed 과정 (AI 개념, 프롬프트 기초)<br>• 먼저 해볼 것: ChatGPT나 Claude에 간단한 업무 질문 해보기<br>• 목표: 일주일에 1~2번 AI를 업무에 활용해 보기";}
  else if(score<=8){level="심화 (실무 적용)";color="#378ADD";recommend="기본적인 AI 활용 역량을 갖추고 있습니다.<br><br>• 추천: AX 아카데미 심화 과정 (프롬프트 고급, 업무 자동화)<br>• 먼저 해볼 것: 반복 업무 1개를 AI로 자동화해 보기<br>• 목표: 매일 1개 이상의 업무에 AI를 활용하기";}
  else{level="고급 (에이전트·자동화)";color="#534AB7";recommend="AI를 업무에 깊이 통합하는 전문가 수준입니다.<br><br>• 추천: AX 아카데미 고급 과정 (바이브 코딩, AI 에이전트, 데이터 분석 자동화)<br>• 먼저 해볼 것: 팀에서 AI 활용 사례 공유 및 교육 진행<br>• 목표: 10월 ATC/해커톤에서 AI 업무혁신 아이디어 발표";}
  var bars="";for(var j=0;j<10;j++)bars+='<div class="score-dot'+(j<score?' filled':'')+'"></div>';
  document.getElementById("resultCard").innerHTML=
    '<div class="result-score-label">나의 AI 역량 점수</div>'+
    '<div class="result-score-num" style="color:'+color+'">'+score+' <span>/ 10점</span></div>'+
    '<div class="result-level" style="color:'+color+'">'+level+'</div>'+
    '<div class="score-bar">'+bars+'</div>'+
    '<div class="level-labels"><span>Seed (0~3점)</span><span>심화 (4~8점)</span><span>고급 (9~10점)</span></div>'+
    '<hr class="result-divider">'+
    '<div class="result-recommend-title">맞춤 학습 추천</div>'+
    '<div class="result-recommend">'+recommend+'</div>';
  var userLevel;
  if(score<=3)userLevel="Seed";else if(score<=8)userLevel="심화";else userLevel="고급";
  var selRoles=Object.keys(selectedRoles);
  // Filter courses by selected roles
  var filtered=ALL_COURSES.filter(function(c){
    var courseRole=CAT_TO_ROLE[c.cat]||"";
    for(var r=0;r<selRoles.length;r++){if(courseRole===selRoles[r])return true;}
    return false;
  });
  // Always include 전 직군 공통 (AI category)
  var common=ALL_COURSES.filter(function(c){return CAT_TO_ROLE[c.cat]==="전 직군 공통"});
  filtered=filtered.concat(common);
  // Deduplicate
  var seen={};filtered=filtered.filter(function(c){if(seen[c.name])return false;seen[c.name]=true;return true});
  // Match by user level
  var matched=filtered.filter(function(c){return c.level===userLevel});
  if(matched.length<3)matched=filtered;
  matched.sort(function(a,b){return a.score-b.score});
  matched=matched.slice(0,10);
  var badgeClass={"Seed":"badge-seed","심화":"badge-deep","고급":"badge-advanced"};
  var ch='<div class="course-section-title">나의 직군·난이도 맞춤 추천 과정 <span class="course-count">('+matched.length+'개)</span></div>';
  matched.forEach(function(c){
    var searchUrl='https://visang.ubob.com/Search/Search?search='+encodeURIComponent(c.name);
    var badge='<span class="course-badge '+(badgeClass[c.level]||'badge-seed')+'">'+c.level+'</span>';
    var link='<a class="course-link" href="'+searchUrl+'" target="_blank" rel="noopener">'+c.name+'</a>';
    ch+='<div class="course-item">'+badge+link+'<span class="course-hours">'+c.hours+'</span></div>';
  });
  document.getElementById("courseSection").innerHTML=ch;
  document.getElementById("resultSection").style.display="block";
  document.getElementById("resultSection").scrollIntoView({behavior:"smooth"});
}
function resetAll(){
  for(var i=0;i<answers.length;i++){answers[i]=null;document.getElementById("yes-"+i).className="answer-btn";document.getElementById("no-"+i).className="answer-btn";document.getElementById("card-"+i).className="question-card"}
  selectedRoles={};document.querySelectorAll(".role-btn").forEach(function(b){b.className="role-btn"});
  document.getElementById("role-card").className="role-card";
  document.getElementById("resultSection").style.display="none";
  document.getElementById("submitBtn").className="submit-btn";updateProgress();
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>
</body>
</html>
